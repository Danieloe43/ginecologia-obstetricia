• DIU de cobre = más efectivo método de emergencia (y da anticoncepción continua)
• Migraña con aura = contraindicación absoluta para ACO con estrógeno
• Tabaquismo ≥15 cig/día + ≥35 años = contraindicación para ACO
• Lactancia: progestina sola, DIU e implante son seguros

**Conceptos clave:**
• "Quick start" = iniciar anticonceptivo cualquier día del ciclo (con prueba de embarazo negativa)
• Los ACO protegen contra cáncer de ovario y endometrio
• El DMPA puede causar pérdida de DMO (pero es reversible)
• El DIU hormonal es tratamiento para SUA, además de anticoncepción

**Errores comunes:**
• No ofrecer LARC a adolescentes (son candidatas y se benefician)
• Requerir citología antes de iniciar anticonceptivos (no es necesario)
• No considerar anticoncepción de emergencia en caso de olvido de píldoras
• Creer que el DIU no puede usarse en nulíparas (sí puede)

**Lo indispensable:**
• Conocer las contraindicaciones clave (TEV, migraña con aura, tabaco + edad)
• Saber que el DIU de cobre es el mejor método de emergencia
• Los efectos adversos más comunes causan discontinuación → aconsejar sobre ellos`},{title:"Referencias Bibliográficas",content:`• WHO. Medical eligibility criteria for contraceptive use, 5th edition. 2015 (updated 2019).
• CDC. U.S. Selected Practice Recommendations for Contraceptive Use. MMWR. 2016;65(4).
• ACOG Practice Bulletin No. 186: Long-Acting Reversible Contraception: Implants and Intrauterine Devices. 2017.
• ACOG Practice Bulletin No. 152: Emergency Contraception. 2015.
• Bearak J, et al. Unintended pregnancy and abortion by income, region, and the legal status of abortion: estimates from a comprehensive model for 1990-2019. Lancet Glob Health. 2020.
• UpToDate: "Overview of contraception." 2024.`}]},{id:"cancer-endometrio",name:"Cáncer de Endometrio",category:"oncologia",icon:"🎗️",severity:"high",tags:["endometrio","adenocarcinoma","sangrado posmenopáusico","biopsia","histerectomía"],sections:[{title:"Definición",content:`El cáncer de endometrio es la neoplasia maligna más frecuente del tracto genital femenino en países desarrollados. Se origina en el revestimiento epitelial del útero (endometrio).

**Tipos principales:**
• **Tipo I (Endometrioide - 80%):** Relacionado con exposición estrogénica, mejor pronóstico
• **Tipo II (No endometrioide - 20%):** Seroso, células claras, carcinosarcoma. No relacionado con estrógenos, peor pronóstico

**Importancia clínica:** Generalmente se diagnostica en estadios tempranos debido al sangrado vaginal. La supervivencia a 5 años es 80-95% en estadio I, pero cae a 15-20% en estadio IV.

**Epidemiología:** Es el 4º cáncer más frecuente en mujeres (después de mama, pulmón y colon). Edad media al diagnóstico: 60 años. Solo 5-10% ocurren antes de los 45 años. Incidencia en aumento debido a la epidemia de obesidad.`},{title:"Factores de Riesgo",content:`**Factores relacionados con exposición estrogénica sin oposición (Tipo I):**
• Obesidad (IMC >30: riesgo 2-4x mayor; IMC >40: riesgo 7x)
• Terapia estrogénica sin progestágeno
• Menarquia temprana (<12 años) / menopausia tardía (>55 años)
• Nuliparidad
• Anovulación crónica (SOP)
• Tumores productores de estrógenos (tecoma, tumor de células de la granulosa)
• Tamoxifeno (efecto estrogénico sobre endometrio) - riesgo 2-7x

**Otros factores:**
• Edad avanzada
• Diabetes mellitus tipo 2
• Síndrome de Lynch (síndrome de cáncer colorrectal hereditario no polipósico - HNPCC)
  - Riesgo de cáncer endometrial 40-60% a los 70 años
• Antecedente de cáncer de mama
• Radioterapia pélvica previa
• Hiperplasia endometrial con atipia (progresión a cáncer 25-30%)

**Factores protectores:**
• Multiparidad
• Uso de anticonceptivos orales combinados (protección dura hasta 15 años después)
• DIU de levonorgestrel
• Lactancia
• Tabaquismo (efecto antiestrogénico, pero obviamente no recomendado)`},{title:"Clasificación",content:`**Clasificación por tipo histológico:**

**Tipo I (80-85%):**
• Adenocarcinoma endometrioide (grados 1, 2, 3)
• Mucinoso
• Relacionados con hiperestrogenismo
• Precedidos por hiperplasia endometrial
• Mejor pronóstico

**Tipo II (15-20%):**
• Seroso papilar (más agresivo)
• Células claras
• Carcinosarcoma (tumor mülleriano mixto maligno)
• Indiferenciado
• Ocurren en endometrio atrófico
• No relacionados con estrógenos
• Peor pronóstico

**Estadificación FIGO 2023 (quirúrgica):**

**Estadio I:** Limitado al cuerpo uterino
• IA: Limitado a endometrio o <50% invasión miometrial
• IB: ≥50% invasión miometrial
• IC: Extensión a cérvix (solo afectación glandular) - nuevo en 2023

**Estadio II:** Invade estroma cervical (no solo glándulas) - antes IIB

**Estadio III:** Extensión local/regional
• IIIA: Invade serosa y/o anexos
• IIIB: Invade vagina y/o parametrios
• IIIC1: Ganglios pélvicos positivos
• IIIC2: Ganglios paraaórticos positivos

**Estadio IV:** Metástasis a distancia
• IVA: Invasión de mucosa vesical o rectal
• IVB: Metástasis a distancia (incluyendo ganglios inguinales, pulmón, hueso)`},{title:"Manifestaciones Clínicas",content:`**Síntoma principal:**
• **Sangrado vaginal posmenopáusico** (90% de los casos)
  - Cualquier sangrado después de 12 meses de amenorrea es anormal
  - Riesgo de cáncer: 10-15% si sangrado posmenopáusico

**Otros síntomas:**
• Sangrado intermenstrual o menorragia (en premenopáusicas)
• Flujo vaginal acuoso o purulento
• Dolor pélvico (enfermedad avanzada)
• Hematometra (acumulación de sangre en cavidad uterina por obstrucción cervical)
• Pérdida de peso, síntomas sistémicos (enfermedad metastásica)

**Signos al examen físico:**
• Puede ser normal en estadios tempranos
• Útero aumentado de tamaño
• Masa uterina palpable
• Sangre en orificio cervical

**🚩 Toda mujer posmenopáusica con sangrado vaginal debe ser evaluada para descartar cáncer de endometrio**`},{title:"Diagnóstico",content:`**1. Evaluación inicial:**
• Historia clínica (factores de riesgo, sangrado)
• Examen pélvico

**2. Ecografía transvaginal:**
• Medir grosor endometrial
• **Punto de corte en posmenopáusica: >4 mm** → requiere biopsia
• Sensibilidad >95% para cáncer con este umbral
• Si <4 mm y sangrado → puede repetirse ecografía o vigilancia, biopsia si persiste

**3. Biopsia endometrial (diagnóstico definitivo):**
• **Biopsia en consultorio (Pipelle, Karman):** Primera línea, sensibilidad 90-95%
• **Legrado fraccionado bajo anestesia:** Si biopsia de consultorio es insuficiente o no concluyente
• **Histeroscopia con biopsia dirigida:** Si sospecha de lesión focal o resultado previo no concluyente

**4. Estudios de extensión (post-diagnóstico histológico):**
• Radiografía o TC de tórax
• TC abdominopélvica o RM pélvica
• RM pélvica: superior para evaluar invasión miometrial y cervical
• CA-125: elevado en enfermedad avanzada (especialmente tipo II)
• Cistoscopia/rectoscopia si sospecha de invasión (estadio IVA)

**Evaluación molecular (cada vez más importante):**
• Análisis de genes MMR (síndrome de Lynch)
• Clasificación molecular (TCGA): POLE ultramutado (buen pronóstico), MSI-high, copy number low, copy number high (peor pronóstico)

**Diagnósticos diferenciales:**
• Hiperplasia endometrial
• Pólipo endometrial
• Mioma submucoso
• Atrofia endometrial
• Cervicitis, pólipos cervicales`},{title:"Tratamiento",content:`**PRINCIPIOS:**
• La estadificación es QUIRÚRGICA
• El tratamiento primario es quirúrgico en la mayoría de los casos
• La adyuvancia se decide según estadio y factores de riesgo

**1. CIRUGÍA (estadificación y tratamiento):**
• **Histerectomía total + salpingooforectomía bilateral** (pilar del tratamiento)
• **Lavados peritoneales** (citología)
• **Evaluación ganglionar:** Linfadenectomía pélvica ± paraaórtica según riesgo
• Puede realizarse por laparotomía, laparoscopia o robótica
• Omentectomía si es tipo seroso, células claras o carcinosarcoma

**Ganglio centinela:**
• Técnica emergente para evitar linfadenectomía completa
• Inyección de colorante o trazador en cérvix
• Detección de ganglios centinela en pelvis

**2. CLASIFICACIÓN DE RIESGO (para decidir adyuvancia):**

**Bajo riesgo:**
• Estadio IA, grado 1-2, endometrioide
• Invasión <50%, sin invasión linfovascular (IVLE)
• → NO requiere adyuvancia

**Riesgo intermedio:**
• Estadio IA-IB, grado 1-2 con IVLE
• Estadio IB grado 3
• → Considerar braquiterapia vaginal

**Alto riesgo:**
• Estadio II, III, IV
• Tipo II (seroso, células claras, carcinosarcoma)
• → Radioterapia externa ± braquiterapia ± quimioterapia

**3. RADIOTERAPIA:**
• **Braquiterapia vaginal:** Reduce recurrencia vaginal, menos toxicidad que RT externa
• **Radioterapia externa:** Para enfermedad avanzada o de alto riesgo

**4. QUIMIOTERAPIA:**
• Carboplatino + Paclitaxel (esquema estándar)
• Indicaciones: estadio III-IV, tipo II histológico, recurrencia
• 6 ciclos cada 3 semanas

**5. TERAPIA HORMONAL:**
• Progestágenos (medroxiprogesterona, megestrol) para enfermedad avanzada/recurrente
• Útil en pacientes no candidatas a cirugía
• En mujeres jóvenes con deseo de fertilidad + cáncer grado 1 limitado a endometrio: puede intentarse manejo conservador con DIU-LNG + progestágenos bajo vigilancia estricta (protocolo especial)

**6. INMUNOTERAPIA:**
• Pembrolizumab para tumores MSI-H/dMMR
• Dostarlimab para tumores dMMR avanzados (resultados prometedores)

**SEGUIMIENTO:**
• Cada 3-4 meses × 2 años, luego cada 6 meses × 3 años, luego anual
• Examen pélvico, citología vaginal
• Imágenes solo si síntomas o sospecha de recurrencia`},{title:"Complicaciones",content:`**De la enfermedad:**
• Hemorragia uterina severa
• Obstrucción urinaria (invasión ureteral)
• Fístulas (rectovaginal, vesicovaginal)
• Metástasis (pulmón, hígado, hueso, cerebro)

**Del tratamiento:**
• Quirúrgicas: hemorragia, lesión de órganos, TEV, infección
• Radioterapia: cistitis, proctitis, estenosis vaginal, linfedema
• Quimioterapia: mielosupresión, neuropatía, náuseas`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• Todo sangrado posmenopáusico = descartar cáncer (biopsia si endometrio >4 mm)
• La histerectomía + SOB es el tratamiento estándar
• Tipo I (endometrioide) = buen pronóstico; Tipo II = agresivo
• Síndrome de Lynch = riesgo 40-60% de cáncer endometrial
• Tamoxifeno aumenta riesgo de cáncer endometrial

**Conceptos clave:**
• La obesidad es el factor de riesgo más importante (hiperestrogenismo)
• Los ACO son protectores
• La estadificación es quirúrgica
• Carboplatino + Paclitaxel = quimioterapia estándar

**Lo indispensable:**
• No ignorar el sangrado posmenopáusico
• Conocer el punto de corte ecográfico (>4 mm)
• Saber que se necesita biopsia para diagnóstico
• El pronóstico depende del estadio y tipo histológico`},{title:"Referencias Bibliográficas",content:`• NCCN Guidelines: Uterine Neoplasms. Version 1.2024.
• FIGO Cancer Report 2021: Cancer of the endometrium.
• ACOG Practice Bulletin No. 149: Endometrial Cancer. 2015 (reaffirmed 2021).
• SGO Clinical Practice Endometrial Cancer Working Group. Endometrial cancer: A review and current management strategies. 2020.
• Concin N, et al. ESGO/ESTRO/ESP guidelines for the management of patients with endometrial carcinoma. Int J Gynecol Cancer. 2021;31:12-39.
• Williams Gynecology, 4th Edition. Chapter 33: Endometrial Cancer.
• UpToDate: "Endometrial carcinoma: Epidemiology, risk factors, and prevention." 2024.`}]},{id:"climaterio-menopausia",name:"Climaterio y Menopausia",category:"climaterio",icon:"🌸",severity:"low",tags:["menopausia","climaterio","bochornos","TRH","terapia hormonal","osteoporosis","síndrome genitourinario"],sections:[{title:"Definición",content:`**Definiciones clave:**

• **Climaterio:** Período de transición en la vida de la mujer que marca el paso de la etapa reproductiva a la no reproductiva. Incluye la perimenopausia, la menopausia y la posmenopausia.

• **Perimenopausia (transición menopáusica):** Período que precede a la menopausia, caracterizado por irregularidad menstrual y síntomas vasomotores. Puede durar 4-8 años. Comienza típicamente a los 45-47 años.

• **Menopausia:** Cese permanente de la menstruación debido al agotamiento de la función ovárica. Es un diagnóstico RETROSPECTIVO: se confirma después de 12 meses consecutivos de amenorrea sin otra causa patológica. Edad promedio: 51 años (rango 45-55 años).

• **Menopausia precoz:** Menopausia antes de los 45 años.

• **Insuficiencia ovárica prematura (IOP):** Cese de la función ovárica antes de los 40 años. Es una entidad diferente que requiere evaluación etiológica.

• **Posmenopausia:** Período que comienza después de la menopausia y se extiende por el resto de la vida.

**Importancia clínica:** La menopausia es un evento fisiológico normal, pero puede asociarse con síntomas que afectan significativamente la calidad de vida (bochornos, trastornos del sueño, síntomas genitourinarios) y con consecuencias a largo plazo (osteoporosis, enfermedad cardiovascular).

**Epidemiología:** Todas las mujeres experimentarán la menopausia. El 75-80% experimenta síntomas vasomotores. El 50-60% tendrá síntomas moderados a severos. Los síntomas vasomotores duran en promedio 7-10 años.`},{title:"Anatomía y Fisiopatología",content:`**Fisiología del envejecimiento ovárico:**

1. **Disminución de la reserva folicular:**
   - La mujer nace con ~1-2 millones de folículos
   - A la menarquia quedan ~400,000
   - Se utilizan ~400 en ovulaciones a lo largo de la vida
   - El resto sufre atresia progresiva
   - Al agotarse los folículos → cesa la producción de estrógenos

2. **Cambios hormonales característicos:**
   - **↓ Estradiol:** De 100-150 pg/mL a <20 pg/mL
   - **↓ Inhibina B:** Disminuye primero, refleja reserva ovárica
   - **↑ FSH:** Por pérdida de retroalimentación negativa. FSH >25-40 mUI/mL
   - **↑ LH:** También aumenta pero menos que FSH
   - **Estrona:** Se convierte en el estrógeno predominante (conversión periférica de andrógenos en tejido adiposo)

**Fisiopatología de los síntomas:**

**Síntomas vasomotores (bochornos):**
- El hipoestrogenismo altera el centro termorregulador hipotalámico
- La zona termoneutral se estrecha
- Pequeños cambios de temperatura corporal desencadenan respuestas de enfriamiento (vasodilatación, sudoración)
- Papel de neuroquinina B (NKB) y kisspeptina en neuronas KNDy del hipotálamo

**Atrofia urogenital (síndrome genitourinario de la menopausia):**
- Los receptores de estrógeno en vagina, vulva, uretra y vejiga dependen de estrógenos
- Hipoestrogenismo → adelgazamiento epitelial, disminución de glucógeno, ↑pH vaginal, pérdida de lactobacilos
- Resultado: sequedad, dispareunia, ITU recurrentes, urgencia urinaria

**Pérdida ósea:**
- Los estrógenos inhiben la resorción ósea
- El hipoestrogenismo acelera la pérdida ósea (2-3%/año en los primeros 5-7 años)
- Aumenta el riesgo de osteoporosis y fracturas`},{title:"Factores de Riesgo",content:`**Factores que afectan la edad de la menopausia:**

**Menopausia más temprana:**
- Tabaquismo (adelanta 1-2 años)
- Antecedente familiar de menopausia precoz
- Nuliparidad
- Bajo nivel socioeconómico
- Quimioterapia o radioterapia pélvica
- Ooforectomía unilateral
- Enfermedades autoinmunes
- Epilepsia y uso de anticonvulsivantes
- VIH
- Bajo IMC

**Menopausia más tardía:**
- Multiparidad
- Uso de anticonceptivos orales (efecto protector)
- Obesidad (conversión periférica de andrógenos a estrógenos)

**Factores de riesgo para síntomas severos:**
- Raza afrodescendiente (síntomas más prolongados)
- Tabaquismo
- Obesidad
- Bajo nivel educativo
- Ansiedad y depresión preexistentes
- Menopausia quirúrgica (síntomas más abruptos y severos)

**Factores de riesgo para osteoporosis posmenopáusica:**
- Edad avanzada
- Raza caucásica o asiática
- Bajo peso corporal (IMC <19)
- Historia familiar de osteoporosis/fracturas
- Menopausia precoz
- Tabaquismo, alcoholismo
- Sedentarismo
- Baja ingesta de calcio y vitamina D
- Uso crónico de corticoides`},{title:"Clasificación",content:`**Clasificación STRAW+10 (Stages of Reproductive Aging Workshop):**

Sistema estandarizado para clasificar el envejecimiento reproductivo:

**Etapa reproductiva:**
- **-5:** Reproductiva temprana
- **-4:** Reproductiva media
- **-3b:** Reproductiva tardía (ciclos regulares, ↓inhibina B, ↓AMH)
- **-3a:** Reproductiva tardía (variabilidad en longitud de ciclos)

**Transición menopáusica (perimenopausia):**
- **-2:** Temprana: Variabilidad en longitud de ciclo ≥7 días
- **-1:** Tardía: Amenorrea ≥60 días, FSH >25, síntomas vasomotores

**Posmenopausia:**
- **+1a:** Temprana (primeros 2 años): FSH alta, estradiol bajo, síntomas máximos
- **+1b:** Temprana (años 3-6): Estabilización de FSH
- **+1c:** Temprana (años 6-8): Continuación de pérdida ósea acelerada
- **+2:** Tardía: Síntomas urogenitales predominan sobre vasomotores

**Clasificación de síntomas por severidad:**

**Síntomas vasomotores (Escala de Greene u otras):**
- **Leves:** 1-3 bochornos/día, no interfieren con actividades
- **Moderados:** 4-6 bochornos/día, cierta interferencia
- **Severos:** >7 bochornos/día, afectan significativamente calidad de vida/sueño

**Síndrome genitourinario de la menopausia (GSM):**
- Sequedad vaginal
- Dispareunia
- Irritación/ardor vulvovaginal
- Síntomas urinarios (urgencia, disuria, ITU recurrentes)`},{title:"Manifestaciones Clínicas",content:`**SÍNTOMAS VASOMOTORES (75-80% de las mujeres):**
- **Bochornos (sofocos):** Sensación súbita de calor intenso en tórax, cuello y cara
- Duración: 1-5 minutos
- Pueden acompañarse de sudoración profusa, palpitaciones, ansiedad
- Más frecuentes e intensos por la noche ("sudores nocturnos")
- Interrumpen el sueño → fatiga diurna
- Desencadenantes: calor ambiental, estrés, alcohol, cafeína, comidas picantes

**SÍNTOMAS GENITOURINARIOS (Síndrome Genitourinario de la Menopausia - GSM):**
- Sequedad vaginal (más frecuente)
- Dispareunia (dolor con las relaciones sexuales)
- Disminución de la lubricación
- Irritación, prurito vulvovaginal
- Sangrado poscoital
- Urgencia urinaria, disuria
- Infecciones urinarias recurrentes
- **A diferencia de los bochornos, los síntomas de GSM NO mejoran con el tiempo**

**TRASTORNOS DEL SUEÑO:**
- Dificultad para conciliar el sueño
- Despertares frecuentes (muchas veces por sudores nocturnos)
- Sueño no reparador
- Pueden contribuir a fatiga, irritabilidad, dificultad de concentración

**SÍNTOMAS PSICOLÓGICOS:**
- Cambios de humor, irritabilidad
- Ansiedad
- Síntomas depresivos (aumenta riesgo en transición, especialmente si antecedentes)
- Dificultad de concentración ("niebla mental")
- Disminución de la libido

**CAMBIOS FÍSICOS:**
- Redistribución de grasa corporal (aumento de grasa abdominal)
- Cambios en la piel (adelgazamiento, sequedad, arrugas)
- Pérdida de cabello, aumento de vello facial
- Dolor articular (artralgias)
- Pérdida de masa muscular

**CONSECUENCIAS A LARGO PLAZO:**
- Osteoporosis y fracturas por fragilidad
- Enfermedad cardiovascular (el riesgo aumenta después de la menopausia)
- Posible aumento de riesgo de deterioro cognitivo (controversial)

**🚩 Banderas rojas (requieren evaluación):**
- Sangrado vaginal posmenopáusico (descartar cáncer endometrial)
- Menopausia antes de los 40 años (insuficiencia ovárica prematura)
- Síntomas severos que no responden a tratamiento
- Síntomas atípicos o focales neurológicos`},{title:"Diagnóstico",content:`**El diagnóstico de menopausia es CLÍNICO:**
- Amenorrea de 12 meses consecutivos
- En mujer de edad apropiada (>45 años)
- Sin otra causa patológica

**NO se requieren estudios de laboratorio para el diagnóstico en mujeres >45 años con clínica típica**

**¿Cuándo solicitar laboratorios?**

1. **Mujeres <45 años con amenorrea (sospecha de IOP):**
   - FSH (dos determinaciones separadas por 4-6 semanas): >25-40 mUI/mL
   - Estradiol: <20 pg/mL
   - Descartar otras causas: β-hCG, TSH, prolactina

2. **Mujeres con histerectomía previa sin ooforectomía:**
   - FSH elevada puede ayudar a confirmar menopausia
   - Síntomas vasomotores son indicadores clínicos

3. **Mujeres usando anticonceptivos hormonales:**
   - Difícil determinar si está en menopausia
   - Suspender y evaluar después de 2-4 semanas sin hormonas
   - O medir FSH en semana libre de placebo (si FSH >25-30 en dos ocasiones)

4. **Diagnóstico diferencial de síntomas:**
   - TSH: Descartar hipo/hipertiroidismo
   - Glucemia: Descartar diabetes
   - Hemograma: Descartar anemia

**Evaluación adicional recomendada en la menopausia:**

**Tamización de osteoporosis:**
- Densitometría ósea (DXA) a los 65 años en todas las mujeres
- Antes de los 65 si tiene factores de riesgo
- Repetir según resultados y riesgo (cada 2-5 años)

**Evaluación cardiovascular:**
- Perfil lipídico (el colesterol LDL tiende a aumentar)
- Glucemia en ayunas
- Presión arterial
- Evaluar riesgo cardiovascular global

**Tamización de cáncer:**
- Mamografía según guías (generalmente cada 1-2 años desde los 40-50)
- Citología cervical según guías
- Colonoscopia desde los 45-50 años

**Evaluación del GSM:**
- Examen pélvico: evaluar atrofia vaginal, pH vaginal (>5 sugiere hipoestrogenismo)
- Índice de maduración vaginal (opcional, en investigación)`},{title:"Interpretación Clínica",content:`**Correlación clínica:**

- Bochornos + amenorrea + edad 48-52 años = transición menopáusica típica
- Síntomas vasomotores severos + menopausia quirúrgica = esperar síntomas más intensos
- Sequedad vaginal + dispareunia + ITU recurrentes = síndrome genitourinario, considerar estrógenos locales
- Amenorrea <40 años = NUNCA asumir menopausia, descartar IOP

**Diagnóstico diferencial de bochornos:**
- Hipertiroidismo
- Feocromocitoma
- Síndrome carcinoide
- Medicamentos (tamoxifeno, opioides, antidepresivos)
- Trastornos de ansiedad
- Linfoma/leucemia
- Tuberculosis (sudores nocturnos)
- Hipoglucemia
- Rosácea

**Cuándo referir:**
- Menopausia antes de los 40 años → evaluación de IOP
- Síntomas refractarios a tratamiento
- Contraindicaciones para TRH pero síntomas severos
- Antecedente de cáncer de mama y síntomas menopáusicos
- Osteoporosis severa o fracturas por fragilidad
- Síntomas psiquiátricos severos

**💡 Perlas clínicas:**
- Los síntomas vasomotores mejoran con el tiempo (años); los genitourinarios empeoran
- El sangrado posmenopáusico SIEMPRE requiere evaluación (descartar cáncer endometrial)
- La menopausia no causa sangrado; si hay sangrado después de 12 meses de amenorrea, es anormal
- Las mujeres con menopausia precoz necesitan TRH al menos hasta la edad promedio de menopausia (51 años) para prevenir consecuencias del hipoestrogenismo prolongado`},{title:"Tratamiento",content:`**OBJETIVO:** Aliviar síntomas, mantener calidad de vida, prevenir consecuencias a largo plazo

**1. TERAPIA HORMONAL DE LA MENOPAUSIA (THM):**

**Es el tratamiento MÁS EFECTIVO para síntomas vasomotores (reduce 75-90%)**

**Indicaciones:**
- Síntomas vasomotores moderados a severos
- Síndrome genitourinario de la menopausia (puede usarse terapia local)
- Prevención de osteoporosis en mujeres con riesgo y síntomas

**Contraindicaciones absolutas:**
- Cáncer de mama actual o antecedente
- Cáncer de endometrio (excepto estadio IA tratado, controversia)
- Sangrado vaginal no diagnosticado
- Enfermedad tromboembólica venosa activa o antecedente
- Enfermedad arterial (infarto, ACV) activa o reciente
- Enfermedad hepática activa severa
- Porfiria cutánea tarda
- Hipertrigliceridemia severa (>500 mg/dL)

**Regímenes:**

**Mujeres CON útero: Estrógeno + Progestágeno (EPT)**
- El progestágeno es OBLIGATORIO para proteger el endometrio
- **Régimen cíclico:** Estrógeno continuo + progestágeno 12-14 días/mes (sangrado programado)
- **Régimen continuo combinado:** Estrógeno + progestágeno diario (para amenorrea)

**Mujeres SIN útero: Estrógeno solo (ET)**
- No necesita progestágeno

**Vías de administración:**
- **Transdérmica (parches, gel):** Preferida en mujeres con riesgo de TEV, hipertrigliceridemia, HTA, migraña
- **Oral:** Más estudiada, pero mayor riesgo de TEV y efectos hepáticos
- **Vaginal local:** Solo para síntomas genitourinarios, absorción sistémica mínima

**Dosis:**
- Iniciar con la dosis más baja efectiva
- Estradiol oral: 0.5-1 mg/día (estándar 1 mg)
- Estradiol transdérmico: 25-50 μg/día
- Estrógenos conjugados: 0.3-0.625 mg/día

**Progestágenos:**
- Progesterona micronizada: 100-200 mg/día (mejor perfil, preferida)
- Medroxiprogesterona: 2.5-5 mg/día
- Noretisterona: 0.5-1 mg/día
- DIU de levonorgestrel (protección endometrial con mínima absorción sistémica)

**Duración:**
- Individualizada según riesgo-beneficio
- Reevaluar anualmente
- No hay límite absoluto de duración si los beneficios superan los riesgos
- Generalmente se recomienda la menor dosis por el menor tiempo necesario

**2. TERAPIA NO HORMONAL PARA BOCHORNOS:**

**Para mujeres con contraindicaciones a THM o que prefieren no usarla:**

- **Fezolinetant (antagonista de receptor de NK3):** Aprobado 2023, muy efectivo, no hormonal
- **ISRS/IRSN:**
  - Paroxetina 7.5 mg/día (única aprobada por FDA para bochornos)
  - Venlafaxina 37.5-75 mg/día
  - Escitalopram 10-20 mg/día
- **Gabapentina:** 300-900 mg/día (especialmente si bochornos nocturnos)
- **Clonidina:** 0.1 mg/día (menos efectiva)
- **Oxibutinina:** 2.5-5 mg/día (evidencia emergente)

**3. TRATAMIENTO DEL SÍNDROME GENITOURINARIO (GSM):**

**Primera línea: Estrógenos vaginales locales**
- Estriol crema 0.5 mg o estrógenos conjugados crema
- Estradiol tabletas vaginales 10 μg
- Anillo de estradiol vaginal
- Absorción sistémica mínima → pueden usarse incluso en muchas sobrevivientes de cáncer de mama (con precaución)
- Uso inicial diario × 2 semanas, luego 2-3 veces/semana a largo plazo

**Alternativas no hormonales:**
- Lubricantes vaginales (para las relaciones)
- Hidratantes vaginales (uso regular, 2-3 veces/semana)
- Ospemifeno 60 mg/día VO (SERM, evitar si antecedente de TEV)
- Prasterona (DHEA intravaginal) 6.5 mg/día
- Láser vaginal fraccionado (CO2 o Erbium) - evidencia limitada

**4. PREVENCIÓN Y TRATAMIENTO DE OSTEOPOROSIS:**

- Calcio: 1000-1200 mg/día (preferentemente dietético)
- Vitamina D: 600-800 UI/día (puede requerir más según niveles)
- Ejercicio con carga de peso
- Evitar tabaco y alcohol excesivo
- Bifosfonatos si osteoporosis confirmada
- La THM previene pérdida ósea pero no es primera línea solo para hueso

**5. MODIFICACIONES DEL ESTILO DE VIDA:**
- Ejercicio regular (mejora bochornos, ánimo, sueño, hueso)
- Mantener peso saludable
- Evitar desencadenantes de bochornos (alcohol, cafeína, comidas picantes, ambientes calurosos)
- Técnicas de relajación, mindfulness
- Vestir en capas, ropa de algodón
- Terapia cognitivo-conductual (evidencia para bochornos y ánimo)`},{title:"Complicaciones",content:`**Complicaciones del hipoestrogenismo a largo plazo:**

**Osteoporosis y fracturas:**
- Pérdida ósea acelerada en los primeros 5-7 años posmenopausia
- Fracturas por fragilidad (cadera, vértebras, muñeca)
- Mayor mortalidad asociada a fractura de cadera

**Enfermedad cardiovascular:**
- El riesgo de enfermedad coronaria aumenta después de la menopausia
- El colesterol LDL tiende a aumentar
- Pérdida del efecto protector de los estrógenos sobre endotelio

**Síndrome genitourinario progresivo:**
- La atrofia vaginal empeora con el tiempo si no se trata
- ITU recurrentes
- Dispareunia que afecta la vida sexual y de pareja

**Efectos sobre la cognición:**
- Posible asociación con deterioro cognitivo (controversial)
- La "niebla mental" de la transición es generalmente transitoria

**Complicaciones de la terapia hormonal:**

**Estrógeno + progestágeno (EPT):**
- Pequeño aumento del riesgo de cáncer de mama (después de >3-5 años de uso)
- Aumento del riesgo de TEV (mayor con vía oral)
- Posible aumento de riesgo de ACV (con dosis altas orales)

**Estrógeno solo (ET):**
- Sin aumento significativo de cáncer de mama (puede incluso reducirlo según WHI)
- Aumento del riesgo de cáncer endometrial SI se usa en mujeres con útero SIN progestágeno

**Factores que modifican el riesgo:**
- Inicio temprano (cerca de la menopausia) = menor riesgo vs. inicio tardío
- Vía transdérmica = menor riesgo de TEV y ACV que oral
- Progesterona micronizada = mejor perfil que progestinas sintéticas`},{title:"Prevención",content:`**Prevención de síntomas severos:**
- Mantener peso saludable (la obesidad empeora bochornos)
- Ejercicio regular
- No fumar (adelanta menopausia y empeora síntomas)
- Limitar alcohol y cafeína
- Manejo del estrés

**Prevención de osteoporosis:**
- Ingesta adecuada de calcio y vitamina D desde la juventud
- Ejercicio con carga de peso
- Evitar tabaco y alcohol
- Densitometría ósea según guías
- Tratamiento de osteoporosis si se diagnostica

**Prevención de enfermedad cardiovascular:**
- Control de factores de riesgo: HTA, diabetes, dislipidemia
- Dieta cardiosaludable
- Ejercicio aeróbico regular
- Mantener peso saludable
- No fumar

**Prevención del síndrome genitourinario:**
- Los estrógenos vaginales pueden iniciarse temprano para prevenir progresión
- Mantener actividad sexual (favorece el trofismo vaginal)
- Uso de lubricantes e hidratantes

**Educación y consejería:**
- Informar a las mujeres sobre qué esperar en la transición menopáusica
- Desmitificar la menopausia
- Discutir opciones de tratamiento antes de que aparezcan síntomas severos
- Promover estilos de vida saludables`},{title:"Perlas Clínicas",content:`**Tips de examen:**
- La menopausia es un diagnóstico CLÍNICO (12 meses de amenorrea >45 años)
- FSH >25-40 mUI/mL apoya el diagnóstico si hay duda
- La THM es el tratamiento más efectivo para bochornos
- Estrógeno SOLO si no tiene útero; Estrógeno + Progestágeno si tiene útero
- La vía transdérmica es más segura para TEV
- Los estrógenos vaginales son seguros incluso en muchas pacientes con cáncer de mama (localmente)
- Paroxetina 7.5 mg es el único ISRS aprobado para bochornos
- Fezolinetant es el nuevo tratamiento no hormonal aprobado (2023)

**Conceptos clave:**
- Los síntomas vasomotores MEJORAN con el tiempo (7-10 años)
- Los síntomas genitourinarios EMPEORAN con el tiempo
- El sangrado posmenopáusico SIEMPRE es anormal → biopsia endometrial
- La THM se puede usar indefinidamente si los beneficios superan los riesgos
- Iniciar THM cerca de la menopausia (<60 años o <10 años de menopausia) es más seguro

**Errores comunes:**
- Negar THM a todas las mujeres por miedo (la mayoría se beneficia)
- Usar THM oral en mujeres con riesgo de TEV (usar transdérmica)
- No ofrecer estrógenos vaginales por temor al cáncer de mama (absorción mínima)
- No evaluar sangrado posmenopáusico ("es normal por la menopausia")
- No considerar IOP en mujeres <40 años con amenorrea

**Lo indispensable para el médico general:**
- Saber que la menopausia es fisiológica pero los síntomas se pueden tratar
- Conocer cuándo la THM está indicada y contraindicada
- Ofrecer estrógenos vaginales para síntomas genitourinarios
- Evaluar y tratar factores de riesgo cardiovascular y osteoporosis
- Todo sangrado posmenopáusico requiere evaluación`},{title:"Referencias Bibliográficas",content:`• The NAMS 2022 Hormone Therapy Position Statement Advisory Panel. The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29(7):767-794.
• ACOG Practice Bulletin No. 141: Management of Menopausal Symptoms. Obstet Gynecol. 2014;123(1):202-216 (reaffirmed 2023).
• NICE Guideline NG23: Menopause: diagnosis and management. 2015 (updated 2019).
• Pinkerton JV. Hormone Therapy for Postmenopausal Women. N Engl J Med. 2020;382:446-455.
• Stuenkel CA, et al. Treatment of Symptoms of the Menopause: An Endocrine Society Clinical Practice Guideline. J Clin Endocrinol Metab. 2015;100(11):3975-4011.
• Harlow SD, et al. Executive summary of the Stages of Reproductive Aging Workshop + 10 (STRAW+10). Menopause. 2012;19(4):387-395.
• Williams Gynecology, 4th Edition. Chapter 22: The Mature Woman.
• UpToDate: "Menopausal hot flashes" and "Treatment of menopausal symptoms with hormone therapy." 2024.`}]},{id:"sindrome-genitourinario-menopausia",name:"Síndrome Genitourinario de la Menopausia",category:"climaterio",icon:"💦",severity:"low",tags:["GSM","atrofia vaginal","sequedad","dispareunia","ITU recurrente","estrógenos vaginales"],sections:[{title:"Definición",content:`El síndrome genitourinario de la menopausia (GSM), anteriormente llamado "atrofia vulvovaginal" o "vaginitis atrófica", es el conjunto de signos y síntomas asociados a la disminución de estrógenos que afectan el tracto genital inferior (vagina, vulva) y el tracto urinario inferior (uretra, vejiga).

**Importancia del cambio de terminología (2014):**
El término "GSM" reemplaza a "atrofia vulvovaginal" porque:
- "Atrofia" tiene connotación negativa para las pacientes
- El término anterior no incluía los síntomas urinarios asociados
- GSM es más descriptivo y comprensivo

**Importancia clínica:** Afecta al 50-60% de las mujeres posmenopáusicas, pero está subdiagnosticado y subtratado. A diferencia de los bochornos, los síntomas de GSM NO mejoran con el tiempo; por el contrario, empeoran progresivamente si no se tratan. Afecta significativamente la calidad de vida, la función sexual y la autoestima.

**Epidemiología:** Prevalencia: 50-60% de mujeres posmenopáusicas. Solo el 20-25% busca atención médica por vergüenza o desconocimiento. Puede aparecer 4-5 años después de la menopausia y progresa con el tiempo.`},{title:"Anatomía y Fisiopatología",content:`**Tejidos estrógeno-dependientes afectados:**
- Vagina (epitelio escamoso estratificado)
- Vulva (labios mayores y menores, vestíbulo)
- Uretra distal
- Trígono vesical
- Musculatura del piso pélvico

**Cambios anatómicos e histológicos:**

**Vagina:**
- Epitelio adelgazado (de 20-40 capas a 3-4 capas)
- Pérdida de rugosidad vaginal
- Acortamiento y estrechamiento del canal vaginal
- Disminución de elasticidad
- Pérdida de glucógeno en células epiteliales
- Aumento del pH vaginal (de 3.5-4.5 a 5.0-7.0)
- Cambio en la flora vaginal (pérdida de Lactobacillus)
- Disminución de la vascularización → palidez
- Disminución de secreciones y lubricación

**Vulva:**
- Adelgazamiento de labios mayores y menores
- Pérdida de grasa subcutánea
- Fusión de labios menores
- Estenosis del introito vaginal
- Pérdida de vello púbico
- Fragilidad de la piel (petequias, fisuras)

**Tracto urinario:**
- Adelgazamiento del epitelio uretral
- Disminución de la vascularización periuretral
- Pérdida de colágeno en tejidos de soporte
- Mayor susceptibilidad a infecciones (cambio de flora)
- Puede contribuir a incontinencia urinaria

**Consecuencias fisiopatológicas:**
- El pH elevado favorece colonización por patógenos (E. coli, Streptococcus)
- La fragilidad epitelial causa microtraumatismos (sangrado, dispareunia)
- La disminución de lubricación causa fricción y dolor`},{title:"Factores de Riesgo",content:`**Factores que aumentan el riesgo o severidad del GSM:**

- Menopausia (inevitable)
- Menopausia quirúrgica (más abrupta, síntomas más severos)
- Tiempo prolongado desde la menopausia
- Tabaquismo (efecto antiestrogénico)
- Ausencia de actividad sexual vaginal
- Nuliparidad
- No uso de terapia hormonal
- Tratamientos oncológicos (quimioterapia, radioterapia pélvica, inhibidores de aromatasa)
- Cáncer de mama y uso de tamoxifeno/inhibidores de aromatasa

**Factores que pueden atenuar los síntomas:**
- Actividad sexual regular (mejora el trofismo vaginal)
- Uso de terapia hormonal sistémica o local
- Multiparidad (aunque puede asociarse con prolapso)
- Obesidad (mayor conversión periférica de estrógenos, aunque tiene otros riesgos)`},{title:"Clasificación",content:`**Por síntomas predominantes:**

**1. Síntomas vaginales:**
- Sequedad vaginal
- Ardor, irritación
- Prurito vulvovaginal
- Dispareunia (dolor con el coito)
- Sangrado poscoital
- Flujo vaginal (puede ser por cambio de flora)

**2. Síntomas vulvares:**
- Irritación vulvar
- Prurito
- Disuria externa (ardor cuando la orina toca la vulva)

**3. Síntomas urinarios:**
- Urgencia urinaria
- Frecuencia urinaria
- Disuria
- Infecciones urinarias recurrentes (≥2 en 6 meses o ≥3 en 1 año)
- Incontinencia de urgencia

**4. Síntomas sexuales:**
- Disminución de la lubricación
- Dolor con la penetración
- Sangrado poscoital
- Disminución de la satisfacción sexual

**Grados de severidad:**
- **Leve:** Síntomas presentes pero no afectan significativamente la calidad de vida
- **Moderado:** Síntomas frecuentes que afectan calidad de vida y/o función sexual
- **Severo:** Síntomas constantes, muy afectada la calidad de vida, sangrado, ITU recurrentes`},{title:"Manifestaciones Clínicas",content:`**Síntomas más frecuentes (por orden):**
1. Sequedad vaginal (75%)
2. Dispareunia (40-60%)
3. Irritación/ardor (30-40%)
4. Disminución de lubricación
5. Síntomas urinarios (urgencia, frecuencia)
6. ITU recurrentes

**Hallazgos al examen físico:**

**Inspección vulvar:**
- Labios mayores aplanados, pérdida de grasa
- Labios menores adelgazados, pueden estar fusionados
- Palidez de tejidos (disminución de vascularización)
- Pérdida de vello púbico
- Introito estrecho, puede dificultar la exploración
- Petequias, equimosis, fisuras por fragilidad

**Exploración vaginal:**
- Mucosa pálida, seca, brillante
- Pérdida de rugosidades (paredes lisas)
- Mucosa friable (sangra fácilmente al contacto)
- Acortamiento del canal vaginal
- Pérdida de elasticidad
- Posible estenosis
- Flujo escaso o anormal

**pH vaginal:**
- Normal premenopáusico: 3.5-4.5
- En GSM: >5.0 (generalmente 5.0-7.0)

**Índice de maduración vaginal (citología):**
- Predominio de células parabasales e intermedias
- Disminución de células superficiales

**🚩 Signos de alarma:**
- Sangrado posmenopáusico persistente → descartar cáncer
- Úlceras vulvovaginales → descartar malignidad, liquen, herpes
- Masas vulvares o vaginales
- Secreción purulenta → infección`},{title:"Diagnóstico",content:`**El diagnóstico es CLÍNICO basado en:**
1. Historia clínica (síntomas)
2. Examen físico (signos de atrofia)

**No se requieren estudios de laboratorio de rutina**

**Historia clínica detallada:**
- Síntomas presentes y su severidad
- Impacto en calidad de vida y función sexual
- Estado menstrual (confirmar posmenopausia)
- Uso de terapia hormonal actual o previa
- Antecedentes de cáncer de mama
- Medicamentos (tamoxifeno, inhibidores de aromatasa)
- Actividad sexual

**Examen físico:**
- Inspección vulvar
- Especuloscopia (puede ser difícil o dolorosa por estenosis)
- pH vaginal (tirilla de pH): >5 apoya el diagnóstico
- Evaluar prolapso si hay síntomas urinarios

**Estudios opcionales/cuando hay duda:**
- pH vaginal (fácil, económico)
- Índice de maduración vaginal en citología (células parabasales aumentadas)
- Cultivo vaginal si hay flujo anormal (descartar infección)
- Urocultivo si hay síntomas urinarios

**Diagnóstico diferencial:**
- Vaginitis infecciosa (Candida, vaginosis bacteriana, tricomoniasis)
- Dermatosis vulvares (liquen escleroso, liquen plano)
- Reacciones alérgicas o de contacto
- Cáncer vulvar o vaginal
- Vulvodinia
- Enfermedad inflamatoria intestinal con afectación perianal`},{title:"Tratamiento",content:`**TRATAMIENTO DE PRIMERA LÍNEA: ESTRÓGENOS VAGINALES LOCALES**

**Son el tratamiento más efectivo y seguro para el GSM**

**Opciones disponibles:**
- **Crema de estrógenos conjugados:** 0.5-1 g intravaginal
- **Crema de estriol:** 0.5 mg intravaginal
- **Tabletas vaginales de estradiol:** 10 μg
- **Anillo vaginal de estradiol:** 7.5 μg/día (se cambia cada 3 meses)

**Esquema de uso:**
- **Fase inicial (carga):** Uso diario × 2 semanas
- **Fase de mantenimiento:** 2-3 veces por semana indefinidamente
- Los efectos se ven después de 2-4 semanas
- Debe continuarse a largo plazo (los síntomas regresan al suspender)

**Ventajas de estrógenos vaginales:**
- Absorción sistémica mínima (niveles de estradiol permanecen en rango posmenopáusico)
- No requieren progestágeno para protección endometrial (a dosis bajas)
- Pueden usarse en muchas pacientes con antecedente de cáncer de mama (con precaución y discusión con oncología)
- Efectivos para todos los síntomas del GSM incluyendo ITU recurrentes

**TRATAMIENTOS NO HORMONALES:**

**Lubricantes vaginales:**
- Para usar durante la actividad sexual
- Base de agua o silicona
- No proporcionan mejoría del tejido, solo alivio temporal de la fricción

**Hidratantes vaginales:**
- Uso regular (cada 2-3 días) independiente de la actividad sexual
- Proporcionan humedad al tejido
- Ejemplos: productos con ácido hialurónico, policarbófilo
- Pueden mejorar el pH y reducir síntomas leves

**Ospemifeno (SERM oral):**
- 60 mg/día vía oral
- Efecto estrogénico selectivo sobre vagina
- Aprobado para dispareunia moderada a severa
- Contraindicado en antecedente de TEV
- No aumenta riesgo de cáncer de mama
- Alternativa para mujeres que no desean terapia vaginal

**Prasterona (DHEA intravaginal):**
- 6.5 mg óvulo vaginal diario
- Se convierte localmente en estrógenos y andrógenos
- Eficaz para dispareunia
- Absorción sistémica mínima

**Láser vaginal (CO2 fraccionado, Erbium:YAG):**
- Estimula remodelación del colágeno y vascularización
- Evidencia limitada y controversial
- Costoso, no cubierto por la mayoría de seguros
- La FDA advierte sobre falta de evidencia y potenciales riesgos

**TRATAMIENTO DE ITU RECURRENTES EN POSMENOPÁUSICAS:**
- Estrógenos vaginales (reducen recurrencias 50-60%)
- Profilaxis antibiótica poscoital si se relaciona con actividad sexual
- Metenamina hipurato (alternativa a antibióticos)
- Arándanos (evidencia moderada)

**CONSIDERACIONES ESPECIALES - SOBREVIVIENTES DE CÁNCER DE MAMA:**
- Los estrógenos vaginales a dosis bajas pueden usarse con precaución
- Discutir con oncología, especialmente si usa inhibidores de aromatasa
- Alternativas no hormonales son preferidas por algunos oncólogos
- Ospemifeno está contraindicado (SERM con actividad estrogénica)
- Prasterona puede ser opción (aunque se convierte parcialmente a estrógenos)
- Lubricantes e hidratantes son siempre seguros`},{title:"Complicaciones",content:`**Complicaciones del GSM no tratado:**

**Genitales:**
- Estenosis vaginal severa (puede impedir examen ginecológico o coito)
- Sinequias (adherencias) vaginales
- Dispareunia severa → evitación de la actividad sexual
- Sangrado recurrente por fragilidad
- Mayor riesgo de infecciones vaginales

**Urinarias:**
- Infecciones urinarias recurrentes
- Puede contribuir a incontinencia urinaria
- Disuria crónica que afecta calidad de vida

**Psicosexuales:**
- Disfunción sexual femenina
- Impacto en la relación de pareja
- Disminución de la autoestima
- Depresión y ansiedad relacionadas

**Complicaciones del tratamiento:**
- Los estrógenos vaginales a dosis bajas son muy seguros
- Irritación local ocasional
- Flujo vaginal (puede ser normal al inicio)
- La preocupación principal es en sobrevivientes de cáncer de mama (absorción mínima pero no nula)`},{title:"Perlas Clínicas",content:`**Tips de examen:**
- El GSM NO mejora con el tiempo (a diferencia de los bochornos)
- El pH vaginal >5 apoya el diagnóstico
- Los estrógenos vaginales son el tratamiento más efectivo
- A dosis bajas, NO requieren progestágeno
- Pueden usarse en muchas sobrevivientes de cáncer de mama (con precaución)
- Los estrógenos vaginales reducen ITU recurrentes en posmenopáusicas

**Conceptos clave:**
- Subdiagnosticado porque las pacientes no consultan (vergüenza)
- Preguntar activamente sobre síntomas en toda mujer posmenopáusica
- El tratamiento es a largo plazo (los síntomas recurren al suspender)
- La actividad sexual regular ayuda a mantener el trofismo vaginal
- Los lubricantes alivian síntomas pero no tratan la atrofia

**Errores comunes:**
- No preguntar sobre síntomas genitourinarios
- No ofrecer tratamiento por temor al cáncer de mama (absorción mínima)
- Tratar solo con lubricantes (no resuelven la atrofia)
- Suspender tratamiento después de mejoría (los síntomas vuelven)
- No considerar GSM como causa de ITU recurrentes

**Lo indispensable:**
- Preguntar activamente a las pacientes posmenopáusicas
- Ofrecer estrógenos vaginales como primera línea
- Explicar que es tratamiento a largo plazo
- Conocer las alternativas para sobrevivientes de cáncer de mama`},{title:"Referencias Bibliográficas",content:`• Portman DJ, Gass ML; Vulvovaginal Atrophy Terminology Consensus Conference Panel. Genitourinary syndrome of menopause: new terminology for vulvovaginal atrophy. Menopause. 2014;21(10):1063-8.
• The NAMS 2020 GSM Position Statement. Management of genitourinary syndrome of menopause in women with or at high risk for breast cancer. Menopause. 2020;27(12):1357-1361.
• ACOG Committee Opinion No. 659: The Use of Vaginal Estrogen in Women With a History of Estrogen-Dependent Breast Cancer. 2016.
• Lethaby A, et al. Local oestrogen for vaginal atrophy in postmenopausal women. Cochrane Database Syst Rev. 2016.
• Rahn DD, et al. Vaginal estrogen for genitourinary syndrome of menopause: A systematic review. Obstet Gynecol. 2014;124:1147-56.
• UpToDate: "Genitourinary syndrome of menopause (vulvovaginal atrophy): Clinical manifestations and diagnosis." 2024.`}]}],B0=[{id:9,category:"Ginecología",difficulty:"Media",examType:"ENARM",question:"Mujer de 38 años con menstruaciones abundantes y prolongadas. Examen: útero aumentado de tamaño, irregular. Ecografía: múltiples miomas, uno de ellos de 4 cm tipo FIGO 1 (submucoso). ¿Cuál es el tratamiento más adecuado?",options:["Análogos de GnRH por 6 meses como tratamiento definitivo","DIU de levonorgestrel","Miomectomía histeroscópica","Histerectomía total"],correctAnswer:2,explanation:"Un mioma submucoso FIGO tipo 0-2 de hasta 4-5 cm es ideal para miomectomía histeroscópica, que es mínimamente invasiva, preserva el útero y la fertilidad, y tiene alta tasa de éxito para resolver el sangrado. Los análogos de GnRH reducen el tamaño temporalmente pero no son tratamiento definitivo. El DIU-LNG puede ayudar con el sangrado pero no trata el mioma submucoso. La histerectomía es excesiva en una mujer joven con mioma tratable por histeroscopia."},{id:10,category:"Obstetricia",difficulty:"Alta",examType:"USMLE",question:"Gestante de 28 semanas con ruptura prematura de membranas hace 8 horas. Sin contracciones, afebril, FCF 145 reactiva. ¿Cuál es la conducta correcta?",options:["Inducción inmediata del parto por riesgo de infección","Manejo expectante + corticoides + antibióticos","Cesárea de emergencia","Solo observación sin medicamentos"],correctAnswer:1,explanation:"En RPMP <34 semanas sin signos de infección o compromiso fetal, el manejo es expectante para prolongar el embarazo y permitir maduración fetal. Se deben administrar: 1) Corticoides (betametasona) para maduración pulmonar, 2) Antibióticos (ampicilina + azitromicina) para prolongar latencia y reducir corioamnionitis, 3) Vigilancia de signos de infección. La inducción inmediata a las 28 semanas sería perjudicial para el neonato sin beneficio claro."},{id:11,category:"Ginecología",difficulty:"Alta",examType:"MIR",question:"Mujer de 24 años, sexualmente activa, con dolor pélvico bilateral de 3 días, fiebre 38.5°C, flujo vaginal purulento. Al examen: dolor a la movilización cervical. β-hCG negativa. ¿Cuál es el tratamiento inicial más adecuado?",options:["Ciprofloxacino 500mg cada 12h por 7 días","Ceftriaxona 500mg IM + Doxiciclina 100mg cada 12h + Metronidazol 500mg cada 12h × 14 días","Amoxicilina-clavulánico 875mg cada 12h por 10 días","Metronidazol 500mg cada 8h por 7 días solo"],correctAnswer:1,explanation:"El cuadro clínico es consistente con EPI (dolor pélvico, fiebre, dolor a la movilización cervical, flujo purulento). El tratamiento según CDC 2021 es: Ceftriaxona 500mg IM (cobertura gonococo) + Doxiciclina 100mg cada 12h × 14 días (cobertura Chlamydia) + Metronidazol 500mg cada 12h × 14 días (cobertura anaerobios). La ciprofloxacina ya no se recomienda por resistencia. La amoxicilina-clavulánico no cubre adecuadamente los patógenos de EPI."},{id:12,category:"Obstetricia",difficulty:"Media",examType:"ENARM",question:"Primigesta de 26 semanas, tamizaje de glucosa con 50g: resultado 165 mg/dL a la hora. ¿Cuál es el siguiente paso?",options:["Diagnosticar diabetes gestacional e iniciar dieta","Realizar PTOG con 100g para confirmar diagnóstico","Iniciar insulina inmediatamente","Repetir la prueba de 50g en 4 semanas"],correctAnswer:1,explanation:"En el método de dos pasos (usado por ACOG), la prueba de 50g es solo de tamizaje. Un resultado ≥130-140 mg/dL requiere confirmación con PTOG de 100g. Para diagnosticar DMG se necesitan 2 o más valores alterados en la PTOG 100g (ayuno ≥95, 1h ≥180, 2h ≥155, 3h ≥140 según Carpenter-Coustan). No se puede diagnosticar DMG ni iniciar tratamiento solo con el tamizaje positivo."},{id:13,category:"Ginecología",difficulty:"Baja",examType:"ENARM",question:"Una mujer de 35 años, fumadora de 20 cigarrillos/día, solicita anticoncepción. ¿Cuál método está CONTRAINDICADO?",options:["DIU de cobre","Anticonceptivos orales combinados","Implante subdérmico de etonogestrel","DIU de levonorgestrel"],correctAnswer:1,explanation:"Los anticonceptivos orales combinados (con estrógeno) están contraindicados (Categoría 4 OMS) en mujeres ≥35 años que fuman ≥15 cigarrillos/día debido al alto riesgo de eventos tromboembólicos arteriales (infarto, ACV). El DIU de cobre, el implante y el DIU de levonorgestrel son métodos solo de progestina o no hormonales, por lo que son seguros en fumadoras (Categoría 1-2)."},{id:14,category:"Obstetricia",difficulty:"Alta",examType:"USMLE",question:"Gestante de 30 semanas con amenaza de parto pretérmino, dilatación 2 cm, membranas íntegras. No ha recibido corticoides. Fibronectina fetal negativa. ¿Cuál es la conducta más apropiada?",options:["Administrar tocolíticos y corticoides, hospitalizar","Alta a domicilio con reposo relativo, la fibronectina negativa indica bajo riesgo","Cesárea de emergencia para evitar parto vaginal pretérmino","Solo observación intrahospitalaria sin medicamentos"],correctAnswer:1,explanation:"La fibronectina fetal negativa tiene un alto valor predictivo negativo (99%): si es negativa, la probabilidad de parto en los próximos 7-14 días es muy baja. En una paciente con síntomas pero fibronectina negativa y cambios cervicales mínimos (2 cm), puede considerarse el alta con instrucciones de retorno si empeoran los síntomas. No es necesario hospitalizar ni dar tocolíticos si el riesgo es bajo. Sin embargo, algunos protocolos darían corticoides de todas formas como precaución en <34 sem."},{id:15,category:"Oncología",difficulty:"Media",examType:"MIR",question:"Mujer de 62 años, posmenopáusica, con sangrado vaginal. Ecografía: endometrio 10 mm. Biopsia endometrial: adenocarcinoma endometrioide grado 1. TC sin evidencia de enfermedad extrauterina. ¿Cuál es el tratamiento estándar?",options:["Radioterapia pélvica primaria","Quimioterapia neoadyuvante con carboplatino-paclitaxel","Histerectomía total + salpingooforectomía bilateral ± linfadenectomía","DIU de levonorgestrel como tratamiento conservador"],correctAnswer:2,explanation:"El tratamiento estándar del cáncer de endometrio es quirúrgico: histerectomía total + salpingooforectomía bilateral, con evaluación ganglionar (linfadenectomía o ganglio centinela) según el riesgo. La cirugía permite la estadificación definitiva. La radioterapia primaria se reserva para pacientes no candidatas a cirugía. La quimioterapia neoadyuvante no es estándar. El tratamiento conservador con DIU-LNG solo se considera en casos muy seleccionados de mujeres jóvenes con cáncer grado 1 limitado a endometrio que desean preservar fertilidad."},{id:16,category:"Ginecología",difficulty:"Media",examType:"ENARM",question:"Mujer de 25 años con dismenorrea severa progresiva, dispareunia profunda e infertilidad de 2 años. Examen: nódulo doloroso en fondo de saco posterior. ¿Cuál es el siguiente paso diagnóstico más apropiado?",options:["Laparoscopia diagnóstica inmediata","Iniciar ACO en régimen continuo como prueba terapéutica","Ecografía transvaginal / RM pélvica","Biopsia del nódulo por vía vaginal"],correctAnswer:2,explanation:"La presentación clínica es altamente sugestiva de endometriosis (dismenorrea progresiva + dispareunia profunda + infertilidad + nódulo en fondo de saco). Aunque la laparoscopia es el gold standard diagnóstico, actualmente se acepta el diagnóstico clínico + imagen para iniciar tratamiento. La ecografía transvaginal puede detectar endometriomas y lesiones de endometriosis profunda. La RM es superior para mapeo de endometriosis infiltrante profunda. El tratamiento empírico con ACO puede iniciarse, pero un estudio de imagen ayuda a definir la extensión antes de tomar decisiones terapéuticas."}],P0=[{id:3,title:"Embarazo ectópico no complicado",category:"Obstetricia",difficulty:"Alta",steps:[{text:"Paciente de 29 años, G2P1, acude por dolor en fosa ilíaca derecha de 2 días de evolución y manchado vaginal oscuro. FUM hace 6 semanas. Signos vitales estables: PA 115/75, FC 82.",question:"¿Cuáles son los estudios diagnósticos iniciales prioritarios?",answer:"Estudios prioritarios: 1) β-hCG cuantitativa (confirmar embarazo), 2) Ecografía transvaginal (localizar embarazo), 3) Hemograma (evaluar anemia). La β-hCG es fundamental porque si es >1,500-2,000 mUI/mL (zona discriminatoria) y no se ve saco intrauterino, aumenta la sospecha de ectópico."},{text:'β-hCG: 3,200 mUI/mL. Ecografía transvaginal: útero vacío, masa anexial derecha de 2.8 cm con "anillo tubárico" sin actividad cardíaca, escaso líquido libre en fondo de saco. Hemoglobina 12.5 g/dL.',question:"¿Cuál es el diagnóstico y qué opciones de tratamiento tiene esta paciente?",answer:"Diagnóstico: Embarazo ectópico tubárico derecho no roto. Opciones de tratamiento: 1) METOTREXATO: Es candidata porque está hemodinámicamente estable, β-hCG <5,000, masa <4 cm, sin actividad cardíaca, función hepática/renal normal. Dosis: 50 mg/m² IM dosis única. 2) CIRUGÍA: Salpingostomía laparoscópica si desea preservar trompa, o salpingectomía si tiene trompa contralateral sana. Se le deben explicar ambas opciones, tasas de éxito y seguimiento requerido."}]},{id:4,title:"Diabetes gestacional con mal control",category:"Obstetricia",difficulty:"Media",steps:[{text:"Gestante de 30 semanas, diagnosticada con diabetes gestacional a las 26 semanas. Ha estado en dieta pero presenta el siguiente registro glucémico de la última semana: Ayunas promedio 105 mg/dL, 1h post-desayuno promedio 165 mg/dL, 1h post-almuerzo promedio 155 mg/dL.",question:"¿Cuál es la evaluación del control glucémico y qué conducta debe tomarse?",answer:"Evaluación: Las metas de la ADA/ACOG son: Ayuno <95 mg/dL, 1h postprandial <140 mg/dL. Esta paciente NO está en metas en ninguno de los tres valores medidos. Más del 30% de las glucemias están fuera de meta. Conducta: Debe iniciarse INSULINA. Esquema inicial: 1) Insulina NPH al acostarse (0.1-0.2 U/kg) para controlar la glucosa de ayuno, 2) Insulina rápida (lispro o aspart) antes del desayuno y almuerzo para controlar los picos postprandiales. Ajustar dosis cada 3-7 días según glucemias. Continuar dieta y ejercicio."},{text:"Se inicia insulina. Ahora tiene 36 semanas, con glucemias en meta (ayuno 88, postprandiales 125-135). Ecografía: feto en percentil 85 de peso, circunferencia abdominal en percentil 90, polihidramnios leve.",question:"¿Cuál es el plan de vigilancia fetal y momento de terminación del embarazo?",answer:"Vigilancia fetal: NST o perfil biofísico semanal desde las 32-34 semanas (que ya debería estar haciendo). Evaluar cada 2-4 semanas con ecografía el crecimiento fetal. Momento del parto: En DMG controlada con insulina y bien controlada, se puede esperar hasta las 39 semanas. Dado que tiene un feto grande (p85) y polihidramnios leve, hay que vigilar estrechamente. Si el peso fetal estimado supera los 4,500g, se debe discutir el riesgo de distocia de hombros y considerar cesárea. La inducción a las 39 semanas es razonable para reducir el riesgo de macrosomía progresiva y complicaciones."}]},{id:5,title:"Amenaza de aborto vs aborto diferido",category:"Obstetricia",difficulty:"Media",steps:[{text:"Mujer de 32 años, G3P2, con 8 semanas de embarazo según FUM, acude por sangrado vaginal escaso tipo manchado desde hace 2 días, sin dolor. Refiere que los síntomas de embarazo (náuseas, mastalgia) han disminuido en la última semana.",question:"¿Qué estudios se deben solicitar para diferenciar amenaza de aborto de un aborto diferido?",answer:"Estudios: 1) β-hCG cuantitativa, 2) Ecografía transvaginal. La ecografía es fundamental para evaluar viabilidad: buscar saco gestacional, embrión, vesícula vitelina y actividad cardíaca fetal. La disminución de síntomas de embarazo puede sugerir pérdida gestacional, pero no es diagnóstico por sí sola. Criterios de pérdida gestacional: LCC ≥7 mm sin actividad cardíaca O diámetro medio del saco ≥25 mm sin embrión."},{text:"β-hCG: 45,000 mUI/mL. Ecografía transvaginal: saco gestacional de 28 mm, embrión con LCC de 12 mm SIN actividad cardíaca detectada. Útero sin hematoma subcoriónico.",question:"¿Cuál es el diagnóstico y qué opciones de manejo existen?",answer:"Diagnóstico: ABORTO DIFERIDO (missed abortion). El embrión con LCC ≥7 mm sin actividad cardíaca cumple criterios diagnósticos de pérdida gestacional. Opciones de manejo (las 3 son válidas según preferencia de la paciente): 1) EXPECTANTE: Esperar expulsión espontánea (puede tardar 1-4 semanas, éxito 25-75%). 2) MÉDICO: Misoprostol 800 μg vaginal, puede repetirse en 24-48h (éxito 80-90%). Puede agregarse mifepristona 200mg VO 24-48h antes. 3) QUIRÚRGICO: AMEU o legrado uterino (éxito >95%, resolución inmediata). Se debe ofrecer apoyo emocional, dar anti-D si es Rh negativa, y seguimiento con β-hCG hasta que sea indetectable."}]}],V0=[{id:"ginecologia",name:"Ginecología General",icon:"🩺",color:"bg-pink-500"},{id:"obstetricia",name:"Obstetricia",icon:"🤰",color:"bg-blue-500"},{id:"urgencias",name:"Urgencias Gineco-obstétricas",icon:"🚨",color:"bg-red-500"},{id:"endocrinologia",name:"Endocrinología Ginecológica",icon:"⚗️",color:"bg-purple-500"},{id:"planificacion",name:"Planificación Familiar",icon:"💊",color:"bg-teal-500"},{id:"its",name:"Infecciones de Transmisión Sexual",icon:"🦠",color:"bg-orange-500"},{id:"oncologia",name:"Oncología Ginecológica",icon:"🔬",color:"bg-indigo-500"},{id:"climaterio",name:"Climaterio y Menopausia",icon:"🌸",color:"bg-rose-500"},{id:"algoritmos",name:"Algoritmos Diagnósticos",icon:"🔀",color:"bg-cyan-500"},{id:"casos",name:"Casos Clínicos Interactivos",icon:"📋",color:"bg-amber-500"},{id:"banco",name:"Banco de Preguntas",icon:"❓",color:"bg-violet-500"},{id:"bibliografia",name:"Bibliografía y Guías",icon:"📚",color:"bg-slate-500"}],w0=[{id:"sangrado-uterino-anormal",name:"Sangrado Uterino Anormal",category:"ginecologia",icon:"🩸",severity:"medium",tags:["SUA","PALM-COEIN","menorragia","metrorragia","sangrado vaginal"],sections:[{title:"Definición",content:`El sangrado uterino anormal (SUA) se define como cualquier variación en la frecuencia, duración, regularidad o volumen del sangrado menstrual que difiere del patrón menstrual normal. Según la FIGO (2011), el ciclo menstrual normal tiene una frecuencia de 24-38 días, duración de 4.5-8 días, y un volumen de 5-80 mL.

**Importancia clínica:** Es una de las causas más frecuentes de consulta ginecológica, afectando hasta el 30% de las mujeres en edad reproductiva. Puede ser indicativo de patología orgánica o funcional significativa.

**Epidemiología:** Prevalencia del 10-35% en mujeres en edad reproductiva. En posmenopáusicas, cualquier sangrado se considera anormal y requiere estudio para descartar malignidad (riesgo de cáncer endometrial del 10-15%).`},{title:"Anatomía y Fisiopatología",content:`**Bases anatómicas:** El endometrio es un tejido dinámico compuesto por una capa funcional (que se descama durante la menstruación) y una capa basal (regenerativa). Su grosor varía de 1-4 mm en fase proliferativa temprana hasta 8-14 mm en fase secretora.

**Fisiología menstrual normal:** El ciclo menstrual es regulado por el eje hipotálamo-hipófisis-ovario. La caída de progesterona al final de la fase lútea desencadena vasoconstricción de las arteriolas espirales, isquemia endometrial y descamación ordenada.

**Mecanismos fisiopatológicos del SUA:**
• **Causas estructurales (PALM):** Lesiones anatómicas que alteran la superficie endometrial o la vascularización uterina.
• **Causas no estructurales (COEIN):** Alteraciones en la hemostasia, función ovulatoria, factores endometriales locales o iatrogenia.
• La anovulación produce estimulación estrogénica sin oposición, causando hiperplasia endometrial y sangrado por deprivación irregular.`},{title:"Factores de Riesgo",content:`**No modificables:**
• Edad (extremos de la vida reproductiva: adolescencia y perimenopausia)
• Predisposición genética a coagulopatías (enfermedad de Von Willebrand)
• Antecedentes familiares de cáncer endometrial o de ovario

**Modificables:**
• Obesidad (conversión periférica de andrógenos a estrógenos)
• Uso de anticoagulantes o antiagregantes
• Dispositivos intrauterinos (especialmente DIU de cobre)
• Tabaquismo
• Estrés crónico
• Trastornos alimentarios

**Comorbilidades asociadas:**
• Hipotiroidismo / hipertiroidismo
• Síndrome de ovario poliquístico
• Enfermedad hepática crónica
• Insuficiencia renal
• Trastornos de la coagulación`},{title:"Clasificación",content:`**Sistema PALM-COEIN (FIGO 2011, actualizado 2018):**

**Causas Estructurales (PALM):**
• **P - Pólipo:** Crecimientos endometriales localizados, generalmente benignos
• **A - Adenomiosis:** Presencia de tejido endometrial en el miometrio
• **L - Leiomioma:** Clasificación por subsistema (submucoso, intramural, subseroso)
• **M - Malignidad/Hiperplasia:** Hiperplasia endometrial con/sin atipia, carcinoma

**Causas No Estructurales (COEIN):**
• **C - Coagulopatía:** Enfermedad de Von Willebrand, trombocitopenias, uso de anticoagulantes
• **O - Disfunción Ovulatoria:** Anovulación (SOP, hiperprolactinemia, disfunción tiroidea)
• **E - Endometrial:** Alteraciones locales en hemostasia, angiogénesis o inflamación
• **I - Iatrogénica:** Anticoagulantes, hormonales, DIU
• **N - No clasificada:** Malformaciones arteriovenosas, hipertrofia miometrial

**Clasificación por patrón de sangrado:**
• Menorragia: sangrado cíclico excesivo (>80 mL o >8 días)
• Metrorragia: sangrado intermenstrual
• Menometrorragia: sangrado excesivo e irregular
• Sangrado posmenopáusico: cualquier sangrado 12 meses después de la menopausia`},{title:"Manifestaciones Clínicas",content:`**Síntomas principales:**
• Sangrado menstrual abundante (cambio de toalla/tampón cada 1-2 horas)
• Sangrado prolongado (>8 días)
• Sangrado intermenstrual
• Sangrado poscoital
• Sangrado posmenopáusico
• Dismenorrea asociada (adenomiosis, endometriosis)

**Signos clínicos:**
• Palidez mucocutánea (anemia)
• Taquicardia (en sangrado agudo severo)
• Útero aumentado de tamaño (miomas, adenomiosis)
• Masas palpables al examen bimanual
• Sangrado activo visible al especuloscopia

**Hallazgos al examen físico:**
• Especuloscopia: visualizar origen del sangrado (cervical vs. uterino)
• Tacto bimanual: tamaño, forma y consistencia uterina
• Evaluar signos de hiperandrogenismo (SOP)
• Evaluar signos de hipotiroidismo

**🚩 Banderas rojas:**
• Sangrado posmenopáusico (descartar malignidad)
• Inestabilidad hemodinámica
• Hemoglobina < 7 g/dL
• Sangrado en paciente con anticoagulación
• Masa pélvica palpable`},{title:"Diagnóstico",content:`**Evaluación inicial:**
1. Historia clínica detallada: patrón de sangrado, duración, cantidad, síntomas asociados
2. Examen físico completo incluyendo examen pélvico

**Laboratorios:**
• Hemograma completo (evaluar anemia)
• β-hCG (descartar embarazo SIEMPRE en edad reproductiva)
• TSH (disfunción tiroidea)
• Perfil de coagulación (TP, TTP, fibrinógeno)
• Prolactina (si hay galactorrea o anovulación)
• Ferritina sérica
• Panel hormonal si se sospecha SOP (testosterona, DHEA-S, 17-OH progesterona)

**Imágenes diagnósticas:**
• **Ecografía transvaginal:** Primera línea. Evalúa grosor endometrial, miomas, pólipos, adenomiosis
  - Endometrio >4 mm en posmenopáusicas → requiere biopsia
  - Endometrio >12 mm en premenopáusicas → sospecha de patología
• **Histerosonografía:** Superior a la ecografía para lesiones intracavitarias
• **Histeroscopia:** Gold standard para evaluación de cavidad uterina
• **RM pélvica:** Para caracterización de miomas y adenomiosis

**Biopsia endometrial:**
• Indicaciones: >45 años con SUA, <45 años con factores de riesgo, fallo al tratamiento médico, sangrado posmenopáusico
• Métodos: Pipelle (consultorio), legrado biopsia, biopsia histeroscópica

**Diagnósticos diferenciales:**
• Embarazo y sus complicaciones (ectópico, aborto)
• Patología cervical (pólipos, ectropión, cáncer)
• Patología vaginal (atrofia, trauma, cuerpo extraño)
• Patología uretral o rectal (confirmar origen del sangrado)

**Algoritmo diagnóstico:**
1. Descartar embarazo → β-hCG
2. Evaluar estabilidad hemodinámica → estabilizar si es necesario
3. Ecografía transvaginal → identificar causa estructural
4. Laboratorios básicos → hemograma, TSH, coagulación
5. Biopsia endometrial → según indicaciones
6. Histeroscopia → si la ecografía es inconclusa`},{title:"Interpretación Clínica",content:`**Correlación síntomas-hallazgos:**
• Sangrado cíclico abundante + útero regular → pensar en coagulopatía, disfunción ovulatoria
• Sangrado irregular + útero aumentado → sospechar miomatosis o adenomiosis
• Sangrado posmenopáusico + endometrio engrosado → descartar carcinoma endometrial
• Sangrado + galactorrea → hiperprolactinemia

**Cuándo sospechar gravedad:**
• Hemoglobina en descenso progresivo
• Sangrado que no responde a tratamiento hormonal
• Endometrio engrosado con atipia en biopsia
• Masa uterina de crecimiento rápido (descartar leiomiosarcoma)

**Errores diagnósticos frecuentes:**
• No solicitar β-hCG en toda mujer en edad fértil
• No realizar biopsia endometrial en >45 años
• Atribuir sangrado posmenopáusico solo a atrofia sin estudiar
• No evaluar coagulación en adolescentes con menorragia (hasta 20% tienen Von Willebrand)
• Confundir sangrado uterino con sangrado cervical o vaginal

**💡 Perlas clínicas:**
• En adolescentes, hasta el 20% del SUA se debe a trastornos de coagulación → siempre evaluar
• El SUA anovulatorio es la causa más común en adolescentes y perimenopáusicas
• Todo sangrado posmenopáusico es cáncer hasta que se demuestre lo contrario
• La adenomiosis produce un útero globoso y doloroso, a diferencia de los miomas que producen irregularidad`},{title:"Tratamiento",content:`**1. Manejo inicial (sangrado agudo):**
• Estabilización hemodinámica: acceso IV, cristaloides, hemoderivados si Hb < 7 g/dL
• Ácido tranexámico 1g IV cada 6-8 horas (antifibrinolítico)
• Estrógenos conjugados IV 25 mg cada 4-6 horas (máximo 6 dosis) para sangrado severo
• ACO combinados en dosis altas: EE 35 mcg + norgestimato cada 8h → reducir progresivamente

**2. Tratamiento farmacológico (mantenimiento):**

**Primera línea:**
• **DIU-LNG (Mirena®):** Reducción del sangrado 71-96%. Gold standard para SUA sin deseo de fertilidad
• **Ácido tranexámico:** 1g VO cada 8h durante los días de sangrado (reduce pérdida 40-50%)
• **AINEs:** Ibuprofeno 400-600mg cada 8h, naproxeno 500mg cada 12h (reduce pérdida 20-40%)

**Segunda línea:**
• **ACO combinados:** Régimen cíclico o continuo
• **Progestágenos cíclicos:** Medroxiprogesterona 10mg/día por 10-14 días/mes
• **Análogos de GnRH:** Leuprolida 3.75mg IM mensual (máximo 6 meses, usar con add-back therapy)

**3. Tratamiento no farmacológico:**
• Suplementación con hierro (sulfato ferroso 200mg/día)
• Corrección de factores contribuyentes (obesidad, hipotiroidismo)

**4. Manejo quirúrgico:**
• **Polipectomía histeroscópica:** Para pólipos endometriales
• **Miomectomía:** Histeroscópica (submucosos) o abdominal (intramurales/subserosos)
• **Ablación endometrial:** Para SUA refractario sin deseo de fertilidad
• **Histerectomía:** Tratamiento definitivo, última opción

**5. Seguimiento:**
• Control en 3 meses tras inicio de tratamiento
• Hemograma de control
• Ecografía transvaginal de seguimiento
• Ajuste de terapia según respuesta

**6. Pronóstico:**
• Excelente con tratamiento adecuado
• La mayoría de causas benignas responden a tratamiento médico
• El riesgo de hiperplasia/cáncer endometrial aumenta con anovulación crónica no tratada`},{title:"Complicaciones",content:`**Agudas:**
• Anemia ferropénica severa
• Shock hipovolémico (sangrado masivo)
• Necesidad de transfusión urgente

**Crónicas:**
• Anemia ferropénica crónica con fatiga, disnea, bajo rendimiento
• Impacto en calidad de vida
• Infertilidad (según causa subyacente)
• Hiperplasia endometrial (por anovulación crónica)

**Potencialmente mortales:**
• Hemorragia masiva con shock
• Progresión a cáncer endometrial (hiperplasia con atipia: 25-30% riesgo de progresión)
• Coagulopatía de consumo en sangrado severo`},{title:"Prevención",content:`**Prevención primaria:**
• Mantener peso saludable (reducir hiperestrogenismo)
• Control de comorbilidades (tiroides, coagulación)
• Evitar uso innecesario de anticoagulantes

**Prevención secundaria:**
• Diagnóstico y tratamiento temprano de anovulación
• Uso de progestágenos en ciclos anovulatorios
• Seguimiento regular de miomas conocidos

**Tamización:**
• Evaluación endometrial en mujeres con factores de riesgo para cáncer endometrial
• Detección de coagulopatías en adolescentes con menorragia

**Educación al paciente:**
• Llevar calendario menstrual
• Reconocer signos de sangrado excesivo
• Consultar ante sangrado posmenopáusico
• No normalizar la anemia`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• PALM-COEIN es la clasificación universal → memorizarla
• Toda posmenopáusica con sangrado = biopsia endometrial
• β-hCG es OBLIGATORIA antes de cualquier otro estudio
• Enfermedad de Von Willebrand es la coagulopatía más frecuente

**Conceptos clave:**
• El SUA anovulatorio produce endometrio proliferativo sin oposición → riesgo de hiperplasia
• DIU-LNG es el tratamiento médico más efectivo para SUA
• Ácido tranexámico NO es hormonal → útil en mujeres que no desean hormonas

**Errores comunes:**
• No descartar embarazo
• Iniciar hormonales sin evaluar endometrio en >45 años
• No evaluar ferritina (puede haber déficit sin anemia franca)
• Subestimar la coagulopatía en adolescentes

**Lo indispensable para el médico general:**
• Clasificar según PALM-COEIN
• Saber cuándo derivar (fallo al tratamiento, sospecha de malignidad, inestabilidad)
• Iniciar manejo de primera línea antes de la remisión
• Siempre suplementar hierro`},{title:"Referencias Bibliográficas",content:`• Munro MG, et al. The two FIGO systems for normal and abnormal uterine bleeding symptoms and classification of causes of abnormal uterine bleeding in the reproductive years. Int J Gynaecol Obstet. 2018;143(3):393-408.
• ACOG Practice Bulletin No. 128: Diagnosis of Abnormal Uterine Bleeding in Reproductive-Aged Women. Obstet Gynecol. 2012;120(1):197-206.
• NICE Guideline NG88: Heavy menstrual bleeding: assessment and management. 2018 (updated 2021).
• Williams Gynecology, 4th Edition. Chapter 8: Abnormal Uterine Bleeding.
• Berek & Novak's Gynecology, 16th Edition.
• UpToDate: "Abnormal uterine bleeding in nonpregnant reproductive-age patients." 2024.
• WHO Guidelines on Contraception. 2023.`}]},{id:"sindrome-ovario-poliquistico",name:"Síndrome de Ovario Poliquístico",category:"ginecologia",subcategory:"endocrinologia",icon:"🔬",severity:"medium",tags:["SOP","PCOS","hiperandrogenismo","anovulación","Rotterdam","resistencia insulina"],sections:[{title:"Definición",content:`El síndrome de ovario poliquístico (SOP) es el trastorno endocrino más frecuente en mujeres en edad reproductiva, caracterizado por hiperandrogenismo, disfunción ovulatoria y morfología ovárica poliquística. Es un diagnóstico de exclusión.

**Importancia clínica:** Afecta el 6-20% de las mujeres según los criterios utilizados. Se asocia con infertilidad, riesgo cardiovascular aumentado, diabetes mellitus tipo 2, y cáncer de endometrio.

**Epidemiología:** Prevalencia del 6-10% con criterios NIH y hasta 15-20% con criterios de Rotterdam. Es la causa más común de infertilidad anovulatoria. El 70% de las mujeres con SOP tienen resistencia a la insulina.`},{title:"Anatomía y Fisiopatología",content:`**Fisiopatología central:**
El SOP resulta de una interacción compleja entre factores genéticos, neuroendocrinos y metabólicos:

1. **Hiperandrogenismo:** Producción excesiva de andrógenos ováricos (testosterona, androstenediona) y adrenales (DHEA-S). La teca ovárica es hiperactiva.

2. **Resistencia a la insulina:** Presente en 50-70% de las pacientes. La hiperinsulinemia:
   - Estimula la producción ovárica de andrógenos
   - Reduce la SHBG hepática → aumenta testosterona libre
   - Contribuye a la anovulación

3. **Disfunción del eje hipotálamo-hipófisis:**
   - Aumento de la pulsatilidad de GnRH → favorece LH sobre FSH
   - Relación LH/FSH elevada (>2:1 en 50% de los casos)
   - FSH relativamente baja → desarrollo folicular incompleto

4. **Anovulación crónica:**
   - Múltiples folículos reclutados pero ninguno alcanza dominancia
   - Acumulación de folículos antrales en periferia ovárica ("collar de perlas")
   - Ausencia de ovulación → no hay cuerpo lúteo → no hay progesterona → estimulación estrogénica sin oposición

**Correlación clínica:** La falta de progesterona lleva a hiperplasia endometrial y riesgo de cáncer de endometrio. La hiperinsulinemia acelera la aterogénesis.`},{title:"Factores de Riesgo",content:`**No modificables:**
• Predisposición genética (heredabilidad ~70%)
• Antecedentes familiares de SOP, DM2, síndrome metabólico
• Etnicidad (mayor prevalencia en poblaciones del sur de Asia)
• Exposición androgénica intrauterina

**Modificables:**
• Obesidad (especialmente adiposidad visceral) - presente en 40-80%
• Sedentarismo
• Dieta hipercalórica rica en carbohidratos refinados
• Estrés crónico
• Disruptores endocrinos ambientales`},{title:"Clasificación",content:`**Criterios de Rotterdam (2003) - Consenso Internacional:**
Se requieren ≥2 de 3 criterios (tras excluir otras causas):
1. Oligo/anovulación
2. Hiperandrogenismo clínico y/o bioquímico
3. Morfología ovárica poliquística ecográfica (≥12 folículos de 2-9 mm por ovario O volumen ovárico >10 mL)

**Fenotipos del SOP:**
• **Fenotipo A (clásico completo):** Hiperandrogenismo + anovulación + ovarios poliquísticos → mayor riesgo metabólico
• **Fenotipo B (clásico):** Hiperandrogenismo + anovulación → sin criterio ecográfico
• **Fenotipo C (ovulatorio):** Hiperandrogenismo + ovarios poliquísticos → con ciclos regulares
• **Fenotipo D (no hiperandrogénico):** Anovulación + ovarios poliquísticos → sin hiperandrogenismo

**Otros criterios históricos:**
• NIH 1990: Requiere hiperandrogenismo + anovulación (ambos)
• AE-PCOS Society 2006: Requiere hiperandrogenismo + uno de los otros dos`},{title:"Manifestaciones Clínicas",content:`**Signos de hiperandrogenismo:**
• Hirsutismo (60-80%): vello terminal en patrón masculino. Evaluar con escala de Ferriman-Gallwey (≥8 puntos)
• Acné persistente (15-25%): especialmente en mandíbula, espalda
• Alopecia androgénica: patrón de rarefacción difuso

**Alteraciones menstruales:**
• Oligomenorrea (ciclos >35 días) - lo más frecuente
• Amenorrea secundaria
• Sangrado uterino anormal

**Alteraciones metabólicas:**
• Obesidad (40-80%), predominio central
• Acantosis nigricans (signo de resistencia a insulina)
• Intolerancia a la glucosa / DM2

**Infertilidad:**
• Causa más común de infertilidad anovulatoria
• 75% de las anovulaciones en infertilidad son por SOP

**Impacto psicológico:**
• Depresión y ansiedad (prevalencia 2-3 veces mayor)
• Trastornos de imagen corporal
• Disminución de calidad de vida

**🚩 Banderas rojas (descartar otras causas):**
• Virilización franca (clitoromegalia, voz grave) → tumor productor de andrógenos
• Inicio brusco y progresión rápida → neoplasia
• Galactorrea → hiperprolactinemia
• Cushing clínico → síndrome de Cushing`},{title:"Diagnóstico",content:`**Es un diagnóstico de EXCLUSIÓN. Primero descartar:**
• Disfunción tiroidea (TSH)
• Hiperprolactinemia (prolactina)
• Hiperplasia suprarrenal congénita no clásica (17-OH progesterona)
• Síndrome de Cushing (cortisol libre urinario 24h o prueba de supresión con dexametasona)
• Tumores productores de andrógenos (testosterona >200 ng/dL)
• Insuficiencia ovárica prematura (FSH elevada)

**Laboratorios recomendados:**
• Testosterona total y libre (elevadas)
• DHEA-S (normal o ligeramente elevada)
• 17-OH progesterona (descartar HSC)
• LH y FSH (relación LH/FSH >2 sugiere SOP, pero no es diagnóstica)
• TSH y prolactina
• Glucosa en ayunas e insulina (HOMA-IR)
• Prueba de tolerancia oral a la glucosa 75g
• Perfil lipídico
• HbA1c

**Ecografía transvaginal:**
• ≥12 folículos de 2-9 mm por ovario (actualización 2018: ≥20 folículos con transductores de alta resolución)
• Volumen ovárico >10 mL
• No se recomienda como criterio en adolescentes (alta prevalencia de ovarios multifoliculares fisiológicos)

**En adolescentes:**
• Los criterios de Rotterdam son menos confiables
• Requiere hiperandrogenismo + anovulación persistente (>2 años post-menarquia)
• La ecografía NO es criterio diagnóstico en adolescentes`},{title:"Interpretación Clínica",content:`**Correlación clínica:**
• Ciclos irregulares + acné + hirsutismo → alta probabilidad de SOP
• Acantosis nigricans → resistencia a insulina significativa → evaluar síndrome metabólico
• IMC normal + SOP → no descartar resistencia a insulina (30% de SOP delgadas la tienen)

**Errores diagnósticos frecuentes:**
• Diagnosticar SOP solo por ecografía (los ovarios poliquísticos aislados NO son SOP)
• No excluir otras causas de hiperandrogenismo
• Diagnosticar SOP en adolescentes sin criterios rigurosos
• Ignorar el componente metabólico y solo tratar lo ginecológico
• No solicitar PTOG (la glucosa en ayunas puede ser normal con intolerancia posprandial)

**💡 Perlas clínicas:**
• SOP NO es solo un problema ginecológico: es una enfermedad metabólica sistémica
• El diagnóstico NO requiere ecografía si tiene hiperandrogenismo + anovulación
• La relación LH/FSH >2 es sugestiva pero NO es criterio diagnóstico
• Siempre buscar síndrome metabólico: obesidad central, HTA, dislipidemia, hiperglucemia`},{title:"Tratamiento",content:`**1. Cambios en estilo de vida (PRIMERA LÍNEA):**
• Pérdida de peso del 5-10% mejora significativamente la ovulación, hiperandrogenismo e insulinoresistencia
• Ejercicio aeróbico 150 min/semana + ejercicio de resistencia
• Dieta mediterránea, baja en carbohidratos refinados, rica en fibra

**2. Tratamiento según objetivo terapéutico:**

**A. Regulación menstrual (sin deseo de fertilidad):**
• **ACO combinados:** Primera línea. Preferir con progestágeno antiandrogénico (ciproterona, drospirenona). Regulan ciclo, reducen andrógenos, protegen endometrio
• **Progestágenos cíclicos:** Medroxiprogesterona 10mg x 10-14 días/mes (si contraindicación para ACO)

**B. Manejo del hiperandrogenismo:**
• **Espironolactona:** 50-200 mg/día (antiandrogénico). Requiere anticoncepción (teratogénico)
• **Finasteride:** 5 mg/día (inhibidor de 5α-reductasa)
• **Ciproterona:** 2 mg en ACO (Diane-35) o 25-50 mg/día
• **Tratamiento tópico:** Eflornitina crema para hirsutismo facial, depilación láser

**C. Resistencia a insulina:**
• **Metformina:** 500-2000 mg/día. Mejora insulinoresistencia, puede restaurar ovulación. NO es primera línea para infertilidad
• Indicada especialmente en IMC ≥25 o intolerancia a la glucosa

**D. Infertilidad:**
• **Letrozol:** 2.5-7.5 mg/día x 5 días (días 3-7). PRIMERA LÍNEA para inducción de ovulación (superior a clomifeno)
• **Citrato de clomifeno:** 50-150 mg/día x 5 días (días 3-7). Segunda línea
• **Gonadotropinas:** Si falla letrozol/clomifeno
• **Drilling ovárico laparoscópico:** Alternativa quirúrgica
• **FIV:** Si fallan las anteriores
