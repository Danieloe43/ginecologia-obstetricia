**Importancia clínica:** Afectan al 20-40% de las mujeres en edad reproductiva, llegando hasta el 70-80% en estudios con ecografía sistemática. Son la indicación más frecuente de histerectomía. Pueden causar sangrado uterino anormal, síntomas de masa pélvica, dolor e infertilidad.

**Epidemiología:** Prevalencia acumulada del 70% en mujeres blancas y hasta 80% en mujeres afrodescendientes a los 50 años. Pico de incidencia entre los 40-50 años. Raramente aparecen antes de la menarquia y típicamente regresan después de la menopausia.`},{title:"Anatomía y Fisiopatología",content:`**Origen:**
Los miomas se originan de una única célula del miometrio que sufre mutaciones somáticas (más frecuente: MED12). La mayoría son estrógeno y progesterona dependientes.

**Fisiopatología del crecimiento:**
• Los estrógenos y la progesterona estimulan el crecimiento
• Expresan más receptores de estrógeno y progesterona que el miometrio normal
• Producción local de estrógenos por aromatasa intratumoral
• Factores de crecimiento: TGF-β, bFGF, VEGF
• Matriz extracelular abundante (colágeno, fibronectina)

**Mecanismo de los síntomas:**
• **Sangrado:** Aumento de la superficie endometrial, congestión venosa, ulceración del endometrio suprayacente (submucosos)
• **Dolor:** Degeneración, torsión de mioma pediculado, compresión
• **Síntomas de masa:** Compresión de vejiga, recto, uréteres
• **Infertilidad:** Distorsión de la cavidad endometrial (submucosos), obstrucción tubárica`},{title:"Factores de Riesgo",content:`**No modificables:**
• Raza afrodescendiente (3 veces más frecuente, más sintomáticos)
• Edad reproductiva (pico 40-50 años)
• Historia familiar de miomas (2.5 veces más riesgo)
• Menarquia temprana (<10 años)
• Nuliparidad

**Modificables:**
• Obesidad (conversión periférica de andrógenos a estrógenos)
• Hipertensión arterial
• Dieta rica en carnes rojas
• Deficiencia de vitamina D
• Consumo de alcohol

**Factores protectores:**
• Multiparidad (cada parto reduce riesgo 20-40%)
• Uso de anticonceptivos orales (controvertido)
• Tabaquismo (reduce estrógenos, pero NO se recomienda)
• Ejercicio regular
• Dieta rica en frutas y vegetales`},{title:"Clasificación",content:`**Clasificación FIGO (según localización):**

**Submucosos (Tipo 0-2):** Afectan la cavidad endometrial
• **Tipo 0:** Pediculado intracavitario (100% dentro de la cavidad)
• **Tipo 1:** <50% intramural, >50% intracavitario
• **Tipo 2:** ≥50% intramural, <50% intracavitario

**Intramurales (Tipo 3-5):** Dentro del miometrio
• **Tipo 3:** 100% intramural, contacta endometrio
• **Tipo 4:** 100% intramural
• **Tipo 5:** Subseroso, ≥50% intramural

**Subserosos (Tipo 6-7):** Superficie externa del útero
• **Tipo 6:** Subseroso, <50% intramural
• **Tipo 7:** Subseroso pediculado

**Tipo 8:** Otros (cervical, parasitario, de ligamento ancho)

**Clasificación híbrida:** Se usa para miomas que afectan tanto endometrio como serosa (ej: 2-5)

**Por tamaño:**
• Pequeños: <3 cm
• Medianos: 3-5 cm
• Grandes: >5 cm
• Gigantes: >10 cm`},{title:"Manifestaciones Clínicas",content:`**Asintomáticos:** 50-75% de los casos (hallazgo incidental)

**Sangrado uterino anormal (30%):**
• Menorragia (más frecuente): sangrado abundante, prolongado
• Metrorragia: sangrado intermenstrual
• Más frecuente con miomas submucosos
• Anemia ferropénica secundaria

**Síntomas de masa pélvica:**
• Sensación de peso o presión pélvica
• Aumento del perímetro abdominal
• Síntomas urinarios: urgencia, frecuencia, retención (compresión vesical)
• Estreñimiento (compresión rectal)
• Hidronefrosis (compresión ureteral, raro)

**Dolor pélvico:**
• Dismenorrea
• Dispareunia
• Dolor agudo: degeneración roja (en embarazo), torsión de mioma pediculado

**Infertilidad y complicaciones obstétricas:**
• Infertilidad (especialmente submucosos)
• Abortos recurrentes
• Parto pretérmino
• Malpresentación fetal
• Mayor tasa de cesárea

**🚩 Banderas rojas:**
• Crecimiento rápido (>6 cm en un año) → descartar leiomiosarcoma
• Crecimiento posmenopáusico
• Síntomas nuevos en posmenopáusica`},{title:"Diagnóstico",content:`**Historia clínica y examen físico:**
• Útero aumentado de tamaño, irregular, firme
• Masa pélvica palpable
• Movilidad conservada (a diferencia de masa anexial fija)

**Ecografía transvaginal (primera línea):**
• Sensibilidad >95% para miomas >1 cm
• Masas hipoecogénicas, bien delimitadas
• Puede mostrar calcificaciones o degeneración
• Evaluación de número, tamaño y localización

**Histerosonografía (ecografía con infusión salina):**
• Superior para evaluar miomas submucosos
• Define relación con cavidad endometrial

**Histeroscopia:**
• Gold standard para miomas submucosos
• Permite diagnóstico y tratamiento simultáneo

**Resonancia magnética:**
• Mayor precisión para mapeo prequirúrgico
• Diferencia mioma de adenomiosis
• Evalúa miomas múltiples complejos
• Útil previo a miomectomía o embolización

**Laboratorios:**
• Hemograma (anemia)
• Ferritina sérica
• β-hCG (descartar embarazo)
• TSH (diagnóstico diferencial de sangrado)

**Biopsia endometrial:**
• No de rutina
• Indicada si >45 años, sangrado posmenopáusico, fallo al tratamiento

**Diagnósticos diferenciales:**
• Adenomiosis
• Embarazo
• Masa anexial (tumor ovárico)
• Leiomiosarcoma (<1%, sospechar si crecimiento rápido)`},{title:"Interpretación Clínica",content:`**Correlación clínica:**
• Miomas submucosos → causan más sangrado que los intramurales/subserosos
• Mioma >5 cm intramural/subseroso → más síntomas de masa
• Múltiples miomas → evaluar si hay un "dominante" causando síntomas
• Mioma + infertilidad → considerar cirugía solo si submucoso o si distorsiona cavidad

**Cuándo sospechar malignidad (leiomiosarcoma):**
• Crecimiento rápido documentado
• Crecimiento en posmenopáusica sin TRH
• Síntomas sistémicos (pérdida de peso)
• LDH elevada (marcador inespecífico)
• RM con restricción en difusión y realce heterogéneo

**Errores diagnósticos frecuentes:**
• Confundir adenomiosis con miomatosis (adenomiosis: útero globoso, difuso; miomas: masas discretas)
• No clasificar según FIGO antes de decidir tratamiento
• No descartar embarazo en toda mujer con útero aumentado
• Asumir que todo mioma requiere tratamiento

**💡 Perlas clínicas:**
• Un mioma asintomático generalmente NO requiere tratamiento
• El tamaño del mioma NO predice la severidad de los síntomas
• Los miomas tipo 0-1 son ideales para miomectomía histeroscópica
• La embolización NO se recomienda si hay deseo de fertilidad activo`},{title:"Tratamiento",content:`**PRINCIPIOS:**
• El tratamiento se basa en los SÍNTOMAS, no en el tamaño
• Individualizar según edad, deseo de fertilidad, severidad de síntomas
• Miomas asintomáticos → observación con ecografía anual

**1. Manejo expectante:**
• Indicación: miomas asintomáticos o síntomas leves
• Seguimiento ecográfico cada 6-12 meses
• Educación sobre signos de alarma

**2. Tratamiento médico:**

**Para sangrado:**
• **DIU-LNG (Mirena):** Reduce sangrado 75-95%. No reduce tamaño del mioma
• **Ácido tranexámico:** 1g cada 6-8h durante menstruación
• **ACO combinados:** Pueden reducir sangrado, no reducen tamaño
• **Progestágenos:** Variables resultados

**Para reducir tamaño (preoperatorio o en perimenopausia):**
• **Análogos de GnRH:** Leuprolida 3.75mg IM mensual. Reduce tamaño 40-60% en 3-6 meses. Máximo 6 meses por pérdida ósea. Usar como puente a cirugía
• **Inhibidores de aromatasa:** Letrozol (uso off-label)
• **Moduladores selectivos de receptores de progesterona:**
  - Ulipristal 5mg/día (retirado en varios países por hepatotoxicidad)
  - Relagolix (aprobado 2021) + estradiol/noretisterona

**3. Tratamiento quirúrgico:**

**Miomectomía (conserva útero):**
• **Histeroscópica:** Para miomas submucosos tipo 0-2, <4-5 cm. Ambulatoria
• **Laparoscópica:** Para miomas subserosos/intramurales, número limitado
• **Abdominal (laparotomía):** Miomas múltiples, grandes >10 cm, o difícil acceso

**Histerectomía (tratamiento definitivo):**
• Indicaciones: paridad satisfecha, síntomas severos, múltiples miomas, fallo a tratamientos conservadores
• Puede ser vaginal, laparoscópica o abdominal

**4. Tratamientos mínimamente invasivos:**

• **Embolización de arterias uterinas (EAU):**
  - Reduce tamaño 40-60%, mejora síntomas en 85-90%
  - NO recomendada si deseo de fertilidad
  - Contraindicada en miomas pediculados subserosos

• **Ablación por radiofrecuencia (Acessa):**
  - Destrucción térmica guiada por imagen

• **HIFU (ultrasonido focalizado de alta intensidad):**
  - No invasivo, guiado por RM
  - Resultados variables, disponibilidad limitada

**5. Seguimiento:**
• Post-miomectomía: ecografía a los 3-6 meses, luego anual
• Riesgo de recurrencia: 15-30% a 5 años post-miomectomía`},{title:"Complicaciones",content:`**Complicaciones de la enfermedad:**
• Anemia ferropénica crónica severa
• Hidronefrosis y falla renal (raro, miomas grandes)
• Degeneración roja (en embarazo): dolor agudo, fiebre
• Infertilidad
• Complicaciones obstétricas

**Complicaciones quirúrgicas:**
• Hemorragia intraoperatoria
• Lesión de órganos adyacentes (vejiga, intestino, uréter)
• Adherencias posquirúrgicas
• Ruptura uterina en embarazo posterior (post-miomectomía con entrada a cavidad)
• Conversión a histerectomía en miomectomía

**Síndrome postembolización:**
• Dolor, fiebre, náuseas 24-72 horas postembolización
• Autolimitado, manejo sintomático

**Degeneración maligna:**
• Leiomiosarcoma: <0.5% de los "miomas"
• Generalmente son sarcomas de novo, no transformación`},{title:"Prevención",content:`**Prevención primaria:**
• Control de peso
• Dieta rica en frutas, vegetales, vitamina D
• Ejercicio regular
• Limitar consumo de carnes rojas y alcohol

**Prevención secundaria:**
• Diagnóstico temprano con ecografía en mujeres sintomáticas
• Seguimiento regular de miomas conocidos
• Tratamiento oportuno de la anemia

**Prevención terciaria:**
• Tratamiento adecuado para prevenir complicaciones
• Prevención de recurrencia post-miomectomía (evidencia limitada)`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• Clasificación FIGO (0-8) es fundamental para decidir abordaje quirúrgico
• Submucosos tipo 0-2 → histeroscopia
• El DIU-LNG es efectivo para el sangrado, NO para reducir tamaño
• Los análogos de GnRH reducen tamaño pero son temporales (máx 6 meses)
• La embolización está contraindicada si hay deseo de fertilidad activo

**Conceptos clave:**
• El tratamiento se basa en SÍNTOMAS, no en tamaño
• Crecimiento rápido posmenopáusico = descartar leiomiosarcoma
• Mioma asintomático = NO tratar, observar
• La histerectomía es el único tratamiento DEFINITIVO

**Errores comunes:**
• Operar miomas asintomáticos "profilácticamente"
• No clasificar miomas antes de cirugía
• Usar análogos de GnRH >6 meses sin add-back
• No evaluar el impacto real del mioma en la infertilidad

**Lo indispensable para el médico general:**
• Saber cuándo referir: sangrado severo, anemia, síntomas de masa, crecimiento rápido
• Iniciar suplemento de hierro si hay anemia
• Conocer que la mayoría de miomas son asintomáticos y no requieren tratamiento`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 228: Management of Symptomatic Uterine Leiomyomas. Obstet Gynecol. 2021;137(6):e100-e115.
• Stewart EA. Uterine fibroids. N Engl J Med. 2015;372:1646-55.
• Munro MG, et al. The FIGO classification system for uterine leiomyomas. Int J Gynaecol Obstet. 2011;113(1):3-13.
• Williams Gynecology, 4th Edition. Chapter 9: Benign Uterine Pathology.
• UpToDate: "Uterine leiomyomas (fibroids): Epidemiology, clinical features, diagnosis, and natural history." 2024.
• NICE Guideline NG88: Heavy menstrual bleeding: assessment and management. 2021.`}]},{id:"enfermedad-pelvica-inflamatoria",name:"Enfermedad Pélvica Inflamatoria",category:"ginecologia",subcategory:"its",icon:"🔥",severity:"high",tags:["EPI","PID","salpingitis","Chlamydia","gonorrea","dolor pélvico","infertilidad"],sections:[{title:"Definición",content:`La enfermedad pélvica inflamatoria (EPI) es un síndrome clínico que resulta de la infección ascendente del tracto genital superior femenino, incluyendo endometritis, salpingitis, ooforitis, parametritis, absceso tubo-ovárico y/o peritonitis pélvica.

**Importancia clínica:** Es una de las infecciones más frecuentes en mujeres jóvenes sexualmente activas. Causa principal de infertilidad tubárica, embarazo ectópico y dolor pélvico crónico. El diagnóstico y tratamiento tempranos son cruciales para prevenir secuelas.

**Epidemiología:** Incidencia: aproximadamente 1 millón de casos/año en EE.UU. Mayor incidencia en mujeres de 15-25 años. El 10-15% de las mujeres con EPI desarrollan infertilidad; este riesgo aumenta con cada episodio (8% después del primero, 20% después del segundo, 40% después del tercero).`},{title:"Anatomía y Fisiopatología",content:`**Mecanismo de infección:**
1. Infección ascendente desde el tracto genital inferior (cérvix, vagina)
2. Los microorganismos atraviesan el canal cervical
3. Infección del endometrio (endometritis) → trompas de Falopio (salpingitis) → ovarios → peritoneo pélvico

**Factores que facilitan la ascensión:**
• Menstruación (el moco cervical es menos protector)
• Procedimientos intrauterinos (DIU, legrado, HSG)
• Flujo retrógrado durante la menstruación

**Agentes etiológicos:**
• **Neisseria gonorrhoeae:** 30-40% de los casos
• **Chlamydia trachomatis:** 30-50% de los casos (puede ser subclínica)
• **Infección polimicrobiana:** Frecuente (anaerobios, E. coli, Mycoplasma, Ureaplasma)
• **Flora vaginal:** Gardnerella, bacterias anaerobias

**Consecuencias fisiopatológicas:**
• Inflamación → daño del epitelio tubárico → adherencias intraluminales
• Daño ciliar → alteración del transporte del óvulo
• Obstrucción tubárica → infertilidad, hidrosalpinx
• Adherencias peritubáricas → embarazo ectópico`},{title:"Factores de Riesgo",content:`**Alto riesgo:**
• Edad 15-25 años
• Múltiples parejas sexuales
• Nueva pareja sexual en los últimos 90 días
• Pareja con ITS
• Antecedente de EPI (recurrencia 20-25%)
• Antecedente de ITS (especialmente Chlamydia o gonorrea)
• No uso de métodos de barrera

**Riesgo moderado:**
• Inicio temprano de actividad sexual
• Duchas vaginales
• Vaginosis bacteriana
• DIU (riesgo solo en las primeras 3 semanas post-inserción)
• Procedimientos uterinos recientes

**Factores protectores:**
• Uso consistente de condón
• Monogamia
• Anticonceptivos hormonales (espesan moco cervical, pero NO protegen completamente)
• Circuncisión de la pareja masculina`},{title:"Clasificación",content:`**Por severidad clínica:**
• **EPI leve:** Síntomas leves, sin fiebre, sin masa pélvica
• **EPI moderada:** Fiebre, dolor moderado-severo, leucocitosis
• **EPI severa:** Absceso tubo-ovárico, peritonitis, sepsis

**Por presentación:**
• **EPI aguda:** Síntomas <30 días
• **EPI subclínica (silente):** Asintomática o mínimamente sintomática. Diagnóstico incidental (laparoscopia o hallazgo de secuelas)

**Clasificación laparoscópica (Gainesville/Hager):**
• **Leve:** Eritema, edema, exudado, trompas móviles
• **Moderada:** Material purulento, adherencias laxas
• **Severa:** Piosalpinx, absceso tubo-ovárico

**Complicaciones específicas:**
• Endometritis
• Salpingitis
• Absceso tubo-ovárico (ATO)
• Perihepatitis (síndrome de Fitz-Hugh-Curtis)
• Peritonitis pélvica`},{title:"Manifestaciones Clínicas",content:`**Síntomas cardinales:**
• Dolor pélvico o abdominal bajo bilateral (95%)
• Dispareunia
• Sangrado irregular o poscoital
• Flujo vaginal anormal (purulento)
• Disuria

**Signos clínicos:**
• Dolor a la movilización cervical (signo de Chandelier)
• Dolor anexial bilateral a la palpación
• Sensibilidad uterina
• Flujo cervical mucopurulento
• Fiebre (>38°C en casos moderados-severos)

**Síndrome de Fitz-Hugh-Curtis:**
• Perihepatitis (adherencias "en cuerdas de violín")
• Dolor en hipocondrio derecho
• Puede simular colecistitis
• Más frecuente con Chlamydia

**EPI subclínica:**
• Asintomática o síntomas mínimos
• Descubierta al investigar infertilidad
• Puede causar daño tubárico silencioso

**🚩 Banderas rojas (hospitalización):**
• Fiebre alta (>38.5°C)
• Náuseas, vómitos (incapacidad de tolerar VO)
• Masa anexial (sospecha de ATO)
• Embarazo no puede descartarse
• Peritonitis
• Fallo al tratamiento ambulatorio a las 72 horas
• Diagnóstico incierto (descartar apendicitis, embarazo ectópico)`},{title:"Diagnóstico",content:`**CRITERIOS DIAGNÓSTICOS CDC (2021):**

**Criterios mínimos (requiere todos para iniciar tratamiento empírico):**
• Dolor pélvico o abdominal bajo
• Y UNO de los siguientes al examen:
  - Dolor a la movilización cervical
  - Dolor uterino a la palpación
  - Dolor anexial a la palpación

**Criterios adicionales (aumentan especificidad):**
• Fiebre >38.3°C (101°F)
• Flujo cervical mucopurulento o cervicitis
• Leucocitos abundantes en secreción vaginal (preparación en fresco)
• Velocidad de sedimentación globular (VSG) elevada
• Proteína C reactiva (PCR) elevada
• Documentación de infección cervical por N. gonorrhoeae o C. trachomatis

**Criterios definitivos (específicos pero no necesarios para tratar):**
• Biopsia endometrial con endometritis
• Ecografía o RM con trompas engrosadas, líquido libre o ATO
• Hallazgos laparoscópicos compatibles con EPI

**Estudios a solicitar:**
• β-hCG (descartar embarazo/ectópico SIEMPRE)
• PCR para Chlamydia y gonorrea (cervical o vaginal)
• Hemograma, VSG, PCR
• Examen en fresco de secreción vaginal (leucocitos, tricomonas, células clave)
• Ecografía pélvica (si sospecha de ATO o diagnóstico incierto)
• Serología para VIH y sífilis (tamización de ITS)

**Diagnósticos diferenciales:**
• Embarazo ectópico (¡siempre descartar!)
• Apendicitis
• Quiste ovárico roto o torsión
• Endometriosis
• Infección urinaria/pielonefritis
• Gastroenteritis`},{title:"Interpretación Clínica",content:`**Correlación clínica:**
• Dolor bilateral + flujo purulento + movilización cervical dolorosa → alta probabilidad de EPI
• Dolor unilateral con masa → descartar ATO, embarazo ectópico, torsión
• Dolor en hipocondrio derecho + antecedente de EPI → Fitz-Hugh-Curtis

**Cuándo sospechar gravedad:**
• Fiebre alta persistente
• Leucocitosis >15,000
• Masa pélvica (ATO)
• Datos de peritonitis
• Paciente inmunocomprometida

**Errores diagnósticos frecuentes:**
• No descartar embarazo ectópico
• No buscar infección por Chlamydia (frecuentemente subclínica)
• Confundir con apendicitis o patología urinaria
• Subestimar EPI subclínica en pacientes con infertilidad
• No tratar a la pareja

**💡 Perlas clínicas:**
• El umbral para iniciar tratamiento empírico debe ser BAJO (las secuelas son graves)
• La laparoscopia es el gold standard diagnóstico pero NO es necesaria para tratar
• Hasta el 70% de las EPI por Chlamydia son asintomáticas o subclínicas
• Siempre tratar a TODAS las parejas sexuales de los últimos 60 días`},{title:"Tratamiento",content:`**PRINCIPIOS:**
• Tratamiento EMPÍRICO ante sospecha clínica (no esperar cultivos)
• Cobertura para N. gonorrhoeae, C. trachomatis y anaerobios
• Tratar a la(s) pareja(s) sexual(es)
• Seguimiento a las 48-72 horas

**TRATAMIENTO AMBULATORIO (EPI leve-moderada):**

**Régimen recomendado CDC 2021:**
• Ceftriaxona 500mg IM dosis única (si >150kg: 1g)
  + Doxiciclina 100mg VO cada 12h × 14 días
  + Metronidazol 500mg VO cada 12h × 14 días

**Régimen alternativo:**
• Cefoxitina 2g IM + Probenecid 1g VO dosis única
  + Doxiciclina 100mg VO cada 12h × 14 días
  ± Metronidazol 500mg VO cada 12h × 14 días

**TRATAMIENTO HOSPITALARIO (indicaciones abajo):**

**Régimen A:**
• Cefotetan 2g IV cada 12h O Cefoxitina 2g IV cada 6h
  + Doxiciclina 100mg IV/VO cada 12h
• Continuar 24-48h después de mejoría clínica
• Luego: Doxiciclina 100mg VO cada 12h hasta completar 14 días + Metronidazol 500mg VO cada 12h × 14 días

**Régimen B:**
• Clindamicina 900mg IV cada 8h
  + Gentamicina 2mg/kg carga, luego 1.5mg/kg cada 8h (o 5mg/kg cada 24h)
• Continuar 24-48h después de mejoría
• Luego: Doxiciclina 100mg VO cada 12h × 14 días O Clindamicina 450mg VO cada 6h × 14 días

**INDICACIONES DE HOSPITALIZACIÓN:**
• Diagnóstico incierto (no puede descartarse emergencia quirúrgica)
• Absceso tubo-ovárico
• Embarazo
• Falla al tratamiento ambulatorio (sin mejoría a las 72h)
• Intolerancia o imposibilidad de tratamiento oral
• Enfermedad severa (fiebre alta, náuseas/vómitos, peritonitis)
• Inmunocompromiso (VIH con CD4 bajo)

**ABSCESO TUBO-OVÁRICO:**
• Hospitalización obligatoria
• Antibióticos IV de amplio espectro (régimen hospitalario + clindamicina)
• Drenaje (percutáneo o quirúrgico) si >8-10 cm o no respuesta a antibióticos en 48-72h
• Cirugía si ruptura (emergencia)

**TRATAMIENTO DE PAREJAS:**
• Tratamiento presuntivo para gonorrea y Chlamydia
• Todas las parejas sexuales de los últimos 60 días
• Si la última pareja fue >60 días antes de síntomas, tratar a la pareja más reciente
• Abstinencia sexual hasta completar tratamiento y resolución de síntomas`},{title:"Complicaciones",content:`**Agudas:**
• Absceso tubo-ovárico (15-35%)
• Ruptura de ATO → peritonitis → sepsis (emergencia)
• Perihepatitis (Fitz-Hugh-Curtis)
• Peritonitis pélvica

**Crónicas (secuelas a largo plazo):**
• **Infertilidad tubárica:**
  - 8% después del primer episodio
  - 20% después del segundo
  - 40% después del tercero
• **Embarazo ectópico:** Riesgo aumentado 6-10 veces
• **Dolor pélvico crónico:** 18-40%
• **Recurrencia:** 20-25%
• **Hidrosalpinx**
• **Adherencias pélvicas**`},{title:"Prevención",content:`**Prevención primaria:**
• Educación sexual
• Uso consistente de condón
• Limitar número de parejas sexuales
• Tamización anual de Chlamydia y gonorrea en mujeres <25 años sexualmente activas
• Tamización en mujeres >25 años con factores de riesgo

**Prevención secundaria:**
• Detección y tratamiento temprano de cervicitis
• Tratamiento oportuno de la EPI para prevenir secuelas
• Tratamiento de todas las parejas sexuales

**Prevención terciaria:**
• Seguimiento para confirmar resolución
• Tamización posterior a las 3 meses para reinfección
• Evaluación de fertilidad si hay deseo de embarazo post-EPI`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• Criterios mínimos CDC: dolor pélvico + dolor a la movilización cervical/uterina/anexial
• Ceftriaxona + Doxiciclina + Metronidazol = tratamiento ambulatorio estándar
• El umbral para tratar debe ser BAJO (las secuelas son graves)
• Siempre descartar embarazo ectópico
• Tratar a TODAS las parejas de los últimos 60 días

**Conceptos clave:**
• Chlamydia causa EPI "silente" que puede diagnosticarse tardíamente
• El riesgo de infertilidad aumenta con cada episodio
• El seguimiento a las 72 horas es obligatorio
• El ATO >8-10 cm o sin respuesta a antibióticos → drenaje

**Lo indispensable:**
• Ante duda diagnóstica → tratar (riesgo de secuelas > riesgo de sobretratamiento)
• β-hCG SIEMPRE antes de iniciar tratamiento
• Notificación de pareja y tratamiento
• Tamización de otras ITS (VIH, sífilis)`},{title:"Referencias Bibliográficas",content:`• CDC STI Treatment Guidelines 2021: Pelvic Inflammatory Disease.
• ACOG Committee Opinion No. 777: Sexual Health. 2019.
• Brunham RC, et al. Pelvic inflammatory disease. N Engl J Med. 2015;372:2039-48.
• Ross J, et al. European guideline for the management of pelvic inflammatory disease. Int J STD AIDS. 2018;29(2):108-114.
• Williams Gynecology, 4th Edition. Chapter 3: Pelvic Infection.
• UpToDate: "Pelvic inflammatory disease: Clinical manifestations and diagnosis." 2024.`}]},{id:"diabetes-gestacional",name:"Diabetes Gestacional",category:"obstetricia",icon:"🍬",severity:"high",tags:["DMG","diabetes","embarazo","macrosomía","PTOG","insulina"],sections:[{title:"Definición",content:`La diabetes mellitus gestacional (DMG) se define como cualquier grado de intolerancia a la glucosa que se reconoce por primera vez durante el embarazo, independientemente de si la condición persiste después del parto.

**Nota importante:** La definición actual (IADPSG/OMS 2013) distingue entre:
• **Diabetes en el embarazo (diabetes manifiesta):** Glucosa ayuno ≥126 mg/dL, glucosa aleatoria ≥200 mg/dL con síntomas, o HbA1c ≥6.5% en el primer trimestre
• **Diabetes gestacional:** Hiperglucemia diagnosticada en el segundo-tercer trimestre que no cumple criterios de diabetes manifiesta

**Importancia clínica:** La DMG se asocia con complicaciones maternas y fetales significativas, incluyendo macrosomía, distocia de hombros, cesárea, preeclampsia, y riesgo aumentado de diabetes tipo 2 materna y obesidad/diabetes en la descendencia.

**Epidemiología:** Prevalencia: 6-25% de los embarazos según los criterios utilizados y la población. Ha aumentado significativamente debido a la epidemia de obesidad. Es más frecuente en mujeres hispanas, afrodescendientes, asiáticas e indígenas.`},{title:"Anatomía y Fisiopatología",content:`**Fisiología normal del embarazo:**
• El embarazo es un estado de resistencia a la insulina fisiológica
• Las hormonas placentarias (lactógeno placentario humano, progesterona, cortisol, prolactina) causan resistencia a la insulina progresiva
• En el embarazo normal, el páncreas compensa aumentando la secreción de insulina 2-3 veces

**Fisiopatología de la DMG:**
• Las mujeres con DMG tienen una secreción de insulina insuficiente para compensar la resistencia fisiológica
• Existe disfunción de células β pancreáticas previa (subclínica)
• La resistencia a la insulina máxima ocurre en el tercer trimestre (semanas 24-28) → por eso el tamizaje se hace en este período

**Consecuencias de la hiperglucemia:**
• **Macrosomía fetal:** La glucosa cruza la placenta → hiperglucemia fetal → hiperinsulinemia fetal → crecimiento excesivo (especialmente tejido adiposo)
• **Hipoglucemia neonatal:** El neonato continúa produciendo insulina elevada tras el parto pero ya no recibe glucosa materna
• **Otras complicaciones neonatales:** Policitemia, hiperbilirrubinemia, hipocalcemia, síndrome de dificultad respiratoria
• **Complicaciones maternas:** Mayor riesgo de preeclampsia, cesárea, trauma perineal`},{title:"Factores de Riesgo",content:`**Alto riesgo:**
• Antecedente de DMG en embarazo previo (recurrencia 30-50%)
• Antecedente de macrosomía (>4,000g)
• IMC ≥30 (obesidad)
• Síndrome de ovario poliquístico
• Glucosa en ayunas alterada previa (100-125 mg/dL)
• HbA1c 5.7-6.4% (prediabetes)
• Antecedente de muerte fetal inexplicada
• Familiar de primer grado con diabetes tipo 2
• Etnicidad de alto riesgo: hispana, afrodescendiente, asiática, islas del Pacífico, indígena americana

**Riesgo moderado:**
• Edad materna ≥25-35 años
• IMC 25-29.9 (sobrepeso)
• Multiparidad

**Bajo riesgo (todos los criterios):**
• Edad <25 años
• IMC normal (<25)
• Sin antecedentes familiares de diabetes
• Sin antecedentes obstétricos adversos
• Etnicidad de bajo riesgo (caucásica)`},{title:"Clasificación",content:`**Clasificación de White (histórica, poco usada actualmente):**
• Clase A1: DMG controlada con dieta
• Clase A2: DMG que requiere insulina
(Las clases B-H se refieren a diabetes pregestacional)

**Clasificación práctica actual:**
• **DMG controlada con dieta:** Alcanza metas glucémicas solo con dieta y ejercicio
• **DMG que requiere farmacoterapia:** Necesita insulina o metformina para alcanzar metas

**Según momento de diagnóstico:**
• Diagnóstico en primer trimestre con criterios de DMG → probable diabetes preexistente no diagnosticada
• Diagnóstico en semanas 24-28 → DMG clásica
• Diagnóstico tardío (>28 semanas) → DMG de diagnóstico tardío

**Criterios diagnósticos (ver sección de diagnóstico):**
• Método de un paso (IADPSG/OMS): PTOG 75g
• Método de dos pasos (Carpenter-Coustan/ACOG): Tamizaje con 50g → confirmatoria con 100g`},{title:"Manifestaciones Clínicas",content:`**La DMG es generalmente ASINTOMÁTICA**

Por eso el diagnóstico depende del tamizaje universal.

**Síntomas (cuando presentes, sugieren diabetes manifiesta o mal control):**
• Poliuria
• Polidipsia
• Polifagia
• Pérdida de peso inexplicada
• Fatiga excesiva
• Visión borrosa
• Infecciones recurrentes (candidiasis, ITU)

**Hallazgos que sugieren DMG mal controlada:**
• Polihidramnios (exceso de líquido amniótico)
• Feto grande para edad gestacional (LGA)
• Ganancia de peso materna excesiva

**🚩 Banderas rojas:**
• Cetonuria
• Hiperglucemia severa (>250 mg/dL)
• Polihidramnios severo
• Macrosomía fetal en ecografía`},{title:"Diagnóstico",content:`**TAMIZAJE UNIVERSAL entre las 24-28 semanas**

**Método de UN paso (IADPSG/OMS 2013, ADA):**
• Prueba de tolerancia oral a la glucosa (PTOG) con 75g de glucosa
• Requiere ayuno de 8-14 horas
• Diagnóstico: UNO o más valores alterados:
  - Ayuno ≥92 mg/dL
  - 1 hora ≥180 mg/dL
  - 2 horas ≥153 mg/dL

**Método de DOS pasos (ACOG, NIH):**
• **Paso 1 - Tamizaje:** Prueba de 50g de glucosa (no requiere ayuno)
  - Positivo si glucosa a la hora ≥130-140 mg/dL (umbral variable según institución)
  - Si es positivo → paso 2
• **Paso 2 - Confirmación:** PTOG con 100g (ayuno)
  - Diagnóstico: DOS o más valores alterados (Carpenter-Coustan):
    - Ayuno ≥95 mg/dL
    - 1 hora ≥180 mg/dL
    - 2 horas ≥155 mg/dL
    - 3 horas ≥140 mg/dL

**Diagnóstico en el PRIMER trimestre (mujeres de alto riesgo):**
• Si glucosa ayuno ≥126 mg/dL → Diabetes manifiesta (no es DMG)
• Si glucosa ayuno 92-125 mg/dL → Algunos protocolos diagnostican DMG temprana
• Si glucosa ayuno <92 mg/dL → Repetir tamizaje a las 24-28 semanas

**HbA1c en el primer trimestre:**
• ≥6.5% → Diabetes manifiesta preexistente
• 5.7-6.4% → Alto riesgo, vigilancia estrecha

**Estudios adicionales en DMG diagnosticada:**
• Perfil renal (creatinina, proteinuria)
• Fondo de ojo si sospecha de diabetes preexistente
• Ecografía obstétrica cada 4 semanas para crecimiento fetal
• Monitoreo fetal (NST, PBF) a partir de las 32-34 semanas`},{title:"Interpretación Clínica",content:`**Metas de control glucémico (automonitoreo):**
• Glucosa ayuno: <95 mg/dL
• Glucosa 1 hora postprandial: <140 mg/dL
• Glucosa 2 horas postprandial: <120 mg/dL

**Indicaciones de inicio de insulina:**
• Fallo en alcanzar metas con dieta y ejercicio (2 semanas)
• >20-30% de las glucemias fuera de meta
• Evidencia de crecimiento fetal excesivo

**Cuándo sospechar diabetes preexistente no diagnosticada:**
• HbA1c ≥6.5% en cualquier momento
• Glucosa ayuno ≥126 mg/dL en primer trimestre
• Retinopatía o nefropatía
• Requerimiento de altas dosis de insulina desde el inicio

**Errores diagnósticos frecuentes:**
• No realizar tamizaje universal
• Usar solo glucosa en ayuno (pierde 50% de los casos)
• No repetir tamizaje si primer resultado normal pero hay factores de riesgo
• Confundir DMG con diabetes preexistente

**💡 Perlas clínicas:**
• La glucosa posprandial de 1 hora es el mejor predictor de macrosomía
• HbA1c NO se usa para diagnosticar DMG (cambia fisiológicamente en embarazo)
• Mujeres con DMG tienen 50% de riesgo de desarrollar DM2 en los próximos 10-20 años`},{title:"Tratamiento",content:`**PILARES DEL TRATAMIENTO:**
1. Terapia médica nutricional (dieta)
2. Actividad física
3. Monitoreo glucémico
4. Farmacoterapia si es necesaria
5. Vigilancia fetal

**1. Terapia Médica Nutricional:**
• Carbohidratos: 40-50% del total calórico
• Distribuir en 3 comidas + 2-3 refrigerios
• Evitar carbohidratos simples
• Preferir carbohidratos complejos con bajo índice glucémico
• Calorías: 30-35 kcal/kg de peso ideal (reducir si IMC >30)

**2. Ejercicio:**
• Caminata 30 minutos/día o 150 min/semana
• Caminar después de las comidas reduce picos glucémicos
• Contraindicado si hay restricción de actividad por otras complicaciones

**3. Monitoreo glucémico:**
• Glucemia capilar 4 veces/día: ayunas + 1h post-desayuno, almuerzo, cena
• Registro para evaluar control y ajustar tratamiento
• Algunas guías aceptan 2h postprandial (meta <120 mg/dL)

**4. Farmacoterapia:**

**Insulina (tratamiento de elección):**
• Indicada si falla la dieta en 1-2 semanas
• No cruza la placenta → segura para el feto
• **Esquema inicial:**
  - Insulina NPH al acostarse: 0.1-0.2 U/kg si ayuno elevado
  - Insulina rápida (lispro, aspart): 2-4 U pre-comidas si postprandial elevada
• Ajustar según glucemias cada 3-7 días
• Las necesidades aumentan a lo largo del embarazo

**Metformina (alternativa):**
• Categoría B en embarazo, cruza la placenta
• 500-2500 mg/día dividido en 2-3 dosis
• Considerar si rechazo a insulina o imposibilidad de administración
• Puede combinarse con insulina
• NO usar si creatinina elevada o preeclampsia

**Gliburida:**
• Antes se usaba, ahora menos recomendada
• Mayor tasa de hipoglucemia neonatal y macrosomía vs. insulina
• NO recomendada por algunas guías (ACOG 2018)

**5. Vigilancia Fetal:**
• Ecografía cada 4 semanas para evaluar crecimiento
• NST y/o perfil biofísico a partir de semana 32-34
• En DMG bien controlada con dieta: vigilancia menos intensiva
• En DMG mal controlada o con insulina: vigilancia semanal desde semana 32

**6. Momento del parto:**
• **DMG bien controlada con dieta:** Puede esperarse hasta semana 40-41
• **DMG con insulina bien controlada:** Considerar parto a las 39 semanas
• **DMG mal controlada o con macrosomía:** Individualizar, puede requerirse parto más temprano
• **Cesárea:** Considerar si peso fetal estimado >4,500g para reducir riesgo de distocia`},{title:"Complicaciones",content:`**Complicaciones fetales/neonatales:**
• **Macrosomía:** Peso al nacer >4,000g (riesgo de distocia)
• **Distocia de hombros:** Atrapamiento del hombro en el canal de parto
• **Trauma al nacimiento:** Fractura de clavícula, parálisis braquial
• **Hipoglucemia neonatal:** En las primeras horas de vida
• **Hiperbilirrubinemia y policitemia**
• **Hipocalcemia**
• **Síndrome de dificultad respiratoria:** La hiperinsulinemia retrasa la maduración pulmonar
• **Cardiomiopatía hipertrófica** (generalmente transitoria)
• **Mayor riesgo de obesidad y diabetes en la vida adulta**

**Complicaciones maternas:**
• Preeclampsia (riesgo aumentado 2-4 veces)
• Cesárea (2-3 veces más frecuente)
• Trauma perineal
• Hemorragia posparto
• Polihidramnios
• Infecciones (ITU, endometritis)
• Progresión a diabetes tipo 2 (50% en 10-20 años)`},{title:"Prevención",content:`**Prevención primaria (antes del embarazo):**
• Alcanzar peso saludable antes de la concepción
• Ejercicio regular
• Dieta balanceada

**Prevención secundaria:**
• Tamizaje universal entre 24-28 semanas
• Diagnóstico y tratamiento oportunos
• Control glucémico estricto para prevenir complicaciones

**Prevención posparto:**
• **PTOG 75g a las 4-12 semanas posparto** (reclasificar estado glucémico)
• Tamizaje de diabetes cada 1-3 años de por vida
• Lactancia materna (reduce riesgo de DM2)
• Pérdida de peso si hay sobrepeso/obesidad
• Metformina en algunas mujeres de muy alto riesgo
• Educación sobre alto riesgo futuro de DM2`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• Tamizaje universal a las 24-28 semanas
• PTOG 75g (un paso) o 50g tamizaje + 100g confirmatoria (dos pasos)
• Metas: Ayuno <95, 1h post <140, 2h post <120 mg/dL
• La insulina es el tratamiento de elección (no cruza placenta)
• Gliburida NO recomendada (ACOG)
• PTOG posparto a las 4-12 semanas para reclasificar

**Conceptos clave:**
• El 50% de las mujeres con DMG desarrollarán DM2 en 10-20 años
• La glucosa posprandial 1h es el mejor predictor de macrosomía
• HbA1c NO sirve para diagnosticar DMG
• La metformina cruza la placenta pero es categoría B

**Lo indispensable:**
• Tamizar a TODAS las embarazadas
• Referir si falla el control con dieta
• Conocer las metas glucémicas
• Planificar el momento del parto según control y crecimiento fetal`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 190: Gestational Diabetes Mellitus. Obstet Gynecol. 2018;131(2):e49-e64.
• American Diabetes Association. Standards of Medical Care in Diabetes - 2024. Diabetes Care. 2024;47(Suppl 1).
• International Association of Diabetes and Pregnancy Study Groups (IADPSG). Diabetes Care. 2010;33(3):676-82.
• HAPO Study Cooperative Research Group. N Engl J Med. 2008;358:1991-2002.
• Williams Obstetrics, 26th Edition. Chapter 57: Diabetes Mellitus.
• UpToDate: "Gestational diabetes mellitus: Screening, diagnosis, and prevention." 2024.`}]},{id:"ruptura-prematura-membranas",name:"Ruptura Prematura de Membranas",category:"obstetricia",icon:"💧",severity:"high",tags:["RPM","RPMP","membranas","líquido amniótico","corioamnionitis","pretérmino"],sections:[{title:"Definición",content:`La ruptura prematura de membranas (RPM) se define como la ruptura de las membranas corioamnióticas ANTES del inicio del trabajo de parto.

**Clasificaciones:**
• **RPM a término (RPMT):** Ruptura ≥37 semanas de gestación
• **RPM pretérmino (RPMP):** Ruptura <37 semanas de gestación
• **RPMP previable:** Ruptura <23-24 semanas (límite de viabilidad)
• **Período de latencia:** Tiempo entre la ruptura y el inicio del parto

**Importancia clínica:** La RPMP es responsable del 30-40% de los partos pretérmino y es una causa importante de morbilidad y mortalidad neonatal. A término, el 95% de las mujeres inician trabajo de parto espontáneo en 24-72 horas.

**Epidemiología:** Ocurre en 8-10% de todos los embarazos. La RPMT ocurre en el 8% de los embarazos. La RPMP ocurre en el 2-3% de los embarazos pero causa hasta el 40% de los partos pretérmino.`},{title:"Anatomía y Fisiopatología",content:`**Estructura de las membranas fetales:**
• **Amnios:** Membrana interna, avascular, resistente a la tracción
• **Corion:** Membrana externa, vascularizada, más gruesa pero menos resistente
• Ambas membranas están fusionadas y juntas proporcionan resistencia estructural

**Mecanismos de ruptura:**
1. **Debilitamiento focal de las membranas:**
   - Infección subclínica ascendente (más frecuente)
   - Degradación enzimática (metaloproteinasas de matriz: MMP-1, MMP-9)
   - Apoptosis celular
   
2. **Aumento de presión intrauterina:**
   - Polihidramnios
   - Embarazo múltiple
   - Contracciones uterinas

3. **Causas mecánicas:**
   - Procedimientos invasivos (amniocentesis, cerclaje)
   - Traumatismo
   - Incompetencia cervical

**Consecuencias de la RPM:**
• Pérdida de barrera contra infección → corioamnionitis
• Compresión del cordón umbilical (oligohidramnios)
• Prolapso de cordón (emergencia)
• Desprendimiento de placenta
• En RPMP: hipoplasia pulmonar, contracturas de extremidades (oligohidramnios severo prolongado)`},{title:"Factores de Riesgo",content:`**Alto riesgo:**
• Antecedente de RPMP (recurrencia 15-30%)
• Infección del tracto genital (vaginosis bacteriana, tricomoniasis, GBS, Chlamydia)
• Sangrado vaginal en el embarazo actual
• Longitud cervical corta (<25 mm en segundo trimestre)
• Cerclaje cervical
• Procedimientos invasivos previos (amniocentesis)
• Tabaquismo

**Riesgo moderado:**
• Bajo peso materno/bajo IMC
• Deficiencias nutricionales (cobre, ácido ascórbico, zinc)
• Infecciones urinarias
• Enfermedad pulmonar crónica (tos crónica)
• Sobredistensión uterina (polihidramnios, embarazo múltiple)
• Bajo nivel socioeconómico

**Protectores:**
• Control prenatal adecuado
• Tratamiento de infecciones vaginales`},{title:"Clasificación",content:`**Por edad gestacional:**
• **RPMP previable:** <23-24 semanas (límite de viabilidad)
• **RPMP temprana:** 24-33+6 semanas (máximo beneficio de corticoides)
• **RPMP tardía:** 34-36+6 semanas (pretérmino tardío)
• **RPM a término:** ≥37 semanas

**Por período de latencia:**
• Latencia <24 horas
• Latencia prolongada: >24 horas (aumenta riesgo de infección)

**Por características del líquido:**
• Líquido claro
• Líquido meconial (signo de madurez o sufrimiento fetal)
• Líquido fétido o purulento (signo de corioamnionitis)`},{title:"Manifestaciones Clínicas",content:`**Síntoma principal:**
• Salida de líquido por vagina (chorro súbito o goteo persistente)
• El líquido amniótico es claro, inodoro y puede tener olor a lavandina

**Historia clínica:**
• Hora de ruptura (para calcular período de latencia)
• Cantidad de líquido (chorro vs. goteo)
• Color del líquido (claro, verdoso, sanguinolento)
• Presencia de contracciones
• Movimientos fetales
• Fiebre o síntomas de infección

**Diagnóstico diferencial de salida de líquido:**
• Incontinencia urinaria (muy común en embarazo)
• Flujo vaginal abundante
• Semen
• Pérdida del tapón mucoso
• Sangrado vaginal

**🚩 Signos de corioamnionitis (infección intraamniótica):**
• Fiebre materna ≥38°C (100.4°F)
• Taquicardia materna (>100 lpm)
• Taquicardia fetal (>160 lpm)
• Sensibilidad uterina
• Líquido amniótico fétido o purulento
• Leucocitosis materna (>15,000)`},{title:"Diagnóstico",content:`**1. Historia clínica compatible:**
• Salida de líquido por vagina

**2. Especuloscopia (ANTES del tacto vaginal):**
• Visualización de líquido saliendo del orificio cervical externo (diagnóstico definitivo)
• Acumulación de líquido en fondo de saco posterior
• Maniobra de Valsalva o presión fúndica puede ayudar

**3. Pruebas complementarias:**

**Prueba de helecho (cristalización):**
• Se toma muestra de líquido del fondo de saco
• Se deja secar en portaobjetos y se observa al microscopio
• Patrón de helecho (arborización) = líquido amniótico (por contenido de sales)
• Sensibilidad 85-95%

**Prueba de nitrazina (pH):**
• El líquido amniótico es alcalino (pH 7.1-7.3)
• La vagina es ácida (pH 3.8-4.2)
• Papel de nitrazina cambia de amarillo a azul si pH >6.0-6.5
• Falsos positivos: semen, sangre, vaginosis bacteriana, orina alcalina, antisépticos
• Sensibilidad 90-95%

**Pruebas inmunocromatográficas (AmniSure, ROM Plus):**
• Detectan PAMG-1 (AmniSure) o IGFBP-1 (ROM Plus) en líquido vaginal
• Muy alta sensibilidad y especificidad (95-99%)
• Útiles cuando las pruebas tradicionales son equívocas

**4. Ecografía:**
• Evaluación del índice de líquido amniótico (ILA)
• Oligohidramnios apoya el diagnóstico (pero no es diagnóstico por sí solo)
• ILA <5 cm u oligohidramnios severo
• Confirmar presentación fetal y localización placentaria

**5. Evaluación de infección:**
• Hemograma con diferencial
• PCR, VSG
• Monitoreo fetal (taquicardia fetal = signo temprano de infección)
• Cultivo cervicovaginal (GBS, aunque se dará profilaxis empírica)

**⚠️ NO realizar tacto vaginal a menos que la paciente esté en trabajo de parto activo**
El tacto digital aumenta el riesgo de infección y acorta el período de latencia`},{title:"Tratamiento",content:`**PRINCIPIOS GENERALES:**
• Confirmar el diagnóstico
• Evaluar edad gestacional, bienestar fetal, signos de infección
• Hospitalización para observación
• El manejo depende de la edad gestacional

**RPM A TÉRMINO (≥37 semanas):**
• **Inducción del parto** (método de elección para la mayoría)
• La mayoría entrará en trabajo de parto espontáneo en 24h
• La espera >24h aumenta riesgo de corioamnionitis sin beneficio
• Profilaxis GBS si indicada (cultivo positivo o factores de riesgo)
• Cesárea solo por indicaciones obstétricas habituales

**RPMP (34-36+6 semanas):**
• **ACOG recomienda parto** después de las 34 semanas
• No hay beneficio de prolongar el embarazo después de las 34 semanas
• Administrar corticoides si no los ha recibido (betametasona 12mg IM × 2 dosis) antes del parto
• Profilaxis de GBS
• No dar tocolíticos a largo plazo

**RPMP (24-33+6 semanas):**
• **Manejo expectante** para prolongar el embarazo si no hay contraindicaciones
• **Hospitalización** continua

**Intervenciones obligatorias:**
• **Corticosteroides:** Betametasona 12mg IM × 2 dosis (24h apart) O Dexametasona 6mg IM × 4 dosis (12h apart)
  - Máximo beneficio si el parto ocurre 48h-7 días después de completar el ciclo
  - Reducen mortalidad neonatal, SDR, hemorragia intraventricular, enterocolitis

• **Antibióticos (esquema para prolongar latencia y reducir infección):**
  - Ampicilina 2g IV cada 6h × 48h + Azitromicina 1g VO dosis única
  - Luego: Amoxicilina 500mg VO cada 8h × 5 días
  - Alternativa: Ampicilina + Eritromicina (esquema clásico)
  - **NO usar amoxicilina-clavulánico** (asociado a enterocolitis necrotizante)

• **Sulfato de magnesio para neuroprotección:** Si <32 semanas y parto inminente

• **Tocolíticos:** Solo 48 horas para permitir completar corticoides y transferir a centro con UCI neonatal

**Contraindicaciones para manejo expectante (parto inmediato):**
• Corioamnionitis
• Desprendimiento de placenta
• Prolapso de cordón
• Estado fetal no tranquilizador
• Trabajo de parto avanzado
• Malformación fetal letal

**RPMP PREVIABLE (<23-24 semanas):**
• Consejería sobre pronóstico (alta morbimortalidad neonatal)
• Opciones: manejo expectante vs. interrupción del embarazo
• Si manejo expectante: vigilancia de infección, puede manejarse ambulatoriamente en casos seleccionados
• No se administran corticoides hasta alcanzar viabilidad
• Riesgo de hipoplasia pulmonar, contracturas de extremidades

**Profilaxis GBS:**
• Penicilina G 5 millones U IV inicial, luego 2.5-3 millones U cada 4h hasta el parto
• Alternativa: Ampicilina 2g IV inicial, luego 1g cada 4h`},{title:"Complicaciones",content:`**Maternas:**
• Corioamnionitis (15-25% en RPMP)
• Endometritis posparto
• Desprendimiento de placenta
• Retención placentaria
• Sepsis materna (raro)
• Mayor tasa de cesárea

**Fetales/Neonatales:**
• Prematuridad y sus complicaciones
• Síndrome de dificultad respiratoria
• Infección neonatal/sepsis
• Hemorragia intraventricular
• Enterocolitis necrotizante
• Prolapso de cordón
• Compresión del cordón (oligohidramnios)

**Complicaciones del oligohidramnios prolongado:**
• Hipoplasia pulmonar (RPMP <24 semanas con oligohidramnios severo)
• Contracturas de extremidades (secuencia de Potter)
• Deformidades faciales`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• NO hacer tacto vaginal hasta que la paciente esté en trabajo de parto
• Diagnóstico: especuloscopia + nitrazina + cristalización
• Corticoides: 24-34 semanas (algunos protocolos hasta 36+6)
• NO usar amoxicilina-clavulánico (aumenta enterocolitis)
• Sulfato de magnesio para neuroprotección si <32 semanas

**Conceptos clave:**
• RPM a término → inducción (no esperar >24h)
• RPMP 34-36+6 → parto después de corticoides
• RPMP <34 → manejo expectante si no hay infección
• El período de latencia promedio es inversamente proporcional a la edad gestacional

**Lo indispensable:**
• Confirmar diagnóstico antes de tomar decisiones
• Evaluar signos de infección
• Conocer indicaciones de parto inmediato vs. manejo expectante
• Los corticoides y antibióticos son el estándar de cuidado en RPMP`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 217: Prelabor Rupture of Membranes. Obstet Gynecol. 2020;135(3):e80-e97.
• ACOG Committee Opinion No. 713: Antenatal Corticosteroid Therapy for Fetal Maturation. 2017.
• Mercer BM. Preterm premature rupture of the membranes. Obstet Gynecol. 2003;101:178-93.
• Williams Obstetrics, 26th Edition. Chapter 42: Preterm Labor and Premature Rupture of Membranes.
• UpToDate: "Preterm prelabor rupture of membranes: Clinical manifestations and diagnosis." 2024.`}]},{id:"aborto",name:"Aborto (Pérdida Gestacional Temprana)",category:"obstetricia",subcategory:"urgencias",icon:"💔",severity:"high",tags:["aborto","pérdida gestacional","amenaza","aborto incompleto","legrado","misoprostol"],sections:[{title:"Definición",content:`El aborto se define como la terminación del embarazo antes de las 20 semanas de gestación o con un peso fetal <500 gramos. La OMS define aborto como la pérdida antes de las 22 semanas o <500g.

**Terminología actual preferida:**
• "Pérdida gestacional temprana" o "pérdida del embarazo" (términos más sensibles)
• "Aborto espontáneo" se usa en contexto clínico

**Clasificación por tiempo:**
• **Aborto temprano:** <12 semanas (embrionario) - más frecuente
• **Aborto tardío:** 12-20 semanas (fetal)

**Importancia clínica:** Es la complicación más frecuente del embarazo. Ocurre en el 10-25% de los embarazos clínicamente reconocidos. Si se incluyen las pérdidas antes del diagnóstico clínico, la tasa puede llegar al 50-75%.

**Epidemiología:** 80% ocurren en el primer trimestre. La mayoría (50-70%) se deben a anomalías cromosómicas. El riesgo aumenta con la edad materna: 10% a los 20 años, 20% a los 35 años, 40% a los 40 años, 80% a los 45 años.`},{title:"Anatomía y Fisiopatología",content:`**Causas de aborto espontáneo:**

**1. Anomalías cromosómicas (50-70%):**
• Trisomías autosómicas (más frecuente: trisomía 16)
• Monosomía X (45,X)
• Triploidía, tetraploidía
• A mayor edad materna, mayor riesgo de aneuploidía

**2. Factores maternos:**
• **Anatómicos:** Malformaciones uterinas (útero septado, bicorne), miomas submucosos, incompetencia cervical, sinequias (síndrome de Asherman)
• **Endocrinos:** Diabetes mal controlada, hipotiroidismo, defecto de fase lútea, SOP
• **Trombóticos:** Síndrome antifosfolípido, trombofilias hereditarias
• **Infecciosos:** Listeria, Toxoplasma, CMV, Brucella, Mycoplasma, Ureaplasma
• **Inmunológicos:** Autoinmunidad, aloinmunidad

**3. Factores ambientales/estilo de vida:**
• Tabaquismo (riesgo 1.2-2x)
• Alcohol (>2 bebidas/día)
• Cocaína
• Cafeína (>200mg/día)
• Bajo peso o sobrepeso extremo
• Edad materna avanzada

**Fisiopatología del aborto:**
• Anomalía cromosómica o falla en la implantación → desarrollo embrionario alterado → muerte embrionaria → reacción decidual → hemorragia → desprendimiento → expulsión
• En algunos casos el embrión muere pero la expulsión se retrasa (aborto diferido)`},{title:"Clasificación",content:`**CLASIFICACIÓN CLÍNICA:**

**1. Amenaza de aborto:**
• Sangrado vaginal CON cérvix cerrado
• Embrión/feto viable (con actividad cardíaca)
• El embarazo puede continuar

**2. Aborto inevitable:**
• Sangrado vaginal CON dilatación cervical
• Membranas pueden estar rotas
• El aborto es inminente, no se puede detener

**3. Aborto incompleto:**
• Expulsión parcial del producto
• Restos ovulares en cavidad uterina
• Sangrado persistente, cérvix dilatado
• Útero más pequeño de lo esperado

**4. Aborto completo:**
• Expulsión total del producto de la concepción
• Cese del sangrado y dolor
• Cérvix cerrado
• Útero vacío en ecografía

**5. Aborto diferido (retenido, "missed abortion"):**
• Muerte embrionaria/fetal SIN expulsión
• Sin sangrado significativo (puede haber spotting)
• Cérvix cerrado
• Ecografía: embrión sin actividad cardíaca o saco anembrionado

**6. Aborto séptico:**
• Cualquier tipo de aborto CON infección
• Fiebre, flujo fétido, dolor, signos de sepsis
• Urgencia médico-quirúrgica

**7. Aborto recurrente (pérdida gestacional recurrente):**
• 3 o más pérdidas consecutivas antes de las 20 semanas
• O 2 o más pérdidas (definición más reciente ASRM)
• Requiere evaluación etiológica completa

**8. Embarazo anembrionado (huevo huero):**
• Saco gestacional sin embrión visible
• Puede verse saco >25 mm sin embrión en ecografía transvaginal`},{title:"Manifestaciones Clínicas",content:`**Síntomas principales:**
• Sangrado vaginal (desde manchado hasta hemorragia severa)
• Dolor tipo cólico en hipogastrio/pelvis
• Expulsión de tejido o coágulos

**Signos según tipo:**

**Amenaza de aborto:**
• Sangrado leve-moderado, rojo oscuro o marrón
• Dolor ausente o leve
• Cérvix cerrado
• Útero acorde a edad gestacional
• Embrión con latido cardíaco presente

**Aborto inevitable:**
• Sangrado abundante, rojo brillante
• Dolor tipo contracciones
• Cérvix dilatado
• Puede haber ruptura de membranas

**Aborto incompleto:**
• Sangrado persistente, puede ser abundante
• Dolor cólico
• Cérvix dilatado o con restos en orificio
• Tejido expulsado parcialmente

**Aborto diferido:**
• Sangrado escaso o ausente
• Desaparición de síntomas de embarazo (náuseas, mastalgia)
• Útero más pequeño de lo esperado
• Cérvix cerrado
• Sin actividad cardíaca en ecografía

**🚩 Banderas rojas:**
• Hemorragia severa (saturación de >1 toalla/hora)
• Inestabilidad hemodinámica (hipotensión, taquicardia)
• Fiebre (>38°C) → aborto séptico
• Flujo vaginal fétido
• Dolor abdominal severo (descartar ectópico roto)`},{title:"Diagnóstico",content:`**1. Historia clínica:**
• Fecha de última menstruación
• Características del sangrado
• Intensidad del dolor
• Expulsión de tejido
• Síntomas de embarazo previos

**2. Examen físico:**
• Signos vitales (evaluar estabilidad hemodinámica)
• Abdomen: dolor, signos peritoneales
• Especuloscopia: origen del sangrado, estado del cérvix, tejido en canal
• Bimanual: tamaño uterino, dolor, masas anexiales

**3. β-hCG cuantitativa:**
• Confirmar embarazo
• Embarazo viable: duplicación cada 48h (aumento ≥53%)
• Embarazo no viable: aumento <53% o meseta/descenso
• β-hCG >2000 mUI/mL sin saco intrauterino → descartar ectópico

**4. Ecografía transvaginal (gold standard):**

**Criterios diagnósticos de pérdida gestacional (ACOG):**
• Longitud cráneo-caudal (LCC) ≥7 mm SIN actividad cardíaca
• Diámetro medio del saco (DMS) ≥25 mm SIN embrión
• Ausencia de embrión ≥2 semanas después de ver saco con vesícula vitelina
• Ausencia de embrión con latido ≥11 días después de ver saco sin vesícula vitelina

**Hallazgos ecográficos:**
• **Amenaza:** Saco intrauterino, embrión con latido, ± hematoma subcoriónico
• **Aborto incompleto:** Restos intrauterinos heterogéneos, >15-20 mm de grosor endometrial
• **Aborto completo:** Endometrio <15 mm, cavidad vacía
• **Aborto diferido:** Embrión sin latido o saco anembrionado

**5. Laboratorios adicionales:**
• Hemograma (evaluar anemia)
• Tipo sanguíneo y Rh (para inmunoprofilaxis)
• En aborto séptico: hemocultivos, perfil de sepsis

**Diagnósticos diferenciales:**
• Embarazo ectópico (siempre descartar)
• Embarazo molar
• Sangrado por implantación
• Patología cervical (ectropión, pólipo, cáncer)
• Sangrado no obstétrico (trauma, infección)`},{title:"Tratamiento",content:`**MANEJO POR TIPO DE ABORTO:**

**1. Amenaza de aborto:**
• Reposo relativo (evidencia limitada)
• Evitar relaciones sexuales y ejercicio intenso
• Progesterona vaginal: 200-400 mg/día (puede ayudar en algunas pacientes, evidencia controvertida)
• Seguimiento con ecografía en 1-2 semanas
• El 50% continuará el embarazo

**2. Aborto inevitable/incompleto/diferido:**
**Tres opciones de manejo:**

**A. Manejo expectante:**
• Esperar expulsión espontánea
• Éxito: 80-90% en aborto incompleto, 25-75% en aborto diferido
• Tiempo: hasta 4-6 semanas
• Paciente debe poder acceder a atención si hay complicaciones
• No recomendado si hemorragia severa o infección

**B. Manejo médico (misoprostol):**
• **Aborto incompleto:** Misoprostol 600 μg VO o 400 μg SL dosis única
• **Aborto diferido (<13 sem):** Misoprostol 800 μg vaginal, puede repetirse en 24-48h si necesario
• Pretratar con mifepristona 200 mg VO 24-48h antes aumenta eficacia
• Éxito: 80-90% con tratamiento adecuado
• Efectos: sangrado, cólicos, expulsión de tejido en 24-72 horas
• Analgesia: ibuprofeno 400-600 mg cada 6-8h

**C. Manejo quirúrgico (evacuación uterina):**
• **Aspiración manual endouterina (AMEU):** <12-14 semanas, puede hacerse en consultorio con analgesia
• **Legrado uterino instrumental (LUI):** En quirófano, bajo anestesia
• Indicaciones: preferencia de la paciente, hemorragia severa, sospecha de infección, contraindicación/falla del manejo médico
• Éxito: 95-100%
• Complicaciones: perforación uterina, sinequias (síndrome de Asherman), infección

**3. Aborto completo:**
• Confirmar con ecografía (endometrio <15 mm, cavidad vacía)
• β-hCG de seguimiento hasta negativizar
• No requiere tratamiento adicional

**4. Aborto séptico:**
• URGENCIA médico-quirúrgica
• Estabilización hemodinámica
• Antibióticos IV de amplio espectro (antes de la evacuación):
  - Ampicilina 2g IV cada 6h + Gentamicina 5mg/kg cada 24h + Clindamicina/Metronidazol 500mg IV cada 8h
  - O: Piperacilina-tazobactam 4.5g IV cada 6h
• Evacuación uterina DESPUÉS de iniciar antibióticos
• UCI si hay sepsis severa/shock

**INMUNOPROFILAXIS Rh:**
• Anti-D (Rhogam) 50-300 μg IM en todas las mujeres Rh negativo no sensibilizadas
• Administrar dentro de las 72 horas del evento

**SEGUIMIENTO:**
• β-hCG semanal hasta ser indetectable (o <5 mUI/mL)
• Ecografía de control si hubo manejo expectante o médico
• Anticoncepción: puede iniciar inmediatamente
• Próximo embarazo: no necesita espera mínima (controversia, algunos sugieren 3 meses para datación)`},{title:"Complicaciones",content:`**Del aborto espontáneo:**
• Hemorragia severa → shock hipovolémico
• Infección → sepsis
• Retención de restos → sangrado persistente, infección
• Coagulopatía (en aborto diferido prolongado, raro)
• Impacto psicológico (duelo, depresión, ansiedad)

**Del tratamiento quirúrgico:**
• Perforación uterina
• Lesión cervical
• Síndrome de Asherman (sinequias intrauterinas)
• Infección pélvica
• Evacuación incompleta
• Riesgos anestésicos`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• LCC ≥7 mm sin latido = aborto confirmado
• DMS ≥25 mm sin embrión = saco anembrionado
• Siempre descartar embarazo ectópico (β-hCG + eco)
• Anti-D a TODA paciente Rh negativa
• Misoprostol 800 μg vaginal es el tratamiento médico estándar

**Conceptos clave:**
• El 50% de las amenazas de aborto continúan el embarazo
• Las 3 opciones (expectante, médico, quirúrgico) son válidas para aborto incompleto/diferido
• El aborto séptico requiere antibióticos ANTES de la evacuación
• La causa más frecuente de aborto espontáneo es la anomalía cromosómica

**Lo indispensable:**
• Confirmar diagnóstico con eco antes de intervenir
• Evaluar estabilidad hemodinámica
• Verificar Rh y dar inmunoprofilaxis si negativo
• Ofrecer apoyo emocional y seguimiento`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 200: Early Pregnancy Loss. Obstet Gynecol. 2018;132(5):e197-e207.
• NICE Guideline NG126: Ectopic pregnancy and miscarriage: diagnosis and initial management. 2019 (updated 2023).
• WHO. Medical management of pregnancy loss. 2018.
• Doubilet PM, et al. Diagnostic Criteria for Nonviable Pregnancy Early in the First Trimester. N Engl J Med. 2013;369:1443-51.
• Williams Obstetrics, 26th Edition. Chapter 18: Abortion.
• UpToDate: "Pregnancy loss (miscarriage): Clinical presentations, diagnosis, and initial evaluation." 2024.`}]},{id:"parto-pretermino",name:"Amenaza y Trabajo de Parto Pretérmino",category:"obstetricia",icon:"⏰",severity:"high",tags:["pretérmino","prematuro","tocolisis","corticoides","cervix corto","prevención"],sections:[{title:"Definición",content:`El parto pretérmino se define como el nacimiento que ocurre ANTES de las 37 semanas completas (259 días) de gestación.

**Clasificaciones por edad gestacional:**
• **Pretérmino extremo:** <28 semanas
• **Muy pretérmino:** 28-31+6 semanas
• **Pretérmino moderado:** 32-33+6 semanas
• **Pretérmino tardío:** 34-36+6 semanas

**Definiciones clínicas:**
• **Amenaza de parto pretérmino (APP):** Contracciones uterinas regulares + cambios cervicales documentados ANTES de 37 semanas, pero SIN parto activo (dilatación <4 cm)
• **Trabajo de parto pretérmino:** Contracciones regulares + dilatación cervical progresiva ≥4 cm o borramiento >80%

**Importancia clínica:** Es la primera causa de morbimortalidad neonatal a nivel mundial. El 75% de las muertes neonatales y el 50% de las secuelas neurológicas se deben a prematuridad. La morbilidad disminuye significativamente con cada semana adicional de gestación.

**Epidemiología:** Ocurre en 8-12% de todos los nacimientos. La mayoría (70%) son espontáneos, el resto son indicados por condiciones maternas o fetales. El pretérmino tardío (34-36+6 sem) representa el 70% de todos los partos pretérmino.`},{title:"Anatomía y Fisiopatología",content:`**Mecanismos del parto pretérmino espontáneo:**

**1. Activación prematura del eje hipotálamo-hipófisis-adrenal fetal:**
• Estrés fetal → liberación de CRH → aumento de estrógenos → activación uterina

**2. Infección/Inflamación (25-40% de los casos):**
• Infección ascendente del tracto genital
• Vaginosis bacteriana, Ureaplasma, Mycoplasma
• Corioamnionitis subclínica
• Liberación de citocinas → prostaglandinas → contracciones + maduración cervical

**3. Hemorragia decidual:**
• Desprendimiento placentario parcial
• Liberación de trombina → estimula contracciones
• Sangrado retroplacentario

**4. Sobredistensión uterina:**
• Embarazo múltiple, polihidramnios
• Estiramiento del miometrio → gap junctions → contracciones coordinadas

**5. Insuficiencia cervical:**
• Debilidad estructural del cérvix
• Acortamiento y dilatación indolora
• Puede ser congénita o adquirida (procedimientos cervicales, trauma obstétrico)

**Vía final común:**
Todos los mecanismos convergen en: aumento de prostaglandinas → maduración cervical (reblandecimiento, acortamiento, dilatación) + contracciones uterinas coordinadas`},{title:"Factores de Riesgo",content:`**Alto riesgo:**
• **Antecedente de parto pretérmino espontáneo** (el más importante, riesgo 15-50%)
• Antecedente de RPMP
• Longitud cervical corta (<25 mm en segundo trimestre)
• Cerclaje cervical en embarazo actual
• Embarazo múltiple
• Cirugía cervical previa (conización, LEEP)
• Malformaciones uterinas

**Riesgo moderado:**
• Intervalo intergenésico <18 meses o >5 años
• Sangrado vaginal en el embarazo
• Infección urinaria o bacteriuria asintomática
• Vaginosis bacteriana
• Periodontitis
• Edad materna <18 o >40 años
• Raza afrodescendiente
• Bajo nivel socioeconómico

**Factores de estilo de vida:**
• Tabaquismo
• Consumo de drogas (cocaína, metanfetaminas)
• Bajo peso pregestacional (IMC <19.8)
• Estrés crónico, trabajo físico intenso
• Violencia doméstica

**Factores del embarazo actual:**
• Preeclampsia
• Diabetes gestacional mal controlada
• Polihidramnios u oligohidramnios
• Placenta previa
• Infecciones maternas sistémicas`},{title:"Manifestaciones Clínicas",content:`**Síntomas de amenaza de parto pretérmino:**
• Contracciones uterinas regulares (≥4 en 20 minutos o ≥8 en 60 minutos)
• Presión pélvica o suprapúbica
• Dolor lumbar sordo (puede irradiarse a muslos)
• Sensación de que "el bebé empuja hacia abajo"
• Aumento del flujo vaginal (mucoso, sanguinolento)
• Cólicos abdominales (similares a menstruales)
• Diarrea

**Signos clínicos:**
• Contracciones palpables al monitoreo
• Cambios cervicales:
  - Acortamiento (borramiento)
  - Dilatación (>1 cm o progresión)
  - Reblandecimiento
• Membranas rotas (si hay RPMP asociada)

**🚩 Signos de trabajo de parto establecido:**
• Dilatación cervical ≥4 cm
• Borramiento ≥80%
• Contracciones regulares dolorosas cada 5 minutos
• Membranas rotas

**Signos de alarma:**
• Sangrado vaginal abundante (descartar DPPNI, placenta previa)
• Fiebre (infección, corioamnionitis)
• Membranas rotas
• Taquicardia fetal o desaceleraciones`},{title:"Diagnóstico",content:`**1. Historia clínica y examen físico:**
• Confirmar edad gestacional
• Evaluar factores de riesgo
• Especuloscopia: descartar RPM, evaluar cérvix
• Evitar tacto vaginal si hay sospecha de RPM

**2. Monitoreo de contracciones uterinas:**
• Tocodinamometría externa
• ≥4 contracciones en 20 min o ≥8 en 60 min

**3. Evaluación cervical:**

**Examen digital (tacto vaginal):**
• Dilatación, borramiento, consistencia, posición, altura de presentación
• Score de Bishop

**Ecografía transvaginal (longitud cervical):**
• Mejor predictor que el examen digital
• **Longitud cervical <25 mm** (percentil 10) → riesgo significativamente aumentado
• <20 mm → alto riesgo
• <15 mm → muy alto riesgo
• Funelling (acortamiento en embudo) también es significativo

**4. Fibronectina fetal (fFN):**
• Proteína de la matriz extracelular que une membranas fetales a decidua
• Su presencia en secreción cervicovaginal (22-34 semanas) indica disrupción
• **Valor predictivo NEGATIVO alto (99%):** fFN negativa = muy bajo riesgo de parto en 7-14 días
• Tomar ANTES del tacto vaginal y ANTES de ecografía transvaginal
• No útil si hay sangrado activo, ruptura de membranas o actividad sexual reciente

**5. Otros estudios:**
• Hemograma, PCR (buscar infección)
• Uroanálisis y urocultivo
• Cultivo cervicovaginal (GBS)
• Ecografía obstétrica: bienestar fetal, líquido amniótico, localización placentaria

**Estrategia diagnóstica:**
• Cérvix ≥30 mm + fFN negativa → alta al domicilio, bajo riesgo
• Cérvix 20-30 mm → fFN puede ayudar a decidir conducta
• Cérvix <20 mm o fFN positiva o dilatación progresiva → alto riesgo, manejo hospitalario`},{title:"Tratamiento",content:`**OBJETIVOS:**
1. Prolongar el embarazo (al menos 48h para completar corticoides)
2. Administrar corticoides para maduración pulmonar fetal
3. Neuroprotección con sulfato de magnesio (<32 semanas)
4. Profilaxis GBS si indicado
5. Transferir a centro con UCI neonatal

**1. CORTICOSTEROIDES (pilar fundamental):**
• **Indicación:** 24-34 semanas (algunos protocolos hasta 36+6)
• **Betametasona:** 12 mg IM, 2 dosis separadas por 24 horas (preferido)
• **Dexametasona:** 6 mg IM cada 12 horas × 4 dosis
• **Beneficios:** Reduce mortalidad neonatal 30%, SDR 50%, HIV 50%, ECN 50%
• **Máximo beneficio:** 48 horas a 7 días después de completar ciclo
• **Rescate:** Un ciclo adicional puede considerarse si pasaron >14 días y <34 semanas
• NO dar múltiples ciclos de rescate (afecta crecimiento fetal)

**2. TOCOLÍTICOS:**
**Objetivo:** Ganar 48 horas para completar corticoides, NO prevenir el parto

**Indicaciones:**
• Amenaza de parto pretérmino 24-34 semanas
• Contracciones regulares + cambios cervicales
• Para permitir transferencia a centro de mayor complejidad

**Contraindicaciones:**
• Corioamnionitis
• Preeclampsia severa
• Sangrado severo (DPPNI)
• Estado fetal no tranquilizador
• Malformación fetal letal
• Muerte fetal
• Dilatación avanzada (>4-6 cm)

**Fármacos:**
• **Nifedipino (primera línea):**
  - Carga: 20 mg VO, repetir cada 20-30 min × 3 dosis si persisten contracciones (máx 60 mg en 1h)
  - Mantenimiento: 20 mg VO cada 6-8 horas × 48-72 horas
  - Contraindicado: hipotensión, uso concomitante de MgSO4 (riesgo de bloqueo cardíaco)

• **Indometacina:**
  - 50-100 mg carga, luego 25-50 mg cada 6 horas (máximo 48 horas)
  - Contraindicado >32 semanas (cierre prematuro del ductus arterioso)
  - Vigilar oligohidramnios

• **Atosiban (antagonista de oxitocina):**
  - Disponible en Europa, no en EE.UU.
  - Menos efectos adversos que β-miméticos

• **β-miméticos (terbutalina):**
  - Ya NO recomendado por FDA (arritmias, muerte materna)
  - Uso muy limitado

**3. SULFATO DE MAGNESIO PARA NEUROPROTECCIÓN:**
• **Indicación:** <32 semanas con parto inminente
• **Dosis:** Carga 4-6 g IV en 20-30 min, mantenimiento 1-2 g/hora
• **Reduce:** Parálisis cerebral 30-40%, disfunción motora severa
• Continuar hasta el parto o hasta 12 horas si el parto se detiene

**4. PROFILAXIS GBS:**
• Si cultivo positivo o factores de riesgo
• Penicilina G 5 millones U IV carga, luego 2.5-3 millones cada 4h hasta el parto
• Alternativa: Ampicilina 2g IV, luego 1g cada 4h

**5. MANEJO DEL CÉRVIX CORTO ASINTOMÁTICO (prevención):**
• Cérvix <25 mm en 16-24 semanas + embarazo único + sin antecedente de pretérmino → **Progesterona vaginal** 200 mg/día o gel 90 mg/día hasta semana 36
• Cérvix <25 mm + antecedente de pretérmino → **Cerclaje cervical** (controvertido, individualizar)
• Cerclaje de emergencia: si hay dilatación sin contracciones (insuficiencia cervical)

**6. ANTIBIÓTICOS:**
• NO dar antibióticos de rutina para prolongar embarazo en APP con membranas íntegras (no hay beneficio demostrado)
• SÍ dar si hay evidencia de infección o para profilaxis GBS`},{title:"Complicaciones",content:`**Complicaciones de la prematuridad:**

**Inmediatas (neonatales):**
• Síndrome de dificultad respiratoria (SDR)
• Hemorragia intraventricular
• Enterocolitis necrotizante
• Displasia broncopulmonar
• Retinopatía del prematuro
• Sepsis neonatal
• Hipotermia
• Hipoglucemia
• Ictericia
• Persistencia del conducto arterioso

**A largo plazo:**
• Parálisis cerebral
• Retraso del neurodesarrollo
• Discapacidad intelectual
• Déficit auditivo y visual
• Enfermedad pulmonar crónica
• Mayor riesgo de enfermedades crónicas en la adultez

**Riesgo según edad gestacional:**
• 23-24 sem: 50-70% mortalidad, 50% discapacidad severa en sobrevivientes
• 28 sem: 10-15% mortalidad
• 32 sem: 1-2% mortalidad
• 34 sem: <1% mortalidad, pero mayor morbilidad que a término`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• Corticoides: 24-34 semanas (betametasona 12mg IM × 2 dosis)
• Nifedipino: tocolítico de primera línea
• MgSO4: neuroprotección si <32 semanas
• fFN negativa = alto VPN (puede dar alta con confianza)
• Cérvix corto (<25 mm) + progesterona vaginal en embarazo único

**Conceptos clave:**
• Los tocolíticos son para ganar 48h, NO para prevenir el parto
• El antecedente de pretérmino es el factor de riesgo más importante
• La longitud cervical es mejor predictor que el examen digital
• El pretérmino tardío (34-36+6) también tiene morbilidad significativa

**Lo indispensable:**
• Confirmar edad gestacional
• Administrar corticoides lo antes posible
• Transferir a centro con UCI neonatal si <32 semanas
• Conocer las contraindicaciones de tocolisis`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 171: Management of Preterm Labor. Obstet Gynecol. 2016;128(4):e155-e164.
• ACOG Committee Opinion No. 713: Antenatal Corticosteroid Therapy for Fetal Maturation. 2017.
• ACOG Committee Opinion No. 455: Magnesium Sulfate Before Anticipated Preterm Birth for Neuroprotection. 2010 (reaffirmed 2020).
• Romero R, et al. Preterm labor: one syndrome, many causes. Science. 2014;345(6198):760-5.
• Williams Obstetrics, 26th Edition. Chapter 42: Preterm Labor.
• UpToDate: "Preterm labor: Clinical findings, diagnostic evaluation, and initial treatment." 2024.`}]},{id:"anticoncepcion",name:"Anticoncepción y Planificación Familiar",category:"planificacion",icon:"💊",severity:"low",tags:["anticonceptivos","DIU","ACO","implante","barrera","planificación"],sections:[{title:"Definición",content:`La anticoncepción comprende todos los métodos, técnicas y dispositivos utilizados para prevenir el embarazo. La planificación familiar es el derecho de las personas a decidir el número y espaciamiento de sus hijos.

**Importancia clínica:** El 50% de los embarazos no son planeados. El acceso a anticoncepción efectiva reduce la mortalidad materna, los abortos inseguros, y permite el espaciamiento óptimo entre embarazos (18-24 meses).

**Conceptos clave:**
• **Eficacia típica:** Tasa de embarazo en uso real (incluye errores del usuario)
• **Eficacia perfecta:** Tasa de embarazo en uso perfecto/consistente
• **Índice de Pearl:** Número de embarazos por 100 mujeres-año de uso
• **LARC (Long-Acting Reversible Contraception):** DIU e implantes subdérmicos - los más efectivos`},{title:"Clasificación",content:`**MÉTODOS SEGÚN EFICACIA (de mayor a menor):**

**Muy alta eficacia (>99%) - LARC:**
• DIU de cobre (T de Cu)
• DIU hormonal (levonorgestrel - Mirena, Kyleena, etc.)
• Implante subdérmico (etonogestrel - Nexplanon)
• Esterilización quirúrgica

**Alta eficacia (91-99%):**
• Inyectable trimestral (medroxiprogesterona depot - DMPA)
• Anticonceptivos orales combinados (ACO)
• Parche anticonceptivo
• Anillo vaginal
• Inyectable mensual

**Eficacia moderada (82-88%):**
• Condón masculino (uso típico 87%)
• Condón femenino (uso típico 79%)
• Diafragma con espermicida

**Baja eficacia (<80%):**
• Espermicidas solos
• Métodos de conocimiento de la fertilidad (ritmo, moco cervical, temperatura basal)
• Coito interrumpido
• Lactancia amenorreica (MELA) - solo efectivo bajo condiciones estrictas

**CLASIFICACIÓN POR TIPO:**
• **Hormonales:** Combinados (estrógeno + progestina) o solo progestina
• **No hormonales:** Barrera, DIU de cobre, esterilización
• **De emergencia:** Levonorgestrel, ulipristal, DIU de cobre`},{title:"Métodos Hormonales Combinados",content:`**ANTICONCEPTIVOS ORALES COMBINADOS (ACO):**

**Composición:**
• Estrógeno: Etinilestradiol (EE) 20-35 μg o estradiol valerato/estetrol (más nuevos)
• Progestinas: múltiples (levonorgestrel, norgestimato, drospirenona, dienogest, etc.)

**Mecanismo de acción:**
• Supresión de ovulación (principal)
• Espesamiento del moco cervical
• Atrofia endometrial

**Beneficios no anticonceptivos:**
• Regulación del ciclo menstrual
• Reducción de dismenorrea y sangrado
• Mejora del acné (progestinas antiandrogénicas)
• Reducción del riesgo de cáncer de ovario y endometrio (protección dura años después de suspender)
• Tratamiento de endometriosis

**Contraindicaciones absolutas (Categoría 4 OMS):**
• <6 semanas posparto si lactancia
• Tabaquismo ≥15 cigarrillos/día y edad ≥35 años
• Hipertensión no controlada (≥160/100)
• Antecedente de TEV (trombosis venosa profunda, embolia pulmonar)
• Cardiopatía isquémica, ACV
• Migraña con aura
• Cáncer de mama actual
• Hepatopatía severa activa
• Cirugía mayor con inmovilización prolongada

**Efectos adversos:**
• Náuseas, cefalea, mastalgia (generalmente transitorios)
• Sangrado irregular (primeros meses)
• Cambios de humor
• TEV (riesgo 3-4 veces mayor, pero absoluto bajo: 3-9/10,000 mujeres-año)

**PARCHE ANTICONCEPTIVO:**
• Norelgestromina + etinilestradiol
• Se aplica semanal × 3 semanas, 1 semana libre
• Mismas contraindicaciones que ACO
• Puede ser menos efectivo si peso >90 kg

**ANILLO VAGINAL:**
• Etonogestrel + etinilestradiol
• Se coloca 3 semanas, 1 semana libre
• Liberación sistémica más estable que ACO
• Mismas contraindicaciones`},{title:"Métodos Solo Progestina",content:`**Ventaja:** Pueden usarse durante lactancia y en mujeres con contraindicaciones para estrógenos

**PÍLDORAS SOLO PROGESTINA (POP, "minipíldora"):**
• Levonorgestrel, noretisterona o desogestrel
• Tomar TODOS los días a la misma hora (ventana de 3 horas, excepto desogestrel que tiene 12h)
• Eficacia menor que ACO si no se es estricto con la hora
• Puede causar sangrado irregular

**INYECTABLE TRIMESTRAL (DMPA - Depo-Provera):**
• Medroxiprogesterona acetato depot 150 mg IM cada 12-13 semanas
• Muy efectivo (eficacia típica 94%)
• Causa amenorrea en muchas usuarias (50-70% al año)
• Efectos adversos: aumento de peso, sangrado irregular inicial, retraso en retorno de fertilidad (promedio 10 meses post-última inyección), pérdida de densidad ósea (reversible)
• FDA recomienda limitar uso a 2 años si hay otras opciones (por DMO), pero OMS permite uso prolongado

**IMPLANTE SUBDÉRMICO (Nexplanon):**
• Etonogestrel 68 mg, dura 3-5 años
• **El anticonceptivo reversible más efectivo** (>99.9%)
• Se inserta subdérmico en brazo no dominante
• Efectos adversos: sangrado irregular (principal causa de discontinuación), cefalea
• Puede usarse en lactancia
• No afecta DMO como DMPA

**DIU HORMONAL (LNG-IUS):**
• Mirena (52 mg LNG, 5-8 años), Kyleena (19.5 mg, 5 años), Skyla (13.5 mg, 3 años)
• Liberación local, mínima absorción sistémica
• Reduce sangrado menstrual significativamente (indicado para SUA)
• Puede causar amenorrea (especialmente Mirena)
• Efectos sistémicos mínimos
• También efectivo para SUA y protección endometrial en TRH`},{title:"Métodos No Hormonales",content:`**DIU DE COBRE (T de Cu):**
• Muy efectivo (>99%), dura 10-12 años
• No hormonal - puede usarse en casi todas las mujeres
• Mecanismo: reacción inflamatoria estéril, tóxico para espermatozoides
• Aumenta el sangrado y dismenorrea (principales causas de discontinuación)
• No protege contra ITS
• Contraindicaciones: anomalías uterinas que distorsionan cavidad, EPI actual, cáncer cervical/endometrial, sangrado no diagnosticado

**CONDÓN MASCULINO:**
• Eficacia típica 87%, perfecta 98%
• **Único método (junto con condón femenino) que protege contra ITS incluyendo VIH**
• Látex (más común), poliuretano (para alérgicos)
• Puede usarse con cualquier otro método (doble protección)

**CONDÓN FEMENINO:**
• Eficacia típica 79%
• Alternativa cuando el compañero no usa condón masculino
• Protege contra ITS

**DIAFRAGMA Y CAPUCHÓN CERVICAL:**
• Deben usarse con espermicida
• Eficacia típica 83-88%
• Requieren ajuste por profesional
• No protegen completamente contra ITS

**ESPERMICIDAS:**
• Nonoxinol-9 (más común)
• Baja eficacia solos (70-80%)
• Pueden causar irritación vaginal (aumenta riesgo de VIH si uso frecuente)
• Mejor como complemento de métodos de barrera

**ESTERILIZACIÓN QUIRÚRGICA:**
• Femenina: Ligadura/sección tubárica, salpingectomía, dispositivos (Essure descontinuado)
• Masculina: Vasectomía (más simple, menor riesgo)
• Debe considerarse permanente (la reversión tiene baja tasa de éxito)

**MÉTODOS BASADOS EN EL CONOCIMIENTO DE LA FERTILIDAD:**
• Ritmo, temperatura basal, moco cervical, sintotérmico
• Eficacia variable (75-95% dependiendo del método y adherencia)
• Requieren educación y compromiso
• Aplicaciones móviles mejoran seguimiento`},{title:"Anticoncepción de Emergencia",content:`**Definición:** Métodos para prevenir embarazo DESPUÉS de relación sexual sin protección o falla anticonceptiva. NO es abortiva - funciona previniendo ovulación o fertilización.

**Indicaciones:**
• Relación sexual sin anticoncepción
• Rotura o deslizamiento del condón
• Olvido de píldoras (≥2 consecutivas)
• Expulsión de DIU
• Violación

**LEVONORGESTREL (Plan B, Postinor):**
• 1.5 mg dosis única (o 0.75 mg × 2 dosis separadas 12h)
• Eficacia: 85% si se toma en primeras 24h, disminuye progresivamente
• Efectivo hasta 72 horas (algunos estudios hasta 120h con menor eficacia)
• Puede ser menos efectivo si peso >75 kg
• De venta libre en muchos países
• Mecanismo: retrasa o inhibe ovulación

**ULIPRISTAL (Ella):**
• Modulador selectivo del receptor de progesterona
• 30 mg dosis única
• Efectivo hasta 120 horas (5 días) - mantiene eficacia mejor que LNG
• Más efectivo que LNG especialmente en días 3-5
• Requiere receta en la mayoría de países
• No usar si ya está tomando anticonceptivos hormonales (esperar 5 días)

**DIU DE COBRE:**
• El método de emergencia MÁS EFECTIVO (>99%)
• Puede insertarse hasta 5 días post-coito
• Tiene el beneficio adicional de anticoncepción continua
• Considerarlo especialmente si la paciente quiere LARC

**NO es anticoncepción de emergencia:**
• Mifepristona + misoprostol (esto es para interrupción del embarazo)
• "Día después" con ACO en altas dosis (Yuzpe) - obsoleto, menos efectivo y más efectos adversos

**Consejería post-AE:**
• La menstruación puede adelantarse o retrasarse
• Si no llega en 3 semanas → prueba de embarazo
• Iniciar método regular de anticoncepción inmediatamente (excepto si usó ulipristal)
• El uso repetido es seguro pero no ideal (los métodos regulares son más efectivos)`},{title:"Criterios de Elegibilidad",content:`**CRITERIOS DE ELEGIBILIDAD MÉDICA PARA ANTICONCEPTIVOS (OMS):**

**Categoría 1:** Sin restricción, se puede usar
**Categoría 2:** Las ventajas superan los riesgos, generalmente se puede usar
**Categoría 3:** Los riesgos generalmente superan las ventajas, no recomendado (pero puede usarse si no hay alternativas y con vigilancia)
**Categoría 4:** Contraindicación absoluta, no usar

**Situaciones clave:**

**Lactancia:**
• ACO combinados: Cat 3-4 en <6 meses posparto, luego Cat 2
• Solo progestina, DIU, implante: Cat 1-2 (pueden usarse)

**Tabaquismo + >35 años:**
• ACO combinados: Cat 3 (<15 cig/día), Cat 4 (≥15 cig/día)
• Solo progestina, DIU: Cat 1

**Hipertensión:**
• ACO: Cat 3-4 según severidad
• Solo progestina, DIU: Cat 1-2

**Migraña con aura:**
• ACO: Cat 4
• Solo progestina: Cat 2
• DIU: Cat 1

**TEV previo:**
• ACO: Cat 4
• Solo progestina: Cat 2-3
• DIU: Cat 1-2

**Obesidad (IMC >30):**
• ACO: Cat 2 (eficacia preservada, mayor riesgo TEV)
• Todos los demás: Cat 1

**Diabetes con complicaciones vasculares:**
• ACO: Cat 3-4
• Solo progestina, DIU: Cat 2

**VIH:**
• Todos los métodos: Cat 1-2 (DIU puede insertarse si CD4 estable)
• No interacción significativa con antirretrovirales para la mayoría de métodos

**Posparto inmediato (sin lactancia):**
• DIU, implante, progestinas: Cat 1-2, pueden iniciarse inmediatamente
• ACO: Cat 3 en <21 días (riesgo TEV), Cat 1 después`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• Los LARC (DIU, implante) son los métodos reversibles más efectivos
