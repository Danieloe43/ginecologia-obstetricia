**3. Seguimiento:**
• PTOG cada 1-2 años si hay factores de riesgo
• Perfil lipídico anual
• Tamización de depresión/ansiedad
• Ecografía endometrial si amenorrea prolongada (>3 meses sin protección progestacional)

**4. Pronóstico:**
• Condición crónica que requiere manejo de por vida
• Con tratamiento adecuado, la mayoría logra control de síntomas
• Riesgo cardiovascular a largo plazo requiere seguimiento metabólico continuo`},{title:"Complicaciones",content:`**Metabólicas:**
• Diabetes mellitus tipo 2 (riesgo 5-8 veces mayor)
• Síndrome metabólico (hasta 40%)
• Enfermedad cardiovascular precoz
• Dislipidemia aterogénica
• Esteatosis hepática no alcohólica

**Ginecológicas:**
• Infertilidad anovulatoria
• Hiperplasia endometrial
• Cáncer de endometrio (riesgo 2.7 veces mayor)
• Mayor riesgo de complicaciones obstétricas (preeclampsia, DG, prematuridad)

**Psicológicas:**
• Depresión (prevalencia 28-64%)
• Ansiedad
• Trastornos de conducta alimentaria
• Apnea obstructiva del sueño`},{title:"Prevención",content:`**Prevención primaria:**
• Mantener peso saludable desde la adolescencia
• Actividad física regular
• Dieta balanceada

**Prevención secundaria:**
• Diagnóstico precoz en adolescentes con síntomas sugestivos
• Tamización metabólica regular
• Protección endometrial con progestágenos si anovulación crónica

**Educación al paciente:**
• Explicar la naturaleza crónica de la enfermedad
• Importancia del estilo de vida como pilar del tratamiento
• No es necesario tener ovarios con quistes para tener SOP
• La fertilidad se puede lograr con tratamiento adecuado`},{title:"Perlas Clínicas",content:`**Para el examen:**
• Criterios de Rotterdam: 2 de 3 (anovulación, hiperandrogenismo, eco)
• Es diagnóstico de EXCLUSIÓN
• Letrozol > Clomifeno para infertilidad (evidencia nivel I)
• Metformina NO es primera línea para infertilidad

**Conceptos clave:**
• SOP = enfermedad metabólica, no solo ginecológica
• La insulinoresistencia es el motor fisiopatológico principal
• ACO + espironolactona para hirsutismo (mínimo 6 meses para ver efecto)
• Siempre proteger endometrio si hay anovulación crónica

**Lo indispensable:**
• Descartar otras causas antes de diagnosticar SOP
• Evaluar siempre el componente metabólico
• Individualizar tratamiento según fenotipo y objetivo
• Seguimiento metabólico de por vida`},{title:"Referencias Bibliográficas",content:`• International Evidence-based Guideline for the Assessment and Management of Polycystic Ovary Syndrome. 2023.
• Rotterdam ESHRE/ASRM-Sponsored PCOS Consensus Workshop Group. Revised 2003 consensus on diagnostic criteria and long-term health risks related to PCOS.
• Teede HJ, et al. Recommendations from the 2023 International Evidence-based Guideline for the Assessment and Management of Polycystic Ovary Syndrome. J Clin Endocrinol Metab. 2023.
• ACOG Practice Bulletin No. 194: Polycystic Ovary Syndrome. 2018.
• Williams Gynecology, 4th Edition.
• UpToDate: "Polycystic ovary syndrome in adults." 2024.`}]},{id:"preeclampsia",name:"Preeclampsia y Trastornos Hipertensivos del Embarazo",category:"obstetricia",icon:"🫀",severity:"critical",tags:["preeclampsia","eclampsia","HELLP","hipertensión","embarazo","urgencia"],sections:[{title:"Definición",content:`La preeclampsia es un trastorno multisistémico del embarazo caracterizado por hipertensión de novo (≥140/90 mmHg) después de las 20 semanas de gestación, asociada a proteinuria y/o disfunción orgánica materna.

**Importancia clínica:** Es una de las principales causas de morbimortalidad materna y perinatal a nivel mundial. Responsable del 10-15% de las muertes maternas. Afecta al 2-8% de los embarazos.

**Epidemiología:** Incidencia global del 2-8%. Mayor en primigestas (6-8%). La eclampsia ocurre en 0.5-1% de las preeclampsias severas. El síndrome HELLP complica el 10-20% de las preeclampsias severas.`},{title:"Anatomía y Fisiopatología",content:`**Teoría de las dos etapas:**

**Etapa 1 - Placentación anormal (antes de las 20 semanas):**
• Fallo en la invasión trofoblástica de las arterias espirales
• Las arterias espirales mantienen su capa muscular → no se transforman en vasos de baja resistencia
• Resultado: hipoperfusión placentaria crónica e isquemia

**Etapa 2 - Síndrome materno (después de las 20 semanas):**
• La placenta isquémica libera factores antiangiogénicos:
  - **sFlt-1** (soluble fms-like tyrosine kinase-1): neutraliza VEGF y PlGF
  - **Endoglina soluble:** amplifica la disfunción endotelial
• Resultado: disfunción endotelial sistémica → vasoconstricción, activación de coagulación, permeabilidad vascular

**Consecuencias orgánicas:**
• **Renal:** Endoteliosis glomerular → proteinuria, oliguria
• **Hepática:** Isquemia, necrosis periportal, elevación de transaminasas → puede llevar a hematoma/ruptura hepática
• **Cerebral:** Edema vasogénico, vasoespasmo → cefalea, alteraciones visuales, convulsiones (eclampsia)
• **Hematológica:** Hemólisis microangiopática, trombocitopenia, CID
• **Placentaria:** RCIU, oligohidramnios, desprendimiento de placenta

**Ratio sFlt-1/PlGF:** Biomarcador emergente. Ratio >38 sugiere preeclampsia; ratio <38 tiene alto valor predictivo negativo.`},{title:"Factores de Riesgo",content:`**Alto riesgo (un factor indica profilaxis con ASA):**
• Preeclampsia previa
• Embarazo múltiple
• Hipertensión crónica
• Diabetes mellitus pregestacional
• Enfermedad renal crónica
• Enfermedad autoinmune (LES, síndrome antifosfolípido)

**Riesgo moderado (≥2 factores → profilaxis con ASA):**
• Primigravidez
• Edad materna ≥35 años
• IMC ≥30
• Antecedente familiar de preeclampsia
• Intervalo intergenésico >10 años
• Embarazo por reproducción asistida
• Antecedente de RCIU, muerte fetal, DPPNI

**Factores protectores:**
• Tabaquismo (paradójicamente reduce riesgo, NO se recomienda)
• Multiparidad con mismo compañero
• Exposición previa a esperma de la misma pareja`},{title:"Clasificación",content:`**Trastornos hipertensivos del embarazo (ACOG 2020):**

1. **Hipertensión crónica:** PA ≥140/90 antes de las 20 semanas o preexistente
2. **Hipertensión gestacional:** PA ≥140/90 después de las 20 semanas SIN proteinuria ni disfunción orgánica
3. **Preeclampsia/Eclampsia:**
   - **Preeclampsia sin criterios de severidad:** PA ≥140/90 + proteinuria (≥300 mg/24h o relación proteína/creatinina ≥0.3)
   - **Preeclampsia con criterios de severidad:** (ver abajo)
   - **Eclampsia:** Convulsiones en contexto de preeclampsia
4. **Preeclampsia sobreimpuesta a hipertensión crónica**

**Criterios de severidad (cualquiera de los siguientes):**
• PA ≥160/110 mmHg (en dos tomas separadas por 4 horas)
• Trombocitopenia <100,000/μL
• Creatinina >1.1 mg/dL o duplicación del valor basal
• Elevación de transaminasas >2 veces el límite superior
• Edema pulmonar
• Síntomas cerebrales: cefalea persistente, alteraciones visuales
• Dolor epigástrico/hipocondrio derecho persistente

**Síndrome HELLP:**
• **H**emolysis (hemólisis): LDH >600, esquistocitos, bilirrubina indirecta >1.2
• **EL**evated **L**iver enzymes: AST/ALT >2 veces lo normal
• **L**ow **P**latelets: <100,000/μL

**Clasificación de Mississippi (HELLP):**
• Clase 1: Plaquetas <50,000 → mayor morbimortalidad
• Clase 2: Plaquetas 50,000-100,000
• Clase 3: Plaquetas 100,000-150,000`},{title:"Manifestaciones Clínicas",content:`**Preeclampsia sin severidad:**
• Hipertensión (≥140/90) después de las 20 semanas
• Proteinuria
• Edema (NO es criterio diagnóstico, pero puede estar presente)

**Síntomas de severidad:**
• Cefalea intensa, persistente, frontal u occipital, que no cede con analgésicos
• Alteraciones visuales: escotomas, fotopsias, visión borrosa, amaurosis
• Dolor epigástrico o en hipocondrio derecho (distensión de cápsula de Glisson)
• Disnea (edema pulmonar)
• Oliguria (<500 mL/24h)

**Eclampsia:**
• Convulsiones tónico-clónicas generalizadas
• Pueden ocurrir anteparto (50%), intraparto (25%) o posparto (25%)
• Pueden ocurrir SIN hipertensión severa previa en 20% de los casos

**Síndrome HELLP:**
• Dolor epigástrico/hipocondrio derecho (65%)
• Náuseas y vómitos (30-50%)
• Cefalea
• Puede presentarse SIN hipertensión o proteinuria significativa en 15% de los casos

**🚩 Banderas rojas que indican terminación del embarazo:**
• PA no controlable a pesar de tratamiento antihipertensivo máximo
• Eclampsia
• HELLP
• Edema pulmonar
• Desprendimiento de placenta
• Deterioro renal progresivo
• Estado fetal no tranquilizador
• Coagulopatía`},{title:"Diagnóstico",content:`**Criterios diagnósticos (ACOG 2013/2020):**
PA ≥140/90 después de las 20 semanas + UNO de los siguientes:
• Proteinuria ≥300 mg/24h, o relación proteína/creatinina ≥0.3, o +2 en tirilla
• Trombocitopenia <100,000
• Creatinina >1.1 mg/dL
• Transaminasas elevadas >2x normal
• Edema pulmonar
• Síntomas cerebrales o visuales

⚠️ **La proteinuria ya NO es requisito obligatorio si hay disfunción orgánica**

**Laboratorios obligatorios:**
• Hemograma completo con plaquetas
• Creatinina, BUN, ácido úrico
• AST, ALT, LDH, bilirrubinas
• Proteinuria de 24h o relación proteína/creatinina en muestra aislada
• Frotis de sangre periférica (buscar esquistocitos)
• Perfil de coagulación (TP, TTP, fibrinógeno)
• Ácido úrico (marcador de severidad, >6 mg/dL sugiere peor pronóstico)

**Evaluación fetal:**
• Ecografía obstétrica: biometría, líquido amniótico, Doppler de arteria umbilical
• Monitoreo fetal electrónico (NST)
• Perfil biofísico fetal

**Diagnóstico diferencial:**
• Hipertensión crónica
• Púrpura trombocitopénica trombótica (PTT)
• Síndrome urémico hemolítico (SUH)
• Hígado graso agudo del embarazo
• Lupus eritematoso sistémico
• Feocromocitoma`},{title:"Interpretación Clínica",content:`**Correlación clínica:**
• PA elevada + cefalea intensa + hiperreflexia → riesgo inminente de eclampsia
• Dolor epigástrico + plaquetas bajas + LDH elevada → pensar en HELLP
• Proteinuria masiva + edema + hipoalbuminemia → afectación renal severa
• RCIU + Doppler umbilical alterado → placenta severamente afectada

**Cuándo sospechar gravedad:**
• Cualquier síntoma neurológico
• Elevación progresiva de ácido úrico y LDH
• Descenso progresivo de plaquetas
• Deterioro fetal (desaceleraciones, oligohidramnios)

**Errores diagnósticos frecuentes:**
• Medir PA con manguito inadecuado (debe cubrir 80% del brazo)
• No considerar preeclampsia sin proteinuria (hasta 10% de eclampsia no tiene proteinuria previa)
• Confundir HELLP con hepatitis, colecistitis o gastritis
• No diagnosticar preeclampsia sobreimpuesta en hipertensa crónica
• Olvidar que la preeclampsia puede debutar en el posparto (hasta 72h, raro hasta 6 semanas)

**💡 Perlas clínicas:**
• El ácido úrico >5.5 mg/dL es un marcador temprano de preeclampsia
• La cefalea de preeclampsia NO cede con paracetamol
• HELLP puede ocurrir sin HTA o proteinuria significativa → siempre pedir labs
• Las convulsiones eclámpticas pueden ocurrir con PA normal
• El único tratamiento definitivo es la TERMINACIÓN DEL EMBARAZO`},{title:"Tratamiento",content:`**PRINCIPIOS FUNDAMENTALES:**
1. El tratamiento definitivo es la terminación del embarazo
2. El sulfato de magnesio es el anticonvulsivante de elección
3. El objetivo antihipertensivo es PA <160/110 (NO normalizar)

**MANEJO SEGÚN SEVERIDAD:**

**A. Preeclampsia sin severidad:**
• Si ≥37 semanas → TERMINAR EMBARAZO (inducción)
• Si <37 semanas → manejo expectante con vigilancia estrecha:
  - PA cada 4-6 horas
  - Laboratorios 2 veces/semana
  - NST diario o cada 48h
  - Evaluación de síntomas de severidad
  - NO dar antihipertensivos si PA <160/110
  - Maduración pulmonar fetal si 24-34 semanas (betametasona 12mg IM x 2 dosis, cada 24h)

**B. Preeclampsia con severidad:**
• Si ≥34 semanas → TERMINAR EMBARAZO
• Si <34 semanas → manejo expectante EN UCI obstétrica solo si:
  - PA controlable
  - Sin síntomas severos
  - Laboratorios estables
  - Bienestar fetal conservado
  - Maduración pulmonar con corticoides
  - Máximo 48 horas para completar maduración, luego terminar

**TRATAMIENTO ANTIHIPERTENSIVO (PA ≥160/110):**
• **Labetalol IV:** 20 mg → 40 mg → 80 mg cada 10-20 min (máx 300 mg)
• **Hidralazina IV:** 5-10 mg cada 20 min (máx 30 mg)
• **Nifedipino VO:** 10-20 mg cada 20-30 min (máx 60 mg en 1 hora)
• **Meta:** PA 130-150/80-100 mmHg

**SULFATO DE MAGNESIO (PREVENCIÓN DE ECLAMPSIA):**
• **Carga:** 4-6 g IV en 20-30 minutos
• **Mantenimiento:** 1-2 g/hora IV en infusión continua
• **Duración:** Hasta 24-48 horas posparto
• **Monitoreo:** Reflejos patelares, frecuencia respiratoria (>12/min), diuresis (>25 mL/h)
• **Niveles terapéuticos:** 4.8-8.4 mg/dL
• **Antídoto:** Gluconato de calcio 1g IV en 3 min (si toxicidad)

**Signos de toxicidad por MgSO4:**
• Pérdida de reflejos: 9-12 mg/dL
• Depresión respiratoria: 12-15 mg/dL
• Paro cardíaco: >15 mg/dL

**ECLAMPSIA - MANEJO:**
1. Proteger vía aérea, posición lateral
2. MgSO4 carga 4-6g IV en 5-10 min
3. Si recurre: MgSO4 2g IV adicional
4. Control de PA si ≥160/110
5. Estabilizar → TERMINAR EMBARAZO (no necesariamente cesárea)
6. Convulsión no contraindica parto vaginal si condiciones favorables

**PROFILAXIS CON ASPIRINA:**
• ASA 81-150 mg/día desde las 12-16 semanas hasta las 36 semanas
• Indicada en pacientes con factores de riesgo alto o ≥2 factores de riesgo moderado
• Reduce riesgo de preeclampsia en 17-62%`},{title:"Complicaciones",content:`**Maternas agudas:**
• Eclampsia (convulsiones)
• Síndrome HELLP
• Desprendimiento prematuro de placenta (DPPNI)
• Edema pulmonar
• Insuficiencia renal aguda
• Coagulopatía intravascular diseminada (CID)
• ACV hemorrágico
• Ruptura hepática (raro pero letal)
• Muerte materna

**Fetales/neonatales:**
• Restricción del crecimiento intrauterino
• Prematuridad (iatrogénica o espontánea)
• Oligohidramnios
• Desprendimiento de placenta
• Muerte fetal intrauterina
• Síndrome de dificultad respiratoria del recién nacido

**A largo plazo (maternas):**
• Riesgo cardiovascular aumentado 2-4 veces
• Riesgo de HTA crónica (4 veces mayor)
• Riesgo de enfermedad renal
• Recurrencia en embarazos futuros (15-25%)
• DM2 (riesgo aumentado 2 veces)`},{title:"Prevención",content:`**Prevención primaria:**
• **Aspirina a dosis baja (81-150 mg/día):** Iniciar a las 12-16 semanas en mujeres con factores de riesgo
• Suplementación con calcio (1.5-2 g/día) en poblaciones con baja ingesta
• Control preconcepcional de HTA, diabetes, obesidad
• Ejercicio regular

**Prevención secundaria:**
• Vigilancia prenatal estrecha en pacientes con factores de riesgo
• Doppler de arterias uterinas en semanas 11-14 y 20-24
• Ratio sFlt-1/PlGF en screening de segundo trimestre

**Educación al paciente:**
• Reconocer signos de alarma: cefalea intensa, visión borrosa, dolor epigástrico, edema facial
• Importancia del control prenatal regular
• Automonitoreo de PA si tiene factores de riesgo
• Acudir a urgencias ante cualquier síntoma de alarma`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• El ÚNICO tratamiento definitivo es terminar el embarazo
• MgSO4 es el anticonvulsivante de elección, NO diazepam, NO fenitoína
• La preeclampsia puede debutar en el POSPARTO
• El antídoto del MgSO4 es el gluconato de calcio
• NO se debe normalizar la PA (meta: <160/110)

**Conceptos clave:**
• Preeclampsia sin proteinuria existe → buscar disfunción orgánica
• HELLP sin HTA existe (15%) → pedir labs siempre
• La cefalea + hiperreflexia = riesgo de eclampsia inminente
• Profilaxis con ASA desde semana 12-16 reduce riesgo significativamente

**Lo indispensable para el médico general:**
• Medir PA correctamente en TODOS los controles prenatales
• Saber cuándo referir urgente: PA ≥160/110, síntomas de severidad
• Iniciar MgSO4 y antihipertensivo antes de referir
• La preeclampsia es una EMERGENCIA que no espera`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 222: Gestational Hypertension and Preeclampsia. Obstet Gynecol. 2020;135(6):e237-e260.
• ISSHP Classification, Diagnosis, and Management of Hypertensive Disorders of Pregnancy. 2021.
• NICE Guideline NG133: Hypertension in pregnancy. 2019 (updated 2023).
• Williams Obstetrics, 26th Edition. Chapter 40: Hypertensive Disorders.
• Magee LA, et al. The CHIPS Trial. N Engl J Med. 2015;372:407-17.
• ASPRE Trial: Rolnik DL, et al. N Engl J Med. 2017;377:613-22.
• UpToDate: "Preeclampsia: Clinical features and diagnosis." 2024.
• WHO Recommendations for Prevention and Treatment of Pre-eclampsia and Eclampsia. 2023.`}]},{id:"embarazo-ectopico",name:"Embarazo Ectópico",category:"obstetricia",subcategory:"urgencias",icon:"⚠️",severity:"critical",tags:["ectópico","tubárico","β-hCG","urgencia","primer trimestre","metrotexato"],sections:[{title:"Definición",content:`El embarazo ectópico se define como la implantación del blastocisto fuera de la cavidad uterina. La localización más frecuente es la trompa de Falopio (95-97%), específicamente la ampolla tubárica (70%).

**Importancia clínica:** Es la primera causa de muerte materna en el primer trimestre y una urgencia ginecológica. Representa el 1-2% de todos los embarazos. La mortalidad ha disminuido significativamente con el diagnóstico precoz, pero sigue siendo responsable del 4-10% de las muertes maternas.

**Epidemiología:** Incidencia: 1-2% de todos los embarazos (ha aumentado por mayor prevalencia de factores de riesgo y mejor detección). Localizaciones: tubárica 95% (ampolla 70%, istmo 12%, fimbrias 11%, intersticial 2-3%), ovárica 3%, abdominal 1%, cervical <1%, cicatriz de cesárea <1%.`},{title:"Anatomía y Fisiopatología",content:`**Anatomía tubárica relevante:**
La trompa de Falopio tiene 4 segmentos: intersticial (intramural), istmo, ampolla y fimbrias. La ampolla es el sitio más frecuente de fertilización y de embarazo ectópico.

**Fisiopatología:**
1. **Factores que alteran el transporte del óvulo:**
   - Daño ciliar por infecciones (Chlamydia, gonorrea)
   - Adherencias peritubáricas
   - Alteración de la motilidad tubárica

2. **Factores que favorecen la implantación tubárica:**
   - Superficie endotelial dañada que permite adhesión del blastocisto
   - Expresión anormal de factores de implantación en la trompa

3. **Evolución natural:**
   - El trofoblasto invade la pared tubárica
   - La trompa NO puede acomodar el crecimiento → ruptura o aborto tubárico
   - Ruptura → hemorragia intraperitoneal → shock hipovolémico
   - El embarazo intersticial ruptura más tarde (8-16 semanas) con hemorragia más catastrófica`},{title:"Factores de Riesgo",content:`**Alto riesgo (OR >4):**
• Embarazo ectópico previo (riesgo de recurrencia 10-25%)
• Cirugía tubárica previa (ligadura, recanalización)
• Patología tubárica documentada
• Exposición a DES in utero
• DIU in situ (no aumenta riesgo absoluto, pero si hay embarazo con DIU, mayor probabilidad de que sea ectópico)

**Riesgo moderado (OR 2-4):**
• Enfermedad inflamatoria pélvica previa
• Infección por Chlamydia o gonorrea
• Infertilidad y técnicas de reproducción asistida
• Múltiples parejas sexuales
• Tabaquismo (altera motilidad ciliar tubárica)

**Riesgo bajo (OR 1-2):**
• Cirugía abdominal/pélvica previa
• Duchas vaginales
• Edad >35 años
• Inicio temprano de actividad sexual`},{title:"Clasificación",content:`**Por localización:**
• **Tubárico (95-97%):** Ampolla (70%), istmo (12%), fimbrias (11%), intersticial (2-3%)
• **No tubárico (3-5%):** Ovárico, abdominal, cervical, en cicatriz de cesárea, heterotópico

**Por evolución:**
• **No roto:** Estable hemodinámicamente, masa anexial intacta
• **Roto:** Hemoperitoneo, inestabilidad hemodinámica → URGENCIA QUIRÚRGICA
• **Aborto tubárico:** Expulsión parcial por la fimbria

**Embarazo de localización incierta (PUL):**
• β-hCG positiva sin visualización de embarazo intrauterino ni ectópico en ecografía
• Requiere seguimiento seriado de β-hCG`},{title:"Manifestaciones Clínicas",content:`**Tríada clásica (presente en <50%):**
1. Amenorrea (6-8 semanas)
2. Dolor abdominal/pélvico (95%)
3. Sangrado vaginal (60-80%)

**Ectópico NO roto:**
• Dolor pélvico unilateral, sordo, intermitente
• Sangrado vaginal escaso, oscuro
• Masa anexial palpable (50%)
• Dolor a la movilización cervical

**Ectópico ROTO - EMERGENCIA:**
• Dolor abdominal agudo, intenso, difuso
• Signos de irritación peritoneal
• Dolor en hombro (signo de Kehr: irritación diafragmática por hemoperitoneo)
• Taquicardia, hipotensión, palidez
• Distensión abdominal
• Shock hipovolémico

**🚩 Banderas rojas:**
• Inestabilidad hemodinámica → ruptura hasta que se demuestre lo contrario
• Dolor severo + β-hCG positiva = ectópico roto hasta descartar
• Fondo de saco de Douglas abombado y doloroso (hemoperitoneo)`},{title:"Diagnóstico",content:`**Algoritmo diagnóstico:**

1. **β-hCG cuantitativa:** Base del diagnóstico
   - Nivel discriminatorio: 1,500-2,000 mUI/mL (transvaginal)
   - Si β-hCG > nivel discriminatorio y NO se ve saco intrauterino → alta sospecha de ectópico
   - Duplicación normal: aumento ≥53% en 48h (embarazo viable)
   - Aumento <53% en 48h → embarazo no viable (ectópico o aborto)
   - Meseta o descenso lento → ectópico probable

2. **Ecografía transvaginal:** Estudio de imagen de primera línea
   - **Hallazgos sugestivos de ectópico:**
     • Masa anexial compleja con "anillo tubárico" (signo del bagel)
     • Saco gestacional extrauterino con embrión ± actividad cardíaca (diagnóstico definitivo)
     • Líquido libre en fondo de saco (hemoperitoneo)
   - **Hallazgos que descartan ectópico:**
     • Saco gestacional intrauterino con vesícula vitelina o embrión
   - **Pseudosaco:** Colección líquida intrauterina que simula saco gestacional (reacción decidual)

3. **Progesterona sérica:**
   - <5 ng/mL → embarazo no viable (ectópico o aborto) con 100% de sensibilidad
   - >20 ng/mL → embarazo viable intrauterino muy probable
   - 5-20 ng/mL → zona gris, no discrimina

4. **Culdocentesis:** Poco utilizada actualmente. Aspiración de sangre no coagulable del fondo de saco → hemoperitoneo

**Diagnósticos diferenciales:**
• Aborto (amenaza, en curso, incompleto)
• Quiste ovárico roto o torsión
• Embarazo intrauterino temprano normal
• EPI / absceso tubo-ovárico
• Apendicitis`},{title:"Tratamiento",content:`**MANEJO SEGÚN PRESENTACIÓN:**

**A. Manejo expectante (seleccionado):**
Criterios estrictos:
• Paciente asintomática o con síntomas mínimos
• β-hCG <1,000 mUI/mL y en descenso
• Sin evidencia ecográfica de ectópico
• Seguimiento confiable garantizado
• Tasa de éxito: 50-70% en casos seleccionados

**B. Tratamiento médico - METOTREXATO:**
**Indicaciones:**
• Ectópico no roto, hemodinámicamente estable
• β-hCG <5,000 mUI/mL (ideal <3,000)
• Masa ectópica <3.5-4 cm
• Sin actividad cardíaca fetal
• Función hepática y renal normal
• Hemograma normal (leucocitos >2,000, plaquetas >100,000)

**Protocolo de dosis única (más utilizado):**
• Metotrexato 50 mg/m² IM dosis única
• Control de β-hCG días 4 y 7
• Si descenso <15% entre día 4 y 7 → segunda dosis
• Seguimiento semanal de β-hCG hasta ser indetectable
• Tasa de éxito: 85-90% con dosis única

**Protocolo multidosis:**
• Metotrexato 1 mg/kg IM días 1, 3, 5, 7 + ácido folínico 0.1 mg/kg días 2, 4, 6, 8
• Para β-hCG más elevados o masa mayor

**Contraindicaciones del metotrexato:**
• Inestabilidad hemodinámica
• Ectópico roto
• Actividad cardíaca fetal
• Lactancia
• Inmunodeficiencia
• Enfermedad hepática o renal significativa
• Úlcera péptica activa
• Discrasias sanguíneas

**C. Tratamiento quirúrgico:**
**Indicaciones absolutas:**
• Ectópico roto → CIRUGÍA DE EMERGENCIA
• Inestabilidad hemodinámica
• Falla del metotrexato
• Contraindicación para metotrexato
• β-hCG >5,000 con masa >4 cm

**Técnicas:**
• **Salpingostomía (conservadora):** Incisión longitudinal en la trompa → extracción del embarazo → preserva trompa. Indicada si deseo de fertilidad futura y trompa contralateral dañada
• **Salpingectomía:** Resección de la trompa afectada. Preferida si:
  - Trompa severamente dañada
  - Trompa contralateral sana
  - Ectópico recurrente en misma trompa
  - Sangrado incontrolable
• **Vía:** Laparoscopia es de elección. Laparotomía si inestabilidad hemodinámica severa

**Seguimiento post-tratamiento:**
• β-hCG semanal hasta ser indetectable
• Tras salpingostomía: riesgo de ectópico persistente 5-10% → vigilar β-hCG
• Anticoncepción por 3 meses post-metotrexato (teratogénico)
• Asesoría sobre riesgo de recurrencia (10-25%)`},{title:"Complicaciones",content:`**Agudas:**
• Ruptura tubárica con hemorragia masiva
• Shock hipovolémico
• Muerte materna (primera causa en primer trimestre)

**Del tratamiento:**
• Metotrexato: estomatitis, náuseas, elevación de transaminasas, mielosupresión
• Quirúrgicas: lesión de estructuras adyacentes, infección, adherencias

**A largo plazo:**
• Infertilidad (15-20% tras salpingectomía unilateral)
• Recurrencia de embarazo ectópico (10-25%)
• Adherencias pélvicas postquirúrgicas`},{title:"Perlas Clínicas",content:`**Tips de examen:**
• β-hCG > zona discriminatoria sin saco intrauterino = ectópico hasta que se demuestre lo contrario
• El metotrexato está CONTRAINDICADO si hay actividad cardíaca
• La localización más frecuente es la AMPOLLA tubárica
• El ectópico intersticial es el más peligroso (ruptura tardía, hemorragia masiva)

**Conceptos clave:**
• Todo dolor + amenorrea + β-hCG positiva = pensar en ectópico
• La duplicación subóptima de β-hCG (<53% en 48h) sugiere embarazo no viable
• El signo de Kehr (dolor en hombro) = irritación diafragmática por hemoperitoneo
• Un DIU NO protege contra embarazo ectópico; si hay embarazo con DIU, sospechar ectópico

**Lo indispensable para el médico general:**
• Siempre solicitar β-hCG en mujer en edad fértil con dolor pélvico
• Saber reconocer un ectópico roto (shock + dolor agudo)
• Referir inmediatamente ante sospecha
• NO esperar ecografía si hay inestabilidad hemodinámica → cirugía directa`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 193: Tubal Ectopic Pregnancy. Obstet Gynecol. 2018;131(3):e91-e103.
• NICE Guideline NG126: Ectopic pregnancy and miscarriage: diagnosis and initial management. 2019 (updated 2023).
• Williams Obstetrics, 26th Edition. Chapter 19: Ectopic Pregnancy.
• Barnhart KT. Ectopic Pregnancy. N Engl J Med. 2009;361:379-87.
• UpToDate: "Ectopic pregnancy: Clinical manifestations and diagnosis." 2024.
• Elson CJ, et al. Diagnosis and management of ectopic pregnancy. RCOG Green-top Guideline No. 21. 2016.`}]},{id:"endometriosis",name:"Endometriosis",category:"ginecologia",icon:"🔴",severity:"medium",tags:["dolor pélvico","infertilidad","dismenorrea","laparoscopia","endometrioma"],sections:[{title:"Definición",content:`La endometriosis se define como la presencia de tejido endometrial (glándulas y estroma) fuera de la cavidad uterina que induce una reacción inflamatoria crónica. Es una enfermedad estrógeno-dependiente.

**Importancia clínica:** Afecta al 6-10% de mujeres en edad reproductiva, pero hasta 35-50% de mujeres con dolor pélvico crónico y 25-50% de mujeres con infertilidad. Existe un retraso diagnóstico promedio de 7-10 años desde el inicio de los síntomas.

**Epidemiología:** Prevalencia: 6-10% en población general, hasta 50% en infértiles. Pico de diagnóstico: 25-35 años. Localizaciones más frecuentes: ovarios (endometriomas), ligamentos uterosacros, peritoneo pélvico, tabique rectovaginal, vejiga, intestino.`},{title:"Anatomía y Fisiopatología",content:`**Teorías etiopatogénicas:**

1. **Teoría de Sampson (menstruación retrógrada):** La más aceptada. El flujo menstrual retrógrado a través de las trompas deposita células endometriales en la pelvis. Ocurre en 90% de las mujeres, pero solo 6-10% desarrollan endometriosis → se requiere disfunción inmunológica.

2. **Teoría de la metaplasia celómica:** Células peritoneales se transforman en tejido endometrial bajo estímulo estrogénico.

3. **Teoría inmunológica:** Defecto en la vigilancia inmune peritoneal permite la implantación y crecimiento del tejido ectópico.

**Mecanismos fisiopatológicos del dolor:**
• Inflamación peritoneal crónica → prostaglandinas, citocinas
• Neoangiogénesis y neuroangiogénesis → formación de fibras nerviosas en lesiones
• Adhesiones y fibrosis → distorsión anatómica
• Sensibilización central del dolor

**Mecanismos de infertilidad:**
• Distorsión anatómica (adherencias tubáricas/ováricas)
• Ambiente peritoneal hostil (citocinas inflamatorias)
• Alteración de la receptividad endometrial
• Disfunción ovulatoria
• Defecto de fase lútea`},{title:"Manifestaciones Clínicas",content:`**Síntomas cardinales (las 6 "D"):**
1. **Dismenorrea:** Progresiva, intensa, que empeora con el tiempo. El síntoma más frecuente
2. **Dispareunia:** Profunda, especialmente con penetración profunda (endometriosis del tabique rectovaginal)
3. **Dolor pélvico crónico:** No cíclico, presente >6 meses
4. **Disquecia:** Dolor con la defecación (endometriosis intestinal/rectovaginal), peor durante la menstruación
5. **Disuria:** Dolor al orinar (endometriosis vesical)
6. **Dificultad para concebir (infertilidad)**

**Otros síntomas:**
• Fatiga crónica
• Sangrado anormal (spotting premenstrual)
• Hematuria cíclica (endometriosis vesical)
• Hematoquecia cíclica (endometriosis intestinal)
• Dolor de hombro catamenial (endometriosis diafragmática)
• Neumotórax catamenial (endometriosis torácica, raro)

**Examen físico:**
• Útero en retroversión fija
• Dolor a la palpación del fondo de saco posterior
• Nódulos en ligamentos uterosacros
• Masa anexial (endometrioma)
• Sensibilidad a la movilización cervical

**🚩 La severidad de los síntomas NO se correlaciona con la extensión de la enfermedad**`},{title:"Clasificación",content:`**Clasificación revisada de la ASRM (American Society for Reproductive Medicine):**
• **Estadio I (Mínima):** Implantes aislados, sin adherencias significativas (1-5 puntos)
• **Estadio II (Leve):** Implantes superficiales <5 cm, sin adherencias significativas (6-15 puntos)
• **Estadio III (Moderada):** Implantes profundos, endometriomas pequeños, adherencias filamentosas (16-40 puntos)
• **Estadio IV (Severa):** Endometriomas grandes, adherencias densas, obliteración del fondo de saco (>40 puntos)

⚠️ Limitación: NO se correlaciona bien con dolor ni con pronóstico de fertilidad

**Clasificación por tipo de lesión:**
• **Endometriosis peritoneal superficial:** Implantes en superficie peritoneal
• **Endometriosis ovárica (endometrioma):** Quiste ovárico con contenido "chocolate"
• **Endometriosis infiltrante profunda (DIE):** Infiltra >5 mm en tejido afectado. La más sintomática

**Clasificación ENZIAN (para DIE):**
Describe compartimentos de afectación profunda: tabique rectovaginal, ligamentos uterosacros, rectosigma, vejiga, uréter`},{title:"Diagnóstico",content:`**Gold standard: Laparoscopia con biopsia y confirmación histológica**
Sin embargo, el diagnóstico clínico + imagen es cada vez más aceptado para iniciar tratamiento.

**Evaluación clínica:**
• Historia clínica detallada (patrón de dolor, relación con menstruación)
• Examen pélvico (nódulos, masas, dolor)

**Imágenes:**
• **Ecografía transvaginal:** Sensibilidad >90% para endometriomas (imagen en "vidrio esmerilado"). Operador dependiente para DIE
• **RM pélvica:** Superior para endometriosis profunda, planeación quirúrgica
• **Ecoendoscopia rectal:** Para endometriosis intestinal

**Biomarcadores:**
• **CA-125:** Puede estar elevado (>35 U/mL), pero baja sensibilidad y especificidad. No se recomienda como prueba diagnóstica. Útil para seguimiento

**Laparoscopia:**
• Gold standard diagnóstico
• Permite visualización directa, biopsia y tratamiento simultáneo
• Lesiones: vesículas claras, implantes rojos, lesiones negras/café ("powder burn"), adherencias

**Diagnósticos diferenciales:**
• Adenomiosis
• EPI crónica
• Síndrome de intestino irritable
• Cistitis intersticial
• Adherencias pélvicas
• Dolor miofascial pélvico`},{title:"Tratamiento",content:`**PRINCIPIOS:**
• NO tiene cura definitiva (excepto menopausia quirúrgica)
• El tratamiento debe individualizarse según: dolor, deseo de fertilidad, edad, extensión
• Abordaje multimodal: médico + quirúrgico + apoyo psicológico

**1. Tratamiento médico (dolor):**

**Primera línea:**
• **AINEs:** Para dismenorrea. Ibuprofeno 400-600mg cada 8h, naproxeno 500mg cada 12h
• **ACO combinados:** Uso continuo (sin placebo) → amenorrea terapéutica. Reducen recurrencia posquirúrgica

**Segunda línea:**
• **Progestágenos:** Dienogest 2mg/día (más estudiado), medroxiprogesterona, noretisterona
• **DIU-LNG (Mirena):** Efectivo para dolor, especialmente asociado a adenomiosis
• **Análogos de GnRH:** Leuprolida, goserelina. Máximo 6 meses (sin add-back) o más con add-back therapy (estrógenos + progestágenos a baja dosis). Efectos: menopausia química

**Tercera línea:**
• **Inhibidores de aromatasa:** Letrozol 2.5mg/día (en investigación, para refractarias)

**2. Tratamiento quirúrgico:**
• **Laparoscopia conservadora:** Excisión/ablación de lesiones, adhesiolisis, quistectomía de endometriomas
  - Preferir EXCISIÓN sobre ablación (menor recurrencia)
  - La quistectomía es superior al drenaje de endometriomas
• **Cirugía de DIE:** Resección de nódulos profundos (requiere equipo multidisciplinario)
• **Histerectomía + salpingooforectomía bilateral:** Tratamiento definitivo, solo si paridad satisfecha y síntomas severos refractarios

**3. Manejo de infertilidad:**
• Endometriosis mínima/leve: considerar cirugía laparoscópica → mejora tasa de embarazo espontáneo
• Endometriosis moderada/severa: FIV generalmente preferida
• Endometriomas >4 cm: considerar quistectomía antes de FIV
• NO usar tratamiento hormonal supresivo para mejorar fertilidad (retrasa concepción)`},{title:"Perlas Clínicas",content:`**Para el examen:**
• La laparoscopia es el gold standard diagnóstico
• La severidad del dolor NO correlaciona con el estadio de la enfermedad
• Dienogest es el progestágeno más estudiado para endometriosis
• ACO en uso continuo → primera línea médica
• Los análogos de GnRH solos no deben usarse >6 meses (pérdida ósea)

**Conceptos clave:**
• Retraso diagnóstico promedio: 7-10 años → se necesita alta sospecha clínica
• Dismenorrea progresiva en joven = endometriosis hasta descartar
• El endometrioma es la "punta del iceberg" → siempre hay más enfermedad peritoneal
• La endometriosis puede recurrir incluso después de cirugía radical

**Lo indispensable:**
• Sospechar en toda mujer con dismenorrea severa progresiva, dolor pélvico crónico o infertilidad
• Iniciar tratamiento empírico (ACO continuo + AINE) sin esperar laparoscopia
• Referir al especialista si no responde a tratamiento de primera línea
• El manejo debe ser multidisciplinario`},{title:"Referencias Bibliográficas",content:`• ESHRE Guideline: Endometriosis. 2022.
• ACOG Practice Bulletin No. 114: Management of Endometriosis. 2010 (reaffirmed 2022).
• NICE Guideline NG73: Endometriosis: diagnosis and management. 2017.
• Williams Gynecology, 4th Edition. Chapter 10: Endometriosis.
• Zondervan KT, et al. Endometriosis. N Engl J Med. 2020;382:1244-56.
• UpToDate: "Endometriosis: Pathogenesis, clinical features, and diagnosis." 2024.`}]},{id:"hemorragia-posparto",name:"Hemorragia Posparto",category:"obstetricia",subcategory:"urgencias",icon:"🩸",severity:"critical",tags:["HPP","hemorragia","posparto","atonía","urgencia","4T"],sections:[{title:"Definición",content:`La hemorragia posparto (HPP) se define como la pérdida sanguínea ≥500 mL después del parto vaginal o ≥1,000 mL después de cesárea, o cualquier pérdida sanguínea que cause inestabilidad hemodinámica dentro de las primeras 24 horas posparto (HPP primaria) o entre 24 horas y 12 semanas posparto (HPP secundaria).

**Importancia clínica:** Es la primera causa de mortalidad materna a nivel mundial, responsable del 25-30% de todas las muertes maternas. La mayoría de las muertes ocurren en las primeras 4 horas posparto y son PREVENIBLES.

**Epidemiología:** Incidencia: 5-10% de todos los partos. El 80% de las HPP se deben a atonía uterina. La HPP masiva (>1,500 mL) ocurre en 1-5% de los partos.`},{title:"Clasificación",content:`**Por temporalidad:**
• **HPP primaria (precoz):** Dentro de las primeras 24 horas posparto → la más frecuente y peligrosa
• **HPP secundaria (tardía):** Entre 24 horas y 12 semanas posparto

**Clasificación etiológica - Las 4 "T" (nemotecnia fundamental):**

1. **Tono (70%):** Atonía uterina → causa más frecuente
   - Sobredistensión uterina (macrosomía, polihidramnios, embarazo múltiple)
   - Trabajo de parto prolongado o precipitado
   - Uso prolongado de oxitocina
   - Corioamnionitis
   - Multiparidad
   - Miomas uterinos

2. **Trauma (20%):** Laceraciones del canal del parto
   - Desgarros cervicales, vaginales, perineales
   - Ruptura uterina
   - Inversión uterina
   - Episiotomía amplia

3. **Tejido (9%):** Retención de tejido placentario
   - Placenta incompleta (cotiledones/membranas retenidas)
   - Placenta accreta/increta/percreta
   - Lóbulo succenturiado retenido

4. **Trombina (1%):** Coagulopatías
   - Coagulopatía de consumo (CID)
   - Enfermedad de Von Willebrand
   - Uso de anticoagulantes
   - HELLP, hígado graso agudo
   - Embolia de líquido amniótico

**Clasificación por severidad:**
• Leve: 500-1,000 mL
• Moderada: 1,000-1,500 mL
• Severa: >1,500 mL o signos de shock`},{title:"Manifestaciones Clínicas",content:`**Signos de alarma:**
• Sangrado vaginal abundante continuo
• Útero blando, no contraído (atonía)
• Taquicardia (primer signo de hipovolemia)
• Hipotensión
• Palidez, diaforesis
• Alteración del sensorio
• Oliguria

**Índice de shock (FC/PAS):**
• Normal: 0.5-0.7
• >0.9: Sugiere pérdida >1,500 mL
• >1.7: Riesgo vital inminente

**Evaluación sistemática de las 4T:**
1. Palpar útero → ¿contraído o atónico?
2. Revisar canal del parto → ¿laceraciones?
3. Revisar placenta → ¿completa?
4. Verificar coagulación → ¿forma coágulos la sangre?`},{title:"Tratamiento",content:`**MANEJO ESCALONADO - PROTOCOLO DE ATENCIÓN:**

**PASO 1: Medidas iniciales (simultáneas)**
• Activar código rojo obstétrico / equipo de emergencia
• 2 accesos venosos de grueso calibre (14-16G)
• Cristaloides 2L en bolo rápido
• Oxígeno suplementario
• Sonda vesical (monitorear diuresis)
• Laboratorios: hemograma, coagulación, fibrinógeno, pruebas cruzadas
• Masaje uterino bimanual

**PASO 2: Tratamiento farmacológico (uterotónicos)**
• **Oxitocina:** 20-40 UI en 1L de SSN a 250 mL/h IV (primera línea)
• **Ergometrina (metilergonovina):** 0.2 mg IM (contraindicada en HTA y preeclampsia)
• **Misoprostol:** 800 mcg sublingual o 1,000 mcg rectal
• **Carbetocina:** 100 mcg IV dosis única (alternativa a oxitocina)
• **Ácido tranexámico:** 1g IV en 10 min (administrar en los primeros 3 minutos, tan pronto como sea posible). Si persiste sangrado → 2da dosis 1g a los 30 min

**PASO 3: Intervenciones mecánicas**
• **Compresión uterina bimanual:** Puño en fondo de saco anterior + mano en abdomen
• **Taponamiento uterino con balón:** Balón de Bakri (500 mL), SOS balón de Foley o condón adaptado. Éxito en 75-86%
• **Traje antishock no neumático (TAN)**

**PASO 4: Manejo quirúrgico (si falla lo anterior)**
• **Suturas compresivas:** Sutura de B-Lynch, técnica de Cho
• **Ligadura de arterias uterinas** (técnica de O'Leary)
• **Ligadura de arterias hipogástricas** (arterias ilíacas internas)
• **Embolización arterial selectiva** (si disponible, requiere radiología intervencionista)
• **Histerectomía obstétrica:** ÚLTIMO recurso, salvavida. No demorar si otras medidas fallan

**REPOSICIÓN DE HEMODERIVADOS (transfusión masiva):**
• Protocolo 1:1:1 → 1 concentrado eritrocitario : 1 plasma fresco : 1 aféresis de plaquetas
• Objetivo: Hb >7 g/dL, plaquetas >50,000, fibrinógeno >200 mg/dL, INR <1.5
• Considerar crioprecipitados si fibrinógeno <200

**PREVENCIÓN (manejo activo del tercer período):**
• Oxitocina 10 UI IM/IV inmediatamente al nacimiento del hombro anterior
• Tracción controlada del cordón
• Masaje uterino
• Pinzamiento oportuno del cordón (1-3 min)
• ¡El manejo activo reduce la HPP en 60%!`},{title:"Perlas Clínicas",content:`**Para el examen:**
• Las 4 T: Tono (70%) > Trauma > Tejido > Trombina
• Oxitocina = primer uterotónico
• Ácido tranexámico dentro de las primeras 3 horas
• El manejo activo del alumbramiento PREVIENE la HPP
• El índice de shock >0.9 indica pérdida >1,500 mL

**Conceptos clave:**
• La subestimación del sangrado es el error más frecuente
• Taquicardia es el PRIMER signo de hipovolemia (la PA cae tarde)
• SIEMPRE revisar la placenta completa
• No demorar la histerectomía si es necesaria → salva vidas

**Lo indispensable:**
• Todo parto debe tener oxitocina disponible
• Conocer el protocolo escalonado de manejo
• Saber hacer compresión uterina bimanual
• Activar código rojo inmediatamente ante HPP masiva`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Bulletin No. 183: Postpartum Hemorrhage. 2017 (reaffirmed 2023).
• WHO Recommendation on Tranexamic Acid for the Treatment of Postpartum Haemorrhage. 2017.
• WOMAN Trial: Shakur H, et al. Lancet. 2017;389:2105-16.
• Williams Obstetrics, 26th Edition. Chapter 41: Obstetrical Hemorrhage.
• FIGO Guidelines: Prevention and treatment of postpartum hemorrhage. 2022.
• UpToDate: "Postpartum hemorrhage: Medical and minimally invasive management." 2024.`}]},{id:"cancer-cuello-uterino",name:"Cáncer de Cuello Uterino",category:"oncologia",icon:"🎗️",severity:"high",tags:["VPH","citología","Papanicolaou","colposcopia","NIC","tamización"],sections:[{title:"Definición",content:`El cáncer de cuello uterino (CCU) es una neoplasia maligna que se origina en el epitelio del cérvix, predominantemente en la zona de transformación. El 99.7% de los casos están asociados a infección persistente por VPH de alto riesgo oncogénico (principalmente tipos 16 y 18).

**Importancia clínica:** Es el cuarto cáncer más frecuente en mujeres a nivel mundial y la segunda causa de muerte por cáncer en mujeres de países en desarrollo. Es uno de los pocos cánceres PREVENIBLES (vacunación + tamización).

**Epidemiología:** Incidencia global: ~604,000 nuevos casos/año. Mortalidad: ~342,000 muertes/año. Pico de incidencia: 35-44 años para cáncer invasor. El 85-90% ocurre en países de ingresos bajos y medios. El carcinoma escamoso representa el 70-80% y el adenocarcinoma el 20-25%.`},{title:"Factores de Riesgo",content:`**Factor necesario (pero no suficiente):**
• Infección persistente por VPH de alto riesgo (tipos 16, 18, 31, 33, 45, 52, 58)
• VPH 16 → 60% de los CCU escamosos
• VPH 18 → 15% de los CCU, mayor proporción de adenocarcinomas

**Cofactores que favorecen la progresión:**
• Inicio temprano de relaciones sexuales (<16 años)
• Múltiples parejas sexuales
• Multiparidad (≥3 partos)
• Tabaquismo (duplica el riesgo, efecto directo sobre epitelio cervical)
• Inmunosupresión (VIH, trasplante)
• Uso prolongado de ACO (>5 años, riesgo modesto)
• Coinfección con Chlamydia o HSV-2
• No participar en programas de tamización

**Factores protectores:**
• Vacunación contra VPH
• Uso de preservativo (reducción parcial)
• Circuncisión de la pareja masculina
• Tamización regular`},{title:"Diagnóstico",content:`**TAMIZACIÓN (detección temprana):**

**Recomendaciones actuales (ACOG/ACS 2021):**
• 21-24 años: Citología sola cada 3 años
• 25-29 años: Citología cada 3 años O prueba de VPH primaria cada 5 años
• 30-65 años: Opciones:
  1. Co-test (citología + VPH) cada 5 años (preferido)
  2. VPH primario cada 5 años
  3. Citología sola cada 3 años
• >65 años: Suspender si tamización previa adecuada y negativa
• Post-histerectomía total (con cervicectomía): No requiere tamización si no hay antecedente de NIC2+

**Clasificación citológica (Bethesda):**
• NILM: Negativo para lesión intraepitelial o malignidad
• ASC-US: Células escamosas atípicas de significado indeterminado
• ASC-H: Células escamosas atípicas, no puede excluirse HSIL
• LSIL: Lesión escamosa intraepitelial de bajo grado
• HSIL: Lesión escamosa intraepitelial de alto grado
• AGC: Células glandulares atípicas
• Carcinoma escamoso / Adenocarcinoma

**Colposcopia:**
• Indicada ante citología anormal (ASC-US VPH+, LSIL, HSIL, ASC-H, AGC)
• Aplicación de ácido acético 3-5% y lugol
• Biopsia dirigida de áreas anormales
• Legrado endocervical si la zona de transformación no es completamente visible

**Clasificación histológica (NIC/CIN):**
• NIC 1 (CIN 1): Displasia leve → generalmente regresa espontáneamente
• NIC 2 (CIN 2): Displasia moderada → tratamiento según edad y contexto
• NIC 3 (CIN 3): Displasia severa / carcinoma in situ → tratamiento siempre
• Carcinoma invasor: Requiere estadificación completa

**Estadificación FIGO 2018 (clínica, ahora permite uso de imágenes):**
• IA: Microinvasivo (solo diagnóstico histológico)
• IB: Clínicamente visible o >IA
• II: Invade más allá del útero pero no llega a pared pélvica ni tercio inferior de vagina
• III: Se extiende a pared pélvica y/o tercio inferior de vagina y/o hidronefrosis
• IV: Invade vejiga, recto o metástasis a distancia`},{title:"Tratamiento",content:`**Lesiones preinvasivas:**
• **NIC 1:** Observación (regresión espontánea en 60-80%). Control en 12 meses
• **NIC 2/3:** Tratamiento excisional o ablativo:
  - **LEEP/LLETZ:** Escisión con asa electroquirúrgica (más utilizado)
  - **Conización con bisturí frío:** Si sospecha de microinvasión o adenocarcinoma in situ
  - **Crioterapia:** En recursos limitados, para lesiones pequeñas

**Cáncer invasor:**
• **IA1 sin IVLE:** Conización con márgenes negativos (si deseo de fertilidad) o histerectomía simple
• **IA2-IB1:** Histerectomía radical (Wertheim-Meigs) + linfadenectomía pélvica
  - Traquelectomía radical si deseo de fertilidad (tumores <2 cm)
• **IB2-IIA:** Histerectomía radical + linfadenectomía O quimio-radioterapia concurrente
• **IIB-IVA:** Quimio-radioterapia concurrente (cisplatino semanal + radioterapia)
  - Cisplatino 40 mg/m² semanal × 5-6 ciclos durante radioterapia
• **IVB (metastásico):** Quimioterapia paliativa (cisplatino + paclitaxel ± bevacizumab)
  - Inmunoterapia: Pembrolizumab para tumores con PD-L1+ o MSI-H

**PREVENCIÓN:**
• **Vacuna contra VPH:**
  - Vacuna nonavalente (Gardasil 9): VPH 6, 11, 16, 18, 31, 33, 45, 52, 58
  - Indicada: 9-26 años (ideal a los 11-12 años, antes del inicio de actividad sexual)
  - Esquema: 2 dosis si <15 años, 3 dosis si ≥15 años
  - Eficacia: >90% para prevenir infección por tipos incluidos
  - La vacunación NO elimina la necesidad de tamización`},{title:"Perlas Clínicas",content:`**Para el examen:**
• VPH 16 y 18 → responsables del 70% de los CCU
• El co-test (citología + VPH) cada 5 años es la estrategia preferida en 30-65 años
• LEEP es el procedimiento excisional más utilizado para NIC 2/3
• La quimio-radioterapia con cisplatino es el tratamiento estándar para estadios IIB+
• El CCU es PREVENIBLE con vacunación + tamización

**Lo indispensable:**
• Conocer las indicaciones de tamización según edad
• Saber cuándo referir a colposcopia
• Promover activamente la vacunación contra VPH
• El sangrado poscoital en una mujer joven siempre debe hacer pensar en patología cervical`},{title:"Referencias Bibliográficas",content:`• ACOG Practice Advisory: Updated Cervical Cancer Screening Guidelines. 2021.
• WHO Guideline for Screening and Treatment of Cervical Pre-cancer Lesions for Cervical Cancer Prevention. 2021.
• NCCN Guidelines: Cervical Cancer. Version 1.2024.
• FIGO Cancer Report 2021: Cancer of the cervix uteri.
• Arbyn M, et al. Estimates of incidence and mortality of cervical cancer in 2018. Lancet Glob Health. 2020.
• Williams Gynecology, 4th Edition. Chapter 30: Cervical Cancer.
• UpToDate: "Cervical cancer: Screening and prevention." 2024.`}]}],Y0=[{id:1,category:"Obstetricia",difficulty:"Media",examType:"ENARM",question:"Paciente de 32 años, primigesta de 34 semanas, acude a urgencias con cefalea intensa, fosfenos y dolor en epigastrio. PA: 170/110 mmHg. Labs: plaquetas 85,000, AST 250, LDH 750. ¿Cuál es el diagnóstico más probable?",options:["Preeclampsia sin criterios de severidad","Síndrome HELLP","Hígado graso agudo del embarazo","Púrpura trombocitopénica trombótica"],correctAnswer:1,explanation:"El cuadro clínico presenta la tríada del síndrome HELLP: Hemólisis (LDH 750), Elevated Liver enzymes (AST 250), Low Platelets (85,000). Asociado a preeclampsia severa (PA 170/110 + síntomas cerebrales + dolor epigástrico). El manejo incluye estabilización, sulfato de magnesio y terminación del embarazo."},{id:2,category:"Ginecología",difficulty:"Alta",examType:"USMLE",question:"Mujer de 28 años con oligomenorrea, hirsutismo (Ferriman-Gallwey 12), acné y acantosis nigricans. IMC 32. Labs: testosterona libre elevada, LH/FSH 3:1, glucosa ayuno 108 mg/dL. Ecografía: ovarios con 25 folículos periféricos bilaterales. ¿Cuál es la conducta más apropiada?",options:["Iniciar metformina como monoterapia","Cambios en estilo de vida + ACO con drospirenona + metformina","Iniciar letrozol para inducción de ovulación","Programar drilling ovárico laparoscópico"],correctAnswer:1,explanation:"Cumple criterios de Rotterdam para SOP (anovulación + hiperandrogenismo clínico/bioquímico + ovarios poliquísticos). La primera línea es cambios en estilo de vida (pérdida de peso 5-10%). Los ACO con progestágeno antiandrogénico regulan el ciclo y tratan hirsutismo/acné. La metformina está indicada por la resistencia a insulina (acantosis, glucosa alterada, IMC 32). El letrozol se usa para fertilidad, no aplica aquí. El drilling ovárico es última línea."},{id:3,category:"Obstetricia",difficulty:"Media",examType:"MIR",question:"Gestante de 7 semanas con dolor pélvico derecho y sangrado vaginal escaso. β-hCG: 2,500 mUI/mL. Ecografía transvaginal: útero vacío, masa anexial derecha de 3 cm sin actividad cardíaca, escaso líquido libre. Paciente estable. ¿Cuál es el manejo más adecuado?",options:["Manejo expectante con control de β-hCG en 48 horas","Metotrexato 50 mg/m² IM dosis única","Salpingectomía laparoscópica de urgencia","Legrado uterino diagnóstico"],correctAnswer:1,explanation:"Embarazo ectópico no roto (masa anexial + útero vacío con β-hCG > zona discriminatoria). Cumple criterios para metotrexato: hemodinámicamente estable, β-hCG <5,000, masa <4 cm, sin actividad cardíaca. El manejo expectante no es apropiado con β-hCG 2,500 y masa visible. La cirugía no es primera opción si cumple criterios para tratamiento médico."},{id:4,category:"Urgencias",difficulty:"Alta",examType:"ENARM",question:"Puérpera inmediata, parto vaginal hace 30 minutos. Sangrado vaginal abundante, útero blando a nivel umbilical. PA 90/60, FC 120. Placenta aparentemente completa. ¿Cuál es la secuencia correcta de manejo?",options:["Histerectomía de emergencia inmediata","Masaje uterino + oxitocina IV + ácido tranexámico + cristaloides + hemoderivados","Ergometrina IM y esperar respuesta","Ecografía para buscar restos placentarios"],correctAnswer:1,explanation:"Hemorragia posparto por atonía uterina (útero blando, placenta completa → Tono = causa más frecuente). El manejo escalonado incluye: 1) Masaje uterino bimanual, 2) Uterotónicos (oxitocina primera línea), 3) Ácido tranexámico 1g IV, 4) Reposición de volumen. La histerectomía es ÚLTIMO recurso. No se debe perder tiempo en estudios de imagen con paciente inestable."},{id:5,category:"Ginecología",difficulty:"Media",examType:"USMLE",question:"Mujer de 55 años, posmenopáusica hace 3 años, consulta por sangrado vaginal de 2 días. No usa terapia hormonal. Ecografía: endometrio de 8 mm, homogéneo. ¿Cuál es el siguiente paso?",options:["Observación y control ecográfico en 3 meses","Iniciar progestágenos cíclicos","Biopsia endometrial","Histerectomía"],correctAnswer:2,explanation:"Todo sangrado posmenopáusico requiere estudio histológico para descartar cáncer de endometrio (riesgo 10-15%). El endometrio >4 mm en posmenopáusica con sangrado es indicación de biopsia. La observación no es aceptable. Los progestágenos no se inician sin diagnóstico. La histerectomía no se realiza sin histología previa."},{id:6,category:"Obstetricia",difficulty:"Baja",examType:"ENARM",question:"¿Cuál es el anticonvulsivante de elección para la prevención y tratamiento de las convulsiones eclámpticas?",options:["Diazepam","Fenitoína","Sulfato de magnesio","Fenobarbital"],correctAnswer:2,explanation:"El sulfato de magnesio es el fármaco de elección para la prevención y tratamiento de la eclampsia (convulsiones en preeclampsia). Superó a la fenitoína y al diazepam en los estudios Collaborative Eclampsia Trial y MAGPIE. Dosis: carga 4-6g IV en 20-30 min, mantenimiento 1-2g/h. Antídoto: gluconato de calcio 1g IV."},{id:7,category:"Oncología",difficulty:"Media",examType:"MIR",question:"Mujer de 30 años, citología cervical reporta HSIL. Colposcopia con biopsia: NIC 3 (CIN 3). Desea preservar fertilidad. ¿Cuál es el tratamiento más adecuado?",options:["Observación con citología cada 6 meses","LEEP/LLETZ con márgenes libres","Histerectomía total","Quimio-radioterapia"],correctAnswer:1,explanation:"NIC 3 (displasia severa/carcinoma in situ) siempre requiere tratamiento. El LEEP/LLETZ es el procedimiento estándar para lesiones preinvasivas, permite obtener muestra histológica y preserva fertilidad. La observación NO es aceptable para NIC 3. La histerectomía es excesiva para una lesión preinvasiva en paciente joven con deseo de fertilidad. La quimio-radioterapia es para cáncer invasor avanzado."},{id:8,category:"Ginecología",difficulty:"Media",examType:"ENARM",question:'Mujer de 35 años con dismenorrea progresiva severa de 5 años de evolución, dispareunia profunda e infertilidad primaria de 2 años. Examen: nódulo doloroso en fondo de saco posterior, útero en retroversión fija. Ecografía: masa ovárica izquierda de 5 cm con contenido en "vidrio esmerilado". ¿Cuál es el diagnóstico más probable?',options:["Quiste ovárico funcional","Endometriosis con endometrioma","Cáncer de ovario epitelial","Absceso tubo-ovárico"],correctAnswer:1,explanation:'La tríada de dismenorrea progresiva + dispareunia profunda + infertilidad es altamente sugestiva de endometriosis. El nódulo en fondo de saco posterior sugiere endometriosis infiltrante profunda. La masa ovárica en "vidrio esmerilado" es característica del endometrioma (quiste chocolate). El útero en retroversión fija indica adherencias. La edad y evolución progresiva apoyan el diagnóstico.'}],Q0=[{id:1,title:"Preeclampsia severa con HELLP",category:"Obstetricia",difficulty:"Alta",steps:[{text:'Paciente femenina de 28 años, primigesta, 35 semanas de gestación. Acude a urgencias por cefalea intensa de 6 horas de evolución, fotofobia y dolor en "barra" en epigastrio. Antecedentes: controles prenatales normales hasta semana 30. PA en consultas previas: 110/70 mmHg.',question:"¿Qué datos adicionales son prioritarios en la evaluación inicial?",answer:"Prioridades: 1) PA actual (en ambos brazos), 2) Exploración neurológica (reflejos, clonus), 3) Fondo de ojo, 4) Palpación abdominal y actividad uterina, 5) FCF, 6) Laboratorios urgentes: hemograma con plaquetas, transaminasas, LDH, creatinina, ácido úrico, frotis periférico, proteinuria, coagulación."},{text:"PA: 175/115 mmHg (confirmada en dos tomas). Reflejos osteotendinosos: +++/++++, clonus de 3 batidas. Labs: Plaquetas 72,000, AST 320, ALT 285, LDH 850, Creatinina 1.3, Bilirrubina indirecta 2.1, esquistocitos en frotis. Proteinuria +3. FCF 140 lpm, reactiva.",question:"¿Cuál es el diagnóstico completo y qué conducta inmediata se debe tomar?",answer:"Diagnóstico: Preeclampsia con criterios de severidad + Síndrome HELLP (Clase 1 de Mississippi por plaquetas <100,000). Conducta inmediata: 1) Sulfato de magnesio (carga 4-6g IV en 20 min, mantenimiento 1-2g/h), 2) Antihipertensivo (labetalol IV 20mg o nifedipino 10mg VO, meta PA <160/110), 3) Corticoides para maduración pulmonar fetal si no los ha recibido (betametasona 12mg IM), 4) TERMINAR EMBARAZO en las próximas 24-48 horas máximo."}]},{id:2,title:"Sangrado uterino anormal en edad reproductiva",category:"Ginecología",difficulty:"Media",steps:[{text:"Mujer de 42 años consulta por menstruaciones abundantes y prolongadas de 12 meses de evolución. Refiere cambio de toalla cada 1-2 horas, duración de 10-12 días, con coágulos. Se siente fatigada y con disnea de esfuerzo. G3P3. No desea más hijos.",question:"¿Cuál es la evaluación inicial que debe realizarse?",answer:"Evaluación: 1) β-hCG (siempre en edad reproductiva), 2) Hemograma completo (buscar anemia), 3) Ferritina sérica, 4) TSH (descartar hipotiroidismo), 5) Ecografía transvaginal (evaluar grosor endometrial, miomas, pólipos), 6) Considerar biopsia endometrial (>40 años con SUA = indicación). Clasificar según PALM-COEIN."},{text:"β-hCG negativa. Hb 8.2 g/dL, VCM 72, Ferritina 8 ng/mL. TSH normal. Ecografía: útero de 12 cm, con mioma submucoso de 4 cm (FIGO tipo 1) que protruye en la cavidad endometrial. Endometrio 6 mm.",question:"¿Cuál es el plan de manejo integral?",answer:"Diagnóstico: SUA-L (Leiomioma submucoso FIGO tipo 1) + Anemia ferropénica moderada. Plan: 1) Suplementación con hierro (sulfato ferroso 200mg/día + vitamina C), 2) Considerar transfusión si Hb sigue bajando o es sintomática, 3) Tratamiento definitivo: miomectomía histeroscópica (mioma tipo 1 submucoso <5 cm es ideal para este abordaje), 4) Alternativa si no desea cirugía: DIU-LNG como puente terapéutico, 5) Post-miomectomía: considerar DIU-LNG para prevención de recurrencia del sangrado."}]}],Um=[{id:"alg-sua",title:"Algoritmo: Sangrado Uterino Anormal",category:"Ginecología",steps:[{step:1,text:"Paciente con sangrado uterino anormal",action:"Evaluar estabilidad hemodinámica"},{step:2,text:"¿Inestable?",action:"SÍ → Estabilizar (cristaloides, hemoderivados, uterotónicos). NO → Continuar evaluación"},{step:3,text:"Solicitar β-hCG",action:"Positiva → Evaluar embarazo y complicaciones. Negativa → Continuar"},{step:4,text:"Ecografía transvaginal + Labs (hemograma, TSH, coagulación)",action:"Evaluar causas estructurales (PALM) vs. no estructurales (COEIN)"},{step:5,text:"¿Causa estructural identificada?",action:"SÍ → Manejo específico (pólipo: polipectomía, mioma: según tamaño/tipo, malignidad: estadificar)"},{step:6,text:"¿Edad >45 años o factores de riesgo para cáncer endometrial?",action:"SÍ → Biopsia endometrial. NO → Tratamiento médico empírico"},{step:7,text:"Tratamiento médico: DIU-LNG, ACO, ácido tranexámico, AINEs",action:"Evaluar respuesta en 3 meses"},{step:8,text:"¿Fallo al tratamiento médico?",action:"Referir a ginecología: histeroscopia, considerar cirugía"}]},{id:"alg-preeclampsia",title:"Algoritmo: Manejo de Preeclampsia",category:"Obstetricia",steps:[{step:1,text:"Gestante con PA ≥140/90 después de semana 20",action:"Confirmar con segunda toma. Solicitar labs y proteinuria"},{step:2,text:"¿Tiene criterios de severidad?",action:"Evaluar: PA ≥160/110, plaquetas <100K, creatinina >1.1, transaminasas elevadas, edema pulmonar, síntomas cerebrales/visuales"},{step:3,text:"SIN severidad + ≥37 semanas",action:"TERMINAR EMBARAZO (inducción)"},{step:4,text:"SIN severidad + <37 semanas",action:"Manejo expectante: vigilancia estrecha, labs 2x/semana, NST, maduración pulmonar si 24-34 sem"},{step:5,text:"CON severidad + ≥34 semanas",action:"MgSO4 + antihipertensivo → TERMINAR EMBARAZO"},{step:6,text:"CON severidad + <34 semanas",action:"MgSO4 + antihipertensivo + corticoides. Manejo expectante máximo 48h en UCI si estable. Terminar si deterioro"},{step:7,text:"ECLAMPSIA",action:"Proteger vía aérea + MgSO4 carga + estabilizar → TERMINAR EMBARAZO"}]},{id:"alg-ectopico",title:"Algoritmo: Embarazo Ectópico",category:"Obstetricia",steps:[{step:1,text:"Dolor pélvico + amenorrea + β-hCG positiva",action:"¿Estable hemodinámicamente?"},{step:2,text:"INESTABLE",action:"Ectópico roto → CIRUGÍA DE EMERGENCIA (salpingectomía laparoscópica o laparotomía)"},{step:3,text:"ESTABLE → Ecografía transvaginal",action:"¿Saco gestacional intrauterino visible?"},{step:4,text:"Saco intrauterino visible",action:"Embarazo intrauterino (casi descarta ectópico, salvo heterotópico raro)"},{step:5,text:"Útero vacío + β-hCG > zona discriminatoria (1,500-2,000)",action:"Alta sospecha de ectópico. ¿Masa anexial visible?"},{step:6,text:"Masa visible, sin actividad cardíaca, <4 cm, β-hCG <5,000",action:"Candidata a METOTREXATO 50 mg/m² IM. Control β-hCG días 4 y 7"},{step:7,text:"No cumple criterios de MTX o falla al tratamiento",action:"CIRUGÍA: salpingostomía (si deseo de fertilidad) o salpingectomía"}]},{id:"alg-hpp",title:"Algoritmo: Hemorragia Posparto",category:"Obstetricia",steps:[{step:1,text:"Sangrado >500 mL post parto vaginal o >1,000 mL post cesárea",action:"Activar CÓDIGO ROJO. Accesos IV, cristaloides, O2, sonda vesical"},{step:2,text:"Evaluar las 4T",action:"Tono: ¿útero contraído? Trauma: ¿laceraciones? Tejido: ¿placenta completa? Trombina: ¿coagula?"},{step:3,text:"TONO (atonía uterina)",action:"Masaje uterino + Oxitocina 20-40 UI IV + Misoprostol 800 mcg SL + Ácido tranexámico 1g IV"},{step:4,text:"TRAUMA",action:"Reparación de desgarros cervicales/vaginales. Descartar ruptura uterina e inversión uterina"},{step:5,text:"TEJIDO",action:"Revisión manual de cavidad uterina. Extracción de restos. Legrado si necesario"},{step:6,text:"¿Persiste sangrado?",action:"Taponamiento con balón (Bakri). Si falla → Cirugía: B-Lynch, ligadura de arterias uterinas"},{step:7,text:"¿Falla todo?",action:"HISTERECTOMÍA OBSTÉTRICA (decisión salvavida, no demorar)"}]}],Ot=[...w0,..._0],Si=[...Y0,...B0],Im=[...Q0,...P0];function _m({darkMode:c,onNavigate:z,onSelectPathology:L}){const d=[{icon:s.jsx(Xo,{className:"w-6 h-6"}),label:"Ginecologí
